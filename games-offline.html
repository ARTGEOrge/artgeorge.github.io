const nav = document.getElementById('nav');
const stage = document.getElementById('stage');
let current = null;

function play(key){
  const g = GAMES[key];
  if(!g) return;
  stage.src = 'data:text/html;charset=utf-8;base64,' + g.b64;
  current = key;
  [...nav.children].forEach(b => b.classList.toggle('active', b.dataset.k === key));
  setTimeout(()=>{ try{ stage.focus(); }catch(e){} }, 50);
}
function goFs(){
  const el = stage;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
for(const key of Object.keys(GAMES)){
  const b = document.createElement('button');
  b.className = 'g'; b.dataset.k = key;
  b.textContent = GAMES[key].icon + '  ' + GAMES[key].name;
  b.onclick = () => play(key);
  nav.appendChild(b);
}
play(Object.keys(GAMES)[0]);   // auto-load the first game
</script>
