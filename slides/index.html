<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTGEOrge Slides</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden;
           background: #16131f; color: #e8eaed;
           font-family: 'Segoe UI', system-ui, sans-serif; }
    a { color: inherit; text-decoration: none; }

    .logo { font-weight: 800; letter-spacing: -1px; font-size: 22px; }
    .logo .a { background: linear-gradient(90deg,#a78bfa,#7c5cff);
               -webkit-background-clip: text; background-clip: text; color: transparent; }

    header { display: flex; align-items: center; gap: 12px; padding: 12px 18px;
             background: #1c1726; border-bottom: 1px solid #2b2238; flex-shrink: 0; }
    header .tag { color: #8b8595; font-size: 13px; }
    .spacer { flex: 1; }
    .toolbtn { background: #241d33; border: 1px solid #34294d; color: #d8d2e6;
               border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
    .toolbtn:hover { background: #2a2240; border-color: #8b6cff; color: #cdbcff; }
    .toolbtn.play { background: linear-gradient(90deg,#7c5cff,#a78bfa); border: none; color: #fff; font-weight: 600; }
    .toolbtn.play:hover { filter: brightness(1.08); }

    /* formatting toolbar */
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; padding: 7px 18px;
               background: #1a1524; border-bottom: 1px solid #2b2238; flex-shrink: 0; }
    .toolbar .grp { display: flex; gap: 2px; align-items: center; padding: 0 6px; border-right: 1px solid #2b2238; }
    .toolbar .grp:last-child { border-right: none; }
    .tb { min-width: 32px; height: 30px; padding: 0 8px; background: transparent; color: #cfc7e0;
          border: 1px solid transparent; border-radius: 6px; cursor: pointer; font-size: 14px;
          display: inline-flex; align-items: center; justify-content: center; }
    .tb:hover { background: #2a2240; }
    .tb.on { background: #34294d; color: #cdbcff; border-color: #5a4785; }
    input[type=color].tb { padding: 2px; width: 38px; }
    .swatches { display: flex; gap: 4px; }
    .sw { width: 22px; height: 22px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,.15); }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* slide rail */
    .rail { width: 188px; flex-shrink: 0; background: #1a1524; border-right: 1px solid #2b2238;
            overflow-y: auto; padding: 12px 10px; }
    .thumb { position: relative; margin-bottom: 12px; border-radius: 8px; cursor: pointer;
             border: 2px solid transparent; overflow: hidden; }
    .thumb.active { border-color: #8b6cff; }
    .thumb .num { position: absolute; top: 4px; left: 6px; font-size: 11px; color: #8b8595; z-index: 2; }
    .thumb .del { position: absolute; top: 3px; right: 4px; z-index: 3; color: #b9b1c7; background: rgba(0,0,0,.35);
                  border-radius: 4px; font-size: 13px; line-height: 1; padding: 1px 5px; display: none; }
    .thumb:hover .del { display: block; }
    .thumb .del:hover { color: #ff6b8a; }
    .tcanvas { width: 100%; aspect-ratio: 16/9; display: flex; flex-direction: column;
               justify-content: center; padding: 10px 12px; overflow: hidden; }
    .tcanvas .tt { font-size: 11px; font-weight: 700; line-height: 1.15;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tcanvas .tb2 { font-size: 8px; opacity: .85; margin-top: 3px; line-height: 1.2;
                    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    /* editor */
    .editor { flex: 1; display: flex; flex-direction: column; align-items: center;
              justify-content: center; padding: 24px; overflow: auto; }
    .slide { width: min(900px, 92%); aspect-ratio: 16/9; border-radius: 10px;
             box-shadow: 0 20px 60px rgba(0,0,0,.55); display: flex; flex-direction: column;
             padding: 8% 9%; position: relative; }
    .slide .title { font-size: clamp(22px, 4.2vw, 46px); font-weight: 800; outline: none; line-height: 1.1; }
    .slide .body { margin-top: 4%; font-size: clamp(14px, 2.1vw, 24px); line-height: 1.45; outline: none; flex: 1; }
    [contenteditable]:empty::before { content: attr(data-ph); opacity: .5; }

    .statusbar { display: flex; gap: 16px; padding: 7px 18px; background: #1c1726;
                 border-top: 1px solid #2b2238; color: #8b8595; font-size: 12px; flex-shrink: 0; }

    /* present mode */
    .present { position: fixed; inset: 0; background: #000; z-index: 200; display: none;
               align-items: center; justify-content: center; }
    .present.show { display: flex; }
    .pslide { width: 100vw; height: 100vh; display: flex; flex-direction: column;
              padding: 7% 9%; justify-content: flex-start; }
    .pslide .title { font-size: clamp(34px, 6vw, 80px); font-weight: 800; line-height: 1.08; }
    .pslide .body { margin-top: 4%; font-size: clamp(18px, 3vw, 40px); line-height: 1.5; }
    .pnav { position: fixed; bottom: 18px; right: 22px; color: #fff; font-size: 14px; opacity: .55;
            display: flex; gap: 14px; align-items: center; }
    .pnav button { background: rgba(255,255,255,.12); border: none; color: #fff; border-radius: 8px;
                   padding: 8px 14px; cursor: pointer; font-size: 16px; }
    .pnav button:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span class="a">ARTGE</span>Orge <span style="font-weight:600;color:#cdbcff">Slides</span></a>
    <span class="tag">click a slide to edit · ▶ Present for full screen</span>
    <span class="spacer"></span>
    <button class="toolbtn" id="addBtn">+ Slide</button>
    <button class="toolbtn" id="dupBtn">Duplicate</button>
    <button class="toolbtn" id="exportBtn">Export .odp</button>
    <button class="toolbtn" id="importBtn">Import .odp</button>
    <button class="toolbtn" id="pdfBtn">Export PDF</button>
    <button class="toolbtn" id="pngBtn">Export PNG</button>
    <button class="toolbtn play" id="playBtn">▶ Present</button>
    <input type="file" id="fileInput" accept=".odp,application/vnd.oasis.opendocument.presentation" style="display:none" />
  </header>

  <div class="toolbar" id="toolbar">
    <div class="grp">
      <button class="tb" data-cmd="bold" title="Bold"><b>B</b></button>
      <button class="tb" data-cmd="italic" title="Italic"><i>I</i></button>
      <button class="tb" data-cmd="underline" title="Underline"><u>U</u></button>
    </div>
    <div class="grp">
      <button class="tb" data-cmd="justifyLeft" title="Align left">⬅</button>
      <button class="tb" data-cmd="justifyCenter" title="Center">⬌</button>
      <button class="tb" data-cmd="justifyRight" title="Align right">➡</button>
      <button class="tb" data-cmd="insertUnorderedList" title="Bullet list">•≡</button>
    </div>
    <div class="grp">
      <span style="color:#8b8595;font-size:12px;margin-right:4px">Text</span>
      <input type="color" class="tb" id="textColor" value="#ffffff" title="Text color" />
    </div>
    <div class="grp">
      <span style="color:#8b8595;font-size:12px;margin-right:4px">Background</span>
      <div class="swatches" id="swatches"></div>
      <input type="color" class="tb" id="bgColor" title="Custom background" />
    </div>
  </div>

  <div class="main">
    <div class="rail" id="rail"></div>
    <div class="editor">
      <div class="slide" id="slide">
        <div class="title" id="slideTitle" contenteditable="true" data-ph="Title"></div>
        <div class="body" id="slideBody" contenteditable="true" data-ph="Click to add text"></div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="slideInfo">Slide 1 of 1</span>
    <span>Saved locally</span>
  </div>

  <div class="present" id="present">
    <div class="pslide" id="pslide">
      <div class="title" id="pTitle"></div>
      <div class="body" id="pBody"></div>
    </div>
    <div class="pnav">
      <button id="pPrev">‹</button>
      <span id="pCount">1 / 1</span>
      <button id="pNext">›</button>
      <button id="pExit">✕ Esc</button>
    </div>
  </div>

<script>
(function () {
  var KEY = "artgeorge-slides";
  var THEMES = ["#ffffff:#1a1622", "#16131f:#f4f1fb", "#2a2240:#ffffff",
                "#7c5cff:#ffffff", "#0f2a43:#dff1ff", "#1f3d2b:#e8ffe9",
                "#43243a:#ffe6f4", "#3a2f12:#fff4d6"];
  var slides = [];   // {title, body, bg, fg}
  var cur = 0;

  var rail = document.getElementById("rail");
  var slideEl = document.getElementById("slide");
  var titleEl = document.getElementById("slideTitle");
  var bodyEl = document.getElementById("slideBody");

  function blank() { return { title: "", body: "", bg: "#ffffff", fg: "#1a1622", image: "", imageFit: "cover" }; }

  // ---- persistence ----
  function save() { try { localStorage.setItem(KEY, JSON.stringify({ slides: slides, cur: cur })); } catch (e) {} }
  function load() {
    try {
      var d = JSON.parse(localStorage.getItem(KEY) || "null");
      if (d && d.slides && d.slides.length) { slides = d.slides; cur = Math.min(d.cur || 0, slides.length - 1); return; }
    } catch (e) {}
    slides = [{ title: "My Presentation", body: "Made with ARTGEOrge Slides", bg: "#2a2240", fg: "#ffffff" }];
    cur = 0;
  }

  // ---- swatches ----
  var sw = document.getElementById("swatches");
  THEMES.forEach(function (t) {
    var bg = t.split(":")[0];
    var d = document.createElement("div"); d.className = "sw"; d.style.background = bg; d.title = bg;
    d.addEventListener("click", function () {
      var parts = t.split(":"); slides[cur].bg = parts[0]; slides[cur].fg = parts[1];
      applySlide(); renderRail(); save();
    });
    sw.appendChild(d);
  });

  // ---- editor binding ----
  function applyBg(el, s) {
    el.style.backgroundColor = s.bg || "#ffffff";
    el.style.backgroundImage = s.image ? 'url("' + s.image + '")' : "none";
    el.style.backgroundSize = s.imageFit === "contain" ? "contain" : "cover";
    el.style.backgroundPosition = "center";
    el.style.backgroundRepeat = "no-repeat";
  }
  function bgStyleStr(s) {
    var css = "background-color:" + (s.bg || "#ffffff");
    if (s.image) css += ";background-image:url(\"" + s.image + "\");background-size:" +
      (s.imageFit === "contain" ? "contain" : "cover") + ";background-position:center;background-repeat:no-repeat";
    return css;
  }
  function applySlide() {
    var s = slides[cur];
    applyBg(slideEl, s); slideEl.style.color = s.fg;
    titleEl.innerHTML = s.title; bodyEl.innerHTML = s.body;
    document.getElementById("textColor").value = "#ffffff";
    document.getElementById("slideInfo").textContent = "Slide " + (cur + 1) + " of " + slides.length;
  }
  function pull() { slides[cur].title = titleEl.innerHTML; slides[cur].body = bodyEl.innerHTML; }

  titleEl.addEventListener("input", function () { pull(); renderRailOne(); save(); });
  bodyEl.addEventListener("input", function () { pull(); renderRailOne(); save(); });

  // ---- rail ----
  function renderRail() {
    rail.innerHTML = "";
    slides.forEach(function (s, i) {
      var th = document.createElement("div");
      th.className = "thumb" + (i === cur ? " active" : "");
      th.innerHTML =
        "<span class='num'>" + (i + 1) + "</span>" +
        (slides.length > 1 ? "<span class='del' title='Delete'>×</span>" : "") +
        "<div class='tcanvas' style='" + bgStyleStr(s) + ";color:" + s.fg + "'>" +
          "<div class='tt'>" + (stripEmpty(s.title) || "Untitled") + "</div>" +
          "<div class='tb2'>" + stripEmpty(s.body) + "</div>" +
        "</div>";
      th.addEventListener("click", function (e) {
        if (e.target.classList.contains("del")) { e.stopPropagation(); delSlide(i); return; }
        pull(); cur = i; applySlide(); renderRail();
      });
      rail.appendChild(th);
    });
  }
  function renderRailOne() {
    var th = rail.children[cur]; if (!th) return;
    var c = th.querySelector(".tcanvas");
    c.querySelector(".tt").innerHTML = stripEmpty(slides[cur].title) || "Untitled";
    c.querySelector(".tb2").innerHTML = stripEmpty(slides[cur].body);
  }
  function stripEmpty(h) { return h && h.replace(/<br\s*\/?>(?=$)/i, "").trim() ? h : ""; }

  // ---- slide ops ----
  function addSlide(copy) {
    pull();
    var s = copy ? JSON.parse(JSON.stringify(slides[cur])) : blank();
    if (!copy) { s.bg = slides[cur].bg; s.fg = slides[cur].fg; }
    slides.splice(cur + 1, 0, s); cur++;
    applySlide(); renderRail(); save();
  }
  function delSlide(i) {
    if (slides.length <= 1) return;
    slides.splice(i, 1);
    if (cur >= slides.length) cur = slides.length - 1;
    applySlide(); renderRail(); save();
  }
  document.getElementById("addBtn").addEventListener("click", function () { addSlide(false); });
  document.getElementById("dupBtn").addEventListener("click", function () { addSlide(true); });

  // ---- formatting toolbar ----
  document.getElementById("toolbar").addEventListener("mousedown", function (e) { if (e.target.closest(".tb")) e.preventDefault(); });
  document.getElementById("toolbar").addEventListener("click", function (e) {
    var btn = e.target.closest("button[data-cmd]");
    if (!btn) return;
    document.execCommand(btn.dataset.cmd, false, null);
    pull(); save();
  });
  document.getElementById("textColor").addEventListener("input", function () {
    document.execCommand("foreColor", false, this.value); pull(); save();
  });
  document.getElementById("bgColor").addEventListener("input", function () {
    slides[cur].bg = this.value; applySlide(); renderRail(); save();
  });

  // ---- present mode ----
  var present = document.getElementById("present"), pIdx = 0;
  function showPresent(i) {
    pIdx = i;
    var s = slides[i];
    var ps = document.getElementById("pslide");
    applyBg(ps, s); ps.style.color = s.fg;
    document.getElementById("pTitle").innerHTML = s.title || "";
    document.getElementById("pBody").innerHTML = s.body || "";
    document.getElementById("pCount").textContent = (i + 1) + " / " + slides.length;
  }
  function openPresent() {
    pull();
    present.classList.add("show");
    showPresent(cur);
    if (present.requestFullscreen) present.requestFullscreen().catch(function () {});
  }
  function closePresent() {
    present.classList.remove("show");
    if (document.fullscreenElement) document.exitFullscreen().catch(function () {});
  }
  function pNext() { if (pIdx < slides.length - 1) showPresent(pIdx + 1); }
  function pPrev() { if (pIdx > 0) showPresent(pIdx - 1); }
  document.getElementById("playBtn").addEventListener("click", openPresent);
  document.getElementById("pNext").addEventListener("click", pNext);
  document.getElementById("pPrev").addEventListener("click", pPrev);
  document.getElementById("pExit").addEventListener("click", closePresent);
  document.addEventListener("keydown", function (e) {
    if (!present.classList.contains("show")) return;
    if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { e.preventDefault(); pNext(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); pPrev(); }
    else if (e.key === "Escape") closePresent();
  });
  document.addEventListener("fullscreenchange", function () {
    if (!document.fullscreenElement) present.classList.remove("show");
  });

  // =====================================================================
  //  ODP (OpenDocument Presentation) export / import — pure JS, no libs.
  //  An .odp is a ZIP of XML. We write stored (uncompressed) ZIP entries
  //  and read both stored + deflate entries (via DecompressionStream).
  // =====================================================================
  var ODF = {
    office: "urn:oasis:names:tc:opendocument:xmlns:office:1.0",
    style: "urn:oasis:names:tc:opendocument:xmlns:style:1.0",
    text: "urn:oasis:names:tc:opendocument:xmlns:text:1.0",
    draw: "urn:oasis:names:tc:opendocument:xmlns:drawing:1.0",
    pres: "urn:oasis:names:tc:opendocument:xmlns:presentation:1.0",
    svg: "urn:oasis:names:tc:opendocument:xmlns:svg-compatible:1.0",
    fo: "urn:oasis:names:tc:opendocument:xmlns:xsl-fo-compatible:1.0",
    manifest: "urn:oasis:names:tc:opendocument:xmlns:manifest:1.0",
    meta: "urn:oasis:names:tc:opendocument:xmlns:meta:1.0"
  };

  function xesc(s) { return String(s).replace(/[&<>]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]; }); }

  // contenteditable HTML -> array of plain-text lines
  function htmlToLines(h) {
    if (!h) return [];
    var s = h.replace(/<\s*br\s*\/?>/gi, "\n")
             .replace(/<\/(div|p|h[1-6])>/gi, "\n")
             .replace(/<li[^>]*>/gi, "• ")
             .replace(/<\/li>/gi, "\n")
             .replace(/<[^>]+>/g, "")
             .replace(/&nbsp;/gi, " ");
    var ta = document.createElement("textarea"); ta.innerHTML = s; s = ta.value;
    return s.split("\n").map(function (x) { return x.replace(/\s+$/, ""); }).filter(function (x) { return x.trim() !== ""; });
  }
  function fgFor(bg) {
    var m = /^#?([0-9a-f]{6})$/i.exec(bg || ""); if (!m) return "#1a1622";
    var n = parseInt(m[1], 16), r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return (0.299 * r + 0.587 * g + 0.114 * b) < 140 ? "#ffffff" : "#1a1622";
  }

  // ---- ZIP writer (store / no compression) ----
  var CRC_TABLE = (function () {
    var t = []; for (var n = 0; n < 256; n++) { var c = n; for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; } return t;
  })();
  function crc32(b) { var c = 0xFFFFFFFF; for (var i = 0; i < b.length; i++) c = CRC_TABLE[(c ^ b[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }
  function u16(n) { return [n & 255, (n >> 8) & 255]; }
  function u32(n) { return [n & 255, (n >> 8) & 255, (n >> 16) & 255, (n >>> 24) & 255]; }
  function bytes(arr) { return new Uint8Array(arr); }
  function buildZip(files) {
    var enc = new TextEncoder(), chunks = [], central = [], offset = 0;
    files.forEach(function (f) {
      var data = typeof f.data === "string" ? enc.encode(f.data) : f.data;
      var name = enc.encode(f.name), crc = crc32(data);
      var lh = [].concat(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0));
      var lhb = new Uint8Array(lh.length + name.length); lhb.set(lh, 0); lhb.set(name, lh.length);
      chunks.push(lhb, data);
      var ch = [].concat(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(data.length), u32(data.length), u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset));
      var chb = new Uint8Array(ch.length + name.length); chb.set(ch, 0); chb.set(name, ch.length);
      central.push(chb);
      offset += lhb.length + data.length;
    });
    var cdSize = central.reduce(function (a, c) { return a + c.length; }, 0);
    var eocd = bytes([].concat(u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length), u32(cdSize), u32(offset), u16(0)));
    var all = chunks.concat(central, [eocd]);
    var total = all.reduce(function (a, c) { return a + c.length; }, 0);
    var out = new Uint8Array(total), p = 0;
    all.forEach(function (c) { out.set(c, p); p += c.length; });
    return out;
  }

  // ---- ZIP reader (store + deflate) ----
  function rd16(b, o) { return b[o] | (b[o + 1] << 8); }
  function rd32(b, o) { return (b[o] | (b[o + 1] << 8) | (b[o + 2] << 16) | (b[o + 3] << 24)) >>> 0; }
  function findEOCD(b) { for (var i = b.length - 22; i >= 0; i--) if (rd32(b, i) === 0x06054b50) return i; return -1; }
  async function inflateRaw(slice) {
    var ds = new DecompressionStream("deflate-raw");
    var buf = await new Response(new Blob([slice]).stream().pipeThrough(ds)).arrayBuffer();
    return new Uint8Array(buf);
  }
  async function readZipBytes(b, wanted) {
    var eo = findEOCD(b); if (eo < 0) throw "Not a valid ODP/ZIP file";
    var count = rd16(b, eo + 10), p = rd32(b, eo + 16);
    for (var i = 0; i < count; i++) {
      if (rd32(b, p) !== 0x02014b50) break;
      var method = rd16(b, p + 10), compSize = rd32(b, p + 20);
      var nameLen = rd16(b, p + 28), extraLen = rd16(b, p + 30), cmtLen = rd16(b, p + 32);
      var lho = rd32(b, p + 42);
      var name = new TextDecoder().decode(b.subarray(p + 46, p + 46 + nameLen));
      if (name === wanted) {
        var dataStart = lho + 30 + rd16(b, lho + 26) + rd16(b, lho + 28);
        var slice = b.subarray(dataStart, dataStart + compSize);
        return method === 8 ? await inflateRaw(slice) : slice;
      }
      p += 46 + nameLen + extraLen + cmtLen;
    }
    return null;
  }
  async function readZipText(b, wanted) {
    var raw = await readZipBytes(b, wanted);
    if (!raw) throw wanted + " not found in ODP";
    return new TextDecoder("utf-8").decode(raw);
  }

  // ---- build the .odp ----
  function buildContentXml(slideImg) {
    pull();
    var autostyles = "", pages = "";
    slides.forEach(function (s, i) {
      var n = i + 1, fg = s.fg || "#1a1622";
      autostyles +=
        "<style:style style:name='dp" + n + "' style:family='drawing-page'>" +
          "<style:drawing-page-properties draw:fill='solid' draw:fill-color='" + xesc(s.bg || "#ffffff") + "'/>" +
        "</style:style>" +
        "<style:style style:name='Pt" + n + "' style:family='paragraph'>" +
          "<style:text-properties fo:color='" + xesc(fg) + "' fo:font-size='32pt' fo:font-weight='bold'/></style:style>" +
        "<style:style style:name='Pb" + n + "' style:family='paragraph'>" +
          "<style:text-properties fo:color='" + xesc(fg) + "' fo:font-size='20pt'/></style:style>";
      var titleP = "<text:p text:style-name='Pt" + n + "'>" + xesc(htmlToLines(s.title).join(" ")) + "</text:p>";
      var bodyLines = htmlToLines(s.body);
      var bodyP = (bodyLines.length ? bodyLines : [""]).map(function (l) {
        return "<text:p text:style-name='Pb" + n + "'>" + xesc(l) + "</text:p>";
      }).join("");
      var imgFrame = (slideImg && slideImg[i]) ?
        "<draw:frame draw:layer='layout' svg:x='0cm' svg:y='0cm' svg:width='25.4cm' svg:height='14.288cm'>" +
          "<draw:image xlink:href='" + slideImg[i] + "' xlink:type='simple' xlink:show='embed' xlink:actuate='onLoad'/></draw:frame>" : "";
      pages +=
        "<draw:page draw:name='page" + n + "' draw:style-name='dp" + n + "' draw:master-page-name='Default'>" +
          imgFrame +
          "<draw:frame presentation:class='title' draw:layer='layout' svg:x='1.5cm' svg:y='1cm' svg:width='22.4cm' svg:height='3cm'>" +
            "<draw:text-box>" + titleP + "</draw:text-box></draw:frame>" +
          "<draw:frame presentation:class='outline' draw:layer='layout' svg:x='1.5cm' svg:y='4.6cm' svg:width='22.4cm' svg:height='8.5cm'>" +
            "<draw:text-box>" + bodyP + "</draw:text-box></draw:frame>" +
        "</draw:page>";
    });
    return "<?xml version='1.0' encoding='UTF-8'?>\n" +
      "<office:document-content xmlns:office='" + ODF.office + "' xmlns:style='" + ODF.style + "' xmlns:text='" + ODF.text +
      "' xmlns:draw='" + ODF.draw + "' xmlns:presentation='" + ODF.pres + "' xmlns:svg='" + ODF.svg + "' xmlns:fo='" + ODF.fo +
      "' xmlns:xlink='http://www.w3.org/1999/xlink' office:version='1.2'>" +
      "<office:automatic-styles>" + autostyles + "</office:automatic-styles>" +
      "<office:body><office:presentation>" + pages + "</office:presentation></office:body></office:document-content>";
  }
  function buildStylesXml() {
    return "<?xml version='1.0' encoding='UTF-8'?>\n" +
      "<office:document-styles xmlns:office='" + ODF.office + "' xmlns:style='" + ODF.style + "' xmlns:fo='" + ODF.fo +
      "' xmlns:draw='" + ODF.draw + "' office:version='1.2'>" +
      "<office:styles/><office:automatic-styles>" +
      "<style:page-layout style:name='PL0'><style:page-layout-properties fo:page-width='25.4cm' fo:page-height='14.288cm' style:print-orientation='landscape'/></style:page-layout>" +
      "</office:automatic-styles><office:master-styles>" +
      "<style:master-page style:name='Default' style:page-layout-name='PL0'/></office:master-styles></office:document-styles>";
  }
  function buildManifest(media) {
    var entries =
      "<manifest:file-entry manifest:full-path='/' manifest:media-type='application/vnd.oasis.opendocument.presentation'/>" +
      "<manifest:file-entry manifest:full-path='content.xml' manifest:media-type='text/xml'/>" +
      "<manifest:file-entry manifest:full-path='styles.xml' manifest:media-type='text/xml'/>" +
      "<manifest:file-entry manifest:full-path='meta.xml' manifest:media-type='text/xml'/>";
    (media || []).forEach(function (m) {
      entries += "<manifest:file-entry manifest:full-path='" + m.path + "' manifest:media-type='" + m.mime + "'/>";
    });
    return "<?xml version='1.0' encoding='UTF-8'?>\n" +
      "<manifest:manifest xmlns:manifest='" + ODF.manifest + "' manifest:version='1.2'>" + entries + "</manifest:manifest>";
  }
  function buildMeta() {
    return "<?xml version='1.0' encoding='UTF-8'?>\n" +
      "<office:document-meta xmlns:office='" + ODF.office + "' xmlns:meta='" + ODF.meta + "' office:version='1.2'>" +
      "<office:meta><meta:generator>ARTGEOrge Slides</meta:generator></office:meta></office:document-meta>";
  }

  function dataUrlToBytesAndMime(u) {
    var m = /^data:([^;]+);base64,(.*)$/.exec(u || ""); if (!m) return null;
    var bin = atob(m[2]), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return { bytes: a, mime: m[1] };
  }
  function exportODP() {
    pull();
    var media = [], slideImg = [];
    slides.forEach(function (s, i) {
      slideImg[i] = null;
      if (!s.image) return;
      var d = dataUrlToBytesAndMime(s.image); if (!d) return;
      var ext = (d.mime.split("/")[1] || "png").replace("jpeg", "jpg");
      var path = "Pictures/img" + (media.length + 1) + "." + ext;
      media.push({ path: path, bytes: d.bytes, mime: d.mime });
      slideImg[i] = path;
    });
    var files = [
      { name: "mimetype", data: "application/vnd.oasis.opendocument.presentation" }, // must be first, stored
      { name: "META-INF/manifest.xml", data: buildManifest(media) },
      { name: "content.xml", data: buildContentXml(slideImg) },
      { name: "styles.xml", data: buildStylesXml() },
      { name: "meta.xml", data: buildMeta() }
    ];
    media.forEach(function (m) { files.push({ name: m.path, data: m.bytes }); });
    var zip = buildZip(files);
    var blob = new Blob([zip], { type: "application/vnd.oasis.opendocument.presentation" });
    var url = URL.createObjectURL(blob), a = document.createElement("a");
    var name = (htmlToLines(slides[0] && slides[0].title).join(" ") || "presentation").replace(/[\\/:*?"<>|]/g, "");
    a.href = url; a.download = name + ".odp";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function attrLocal(el, local) {
    for (var i = 0; i < el.attributes.length; i++) { var a = el.attributes[i]; if (a.localName === local) return a.value; }
    return null;
  }
  function unitToCm(s) {
    if (!s) return 0;
    var m = /(-?[0-9.]+)(cm|mm|in|pt|px)?/.exec(s); if (!m) return 0;
    return parseFloat(m[1]) * ({ cm: 1, mm: 0.1, in: 2.54, pt: 2.54 / 72, px: 2.54 / 96 })[m[2] || "cm"];
  }
  // Build a style lookup (name -> {parent,color,align,bold,italic}) from one or
  // more ODF docs so inherited text color / alignment can be resolved.
  function buildStyleMap(docs) {
    var map = {};
    docs.forEach(function (doc) {
      if (!doc) return;
      var els = doc.getElementsByTagNameNS(ODF.style, "style");
      for (var i = 0; i < els.length; i++) {
        var st = els[i], name = attrLocal(st, "name"); if (!name) continue;
        var d = { parent: attrLocal(st, "parent-style-name"), color: null, align: null, bold: null, italic: null };
        for (var c = 0; c < st.childNodes.length; c++) {
          var pr = st.childNodes[c]; if (pr.nodeType !== 1) continue;
          var col = attrLocal(pr, "color"); if (col) d.color = col;
          var al = attrLocal(pr, "text-align"); if (al) d.align = al;
          var fw = attrLocal(pr, "font-weight"); if (fw) d.bold = (fw === "bold");
          var fs = attrLocal(pr, "font-style"); if (fs) d.italic = (fs === "italic" || fs === "oblique");
        }
        map[name] = d;
      }
    });
    return map;
  }
  function resolveStyle(map, name, key) {
    var seen = {};
    while (name && map[name] && !seen[name]) { seen[name] = 1; var v = map[name][key]; if (v !== null && v !== undefined) return v; name = map[name].parent; }
    return null;
  }
  var ALIGN = { start: "left", left: "left", center: "center", end: "right", right: "right", justify: "justify" };

  // One ODF paragraph (text:p) -> HTML, honoring <text:s>/<text:tab>/
  // <text:line-break> and per-span color/bold/italic.
  function paraToHtml(map, p) {
    function inline(node) {
      var out = "";
      for (var i = 0; i < node.childNodes.length; i++) {
        var n = node.childNodes[i];
        if (n.nodeType === 3) { out += xesc(n.nodeValue); continue; }
        if (n.nodeType !== 1) continue;
        var ln = n.localName;
        if (ln === "s") { out += " ".repeat(parseInt(attrLocal(n, "c") || "1", 10)); }
        else if (ln === "tab") { out += "    "; }
        else if (ln === "line-break") { out += "<br>"; }
        else if (ln === "span") {
          var sn = attrLocal(n, "style-name"), seg = inline(n);
          var col = resolveStyle(map, sn, "color"), bold = resolveStyle(map, sn, "bold"), ital = resolveStyle(map, sn, "italic");
          if (col && col.toLowerCase() !== "#000000") seg = "<span style='color:" + col + "'>" + seg + "</span>";
          if (bold) seg = "<b>" + seg + "</b>";
          if (ital) seg = "<i>" + seg + "</i>";
          out += seg;
        } else { out += inline(n); }
      }
      return out;
    }
    var align = ALIGN[resolveStyle(map, attrLocal(p, "style-name"), "align")] || "left";
    var inner = inline(p);
    return "<div" + (align !== "left" ? " style='text-align:" + align + "'" : "") + ">" + (inner.trim() === "" ? "<br>" : inner) + "</div>";
  }
  function mimeForExt(name) {
    var e = (name.split(".").pop() || "").toLowerCase();
    return e === "png" ? "image/png" : e === "gif" ? "image/gif" : (e === "jpg" || e === "jpeg") ? "image/jpeg" : "image/" + e;
  }
  function bytesToDataUrl(b, mime) {
    var s = "", CH = 0x8000;
    for (var i = 0; i < b.length; i += CH) s += String.fromCharCode.apply(null, b.subarray(i, i + CH));
    return "data:" + mime + ";base64," + btoa(s);
  }

  async function parseODP(contentXml, stylesXml, zip) {
    var doc = new DOMParser().parseFromString(contentXml, "application/xml");
    if (doc.getElementsByTagName("parsererror").length) throw "Could not parse content.xml";
    var sdoc = stylesXml ? new DOMParser().parseFromString(stylesXml, "application/xml") : null;
    var map = buildStyleMap([sdoc, doc]);
    // drawing-page fill colors
    var fill = {}, styleEls = doc.getElementsByTagNameNS(ODF.style, "style");
    for (var i = 0; i < styleEls.length; i++) {
      var st = styleEls[i]; if (attrLocal(st, "family") !== "drawing-page") continue;
      var pr = st.getElementsByTagNameNS(ODF.draw, "drawing-page-properties")[0] || st.getElementsByTagNameNS(ODF.style, "drawing-page-properties")[0];
      if (pr) { var fc = attrLocal(pr, "fill-color"); if (fc) fill[attrLocal(st, "name")] = fc; }
    }
    // largest page-layout area, for the image-fit heuristic
    var pageArea = 0, pls = (sdoc || doc).getElementsByTagNameNS(ODF.style, "page-layout-properties");
    for (i = 0; i < pls.length; i++) { var pa = unitToCm(attrLocal(pls[i], "page-width")) * unitToCm(attrLocal(pls[i], "page-height")); if (pa > pageArea) pageArea = pa; }

    var pages = doc.getElementsByTagNameNS(ODF.draw, "page"), out = [];
    for (var pi = 0; pi < pages.length; pi++) {
      var page = pages[pi], bg = fill[attrLocal(page, "style-name")] || "#ffffff";
      var titleHtml = "", bodyHtml = "", img = null, imgArea = -1;
      var frames = page.getElementsByTagNameNS(ODF.draw, "frame");
      for (var f = 0; f < frames.length; f++) {
        var fr = frames[f];
        var imageEl = fr.getElementsByTagNameNS(ODF.draw, "image")[0];
        if (imageEl) {
          var ar = unitToCm(attrLocal(fr, "width")) * unitToCm(attrLocal(fr, "height"));
          if (ar > imgArea) {
            var href = attrLocal(imageEl, "href");
            if (href) {
              var ib = await readZipBytes(zip, href.replace(/^\//, ""));
              if (ib) { img = { url: bytesToDataUrl(ib, mimeForExt(href)), area: ar }; imgArea = ar; }
            }
          }
          continue;
        }
        var cls = attrLocal(fr, "class");
        var ps = fr.getElementsByTagNameNS(ODF.text, "p"), html = "";
        for (var k = 0; k < ps.length; k++) html += paraToHtml(map, ps[k]);
        if (!html) continue;
        if (cls === "title" && !titleHtml) titleHtml = html; else bodyHtml += html;
      }
      var fit = (img && pageArea && (img.area / pageArea) < 0.6) ? "contain" : "cover";
      out.push({ title: titleHtml, body: bodyHtml, bg: bg, fg: fgFor(bg), image: img ? img.url : "", imageFit: fit });
    }
    if (!out.length) throw "No slides found in this ODP";
    return out;
  }

  document.getElementById("exportBtn").addEventListener("click", function () {
    try { exportODP(); } catch (e) { alert("Export failed: " + e); }
  });
  document.getElementById("importBtn").addEventListener("click", function () { document.getElementById("fileInput").click(); });
  document.getElementById("fileInput").addEventListener("change", function (e) {
    var file = e.target.files[0]; e.target.value = ""; if (!file) return;
    var reader = new FileReader();
    reader.onload = async function () {
      try {
        var zb = new Uint8Array(reader.result);
        var contentXml = await readZipText(zb, "content.xml");
        var stylesXml = await readZipText(zb, "styles.xml").catch(function () { return ""; });
        var imported = await parseODP(contentXml, stylesXml, zb);
        if (!confirm("Import " + imported.length + " slide(s)? This replaces your current presentation.")) return;
        slides = imported; cur = 0; applySlide(); renderRail(); save();
      } catch (err) { alert("Could not import this .odp file.\n\n" + err); }
    };
    reader.readAsArrayBuffer(file);
  });

  // =====================================================================
  //  PDF / PNG export — render each slide to a canvas, then build a real
  //  multi-page PDF (one image per page) with a dependency-free writer.
  // =====================================================================
  function deckName() {
    var t = htmlToLines(slides[0] && slides[0].title).join(" ") || "presentation";
    return t.replace(/[\\/:*?"<>|]/g, "").slice(0, 60) || "presentation";
  }
  function download(blob, name) {
    var url = URL.createObjectURL(blob), a = document.createElement("a");
    a.href = url; a.download = name; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function wrapText(ctx, text, x, y, maxW, lh) {
    if (!text) return y;
    var words = text.split(/\s+/), line = "";
    for (var i = 0; i < words.length; i++) {
      var test = line ? line + " " + words[i] : words[i];
      if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, x, y); y += lh; line = words[i]; }
      else line = test;
    }
    if (line) { ctx.fillText(line, x, y); y += lh; }
    return y;
  }
  // Plain-text fallback: draws title/body onto an existing context (over the
  // already-painted background + image), used only if the SVG overlay fails.
  function drawTextFallback(ctx, s, W, H) {
    ctx.fillStyle = s.fg || "#1a1622"; ctx.textBaseline = "top";
    var padX = W * 0.09, maxW = W - padX * 2, y = H * 0.10;
    ctx.font = '700 ' + Math.round(H * 0.085) + 'px "Segoe UI", system-ui, sans-serif';
    y = wrapText(ctx, htmlToLines(s.title).join(" "), padX, y, maxW, Math.round(H * 0.10));
    y += H * 0.04;
    ctx.font = '400 ' + Math.round(H * 0.05) + 'px "Segoe UI", system-ui, sans-serif';
    htmlToLines(s.body).forEach(function (line) {
      y = wrapText(ctx, line, padX, y, maxW, Math.round(H * 0.072));
    });
  }
  function loadImage(url) {
    return new Promise(function (res, rej) {
      var im = new Image(); im.onload = function () { res(im); }; im.onerror = function () { rej(new Error("img")); }; im.src = url;
    });
  }
  function drawImageFit(ctx, im, W, H, fit) {
    var scale = fit === "contain" ? Math.min(W / im.width, H / im.height) : Math.max(W / im.width, H / im.height);
    var dw = im.width * scale, dh = im.height * scale;
    ctx.drawImage(im, (W - dw) / 2, (H - dh) / 2, dw, dh);
  }
  function dataUrlToBytes(u) {
    var bin = atob(u.split(",")[1]), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  function buildPDF(imgs) {
    var enc = new TextEncoder(), parts = [], pos = 0, off = [];
    function w(s) { var b = typeof s === "string" ? enc.encode(s) : s; parts.push(b); pos += b.length; }
    var N = imgs.length, total = 2 + 3 * N;
    w("%PDF-1.4\n");
    off[1] = pos; w("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
    var kids = []; for (var i = 0; i < N; i++) kids.push((3 + i * 3) + " 0 R");
    off[2] = pos; w("2 0 obj\n<< /Type /Pages /Kids [" + kids.join(" ") + "] /Count " + N + " >>\nendobj\n");
    for (i = 0; i < N; i++) {
      var P = 3 + i * 3, C = P + 1, X = P + 2, im = imgs[i];
      var content = "q " + im.w + " 0 0 " + im.h + " 0 0 cm /Im0 Do Q\n";
      off[P] = pos; w(P + " 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " + im.w + " " + im.h +
        "] /Resources << /XObject << /Im0 " + X + " 0 R >> >> /Contents " + C + " 0 R >>\nendobj\n");
      off[C] = pos; w(C + " 0 obj\n<< /Length " + content.length + " >>\nstream\n" + content + "endstream\nendobj\n");
      off[X] = pos; w(X + " 0 obj\n<< /Type /XObject /Subtype /Image /Width " + im.w + " /Height " + im.h +
        " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " + im.bytes.length + " >>\nstream\n");
      w(im.bytes); w("\nendstream\nendobj\n");
    }
    var xrefPos = pos;
    var xref = "xref\n0 " + (total + 1) + "\n0000000000 65535 f \n";
    for (var n = 1; n <= total; n++) xref += String(off[n]).padStart(10, "0") + " 00000 n \n";
    w(xref);
    w("trailer\n<< /Size " + (total + 1) + " /Root 1 0 R >>\nstartxref\n" + xrefPos + "\n%%EOF\n");
    var size = parts.reduce(function (a, b) { return a + b.length; }, 0), out = new Uint8Array(size), p = 0;
    parts.forEach(function (b) { out.set(b, p); p += b.length; });
    return out;
  }

  // Render a slide via an SVG <foreignObject> so bold/italic/underline,
  // bullet lists and text colors are preserved. The SVG is loaded as a
  // DATA URI: Chromium taints the canvas (blocking toDataURL/toBlob) when a
  // foreignObject SVG is drawn from a blob/HTTP URL, but NOT from a data URI.
  function xhtmlOf(htmlStr) {
    var tmp = document.createElement("div");
    tmp.innerHTML = htmlStr || "";
    return new XMLSerializer().serializeToString(tmp); // well-formed XHTML
  }
  // Build a TRANSPARENT-background text overlay (title + body) as an Image,
  // so it can be drawn on top of the slide's background photo.
  function renderTextOverlay(s, W, H) {
    return new Promise(function (resolve, reject) {
      var content =
        "<div xmlns='http://www.w3.org/1999/xhtml' style='box-sizing:border-box;width:" + W + "px;height:" + H +
        "px;padding:" + (H * 0.10) + "px " + (W * 0.09) + "px;color:" + (s.fg || "#1a1622") +
        ";font-family:\"Segoe UI\",system-ui,sans-serif;overflow:hidden;display:flex;flex-direction:column'>" +
          "<div style='font-size:" + Math.round(H * 0.085) + "px;font-weight:800;line-height:1.12'>" + xhtmlOf(s.title) + "</div>" +
          "<div style='font-size:" + Math.round(H * 0.05) + "px;line-height:1.45;margin-top:" + Math.round(H * 0.04) + "px'>" + xhtmlOf(s.body) + "</div>" +
        "</div>";
      var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + W + "' height='" + H + "'>" +
        "<foreignObject x='0' y='0' width='" + W + "' height='" + H + "'>" + content + "</foreignObject></svg>";
      var img = new Image();
      img.onload = function () { resolve(img); };
      img.onerror = function () { reject(new Error("svg render failed")); };
      img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    });
  }
  // Compose a slide canvas: background color, then background image (data URLs
  // don't taint the canvas), then the formatted text overlay (SVG foreignObject
  // loaded as a data URI — also non-tainting). Falls back to plain-text drawing.
  async function renderSlide(s, W, H) {
    var c = document.createElement("canvas"); c.width = W; c.height = H;
    var ctx = c.getContext("2d");
    ctx.fillStyle = s.bg || "#ffffff"; ctx.fillRect(0, 0, W, H);
    if (s.image) { try { drawImageFit(ctx, await loadImage(s.image), W, H, s.imageFit); } catch (e) {} }
    try { ctx.drawImage(await renderTextOverlay(s, W, H), 0, 0, W, H); }
    catch (e) { drawTextFallback(ctx, s, W, H); }
    return c;
  }

  async function exportPDF() {
    pull();
    var W = 1280, H = 720, imgs = [];
    for (var i = 0; i < slides.length; i++) {
      var c = await renderSlide(slides[i], W, H);
      imgs.push({ bytes: dataUrlToBytes(c.toDataURL("image/jpeg", 0.92)), w: W, h: H });
    }
    download(new Blob([buildPDF(imgs)], { type: "application/pdf" }), deckName() + ".pdf");
  }
  async function exportPNG() {
    pull();
    var W = 1920, H = 1080, name = deckName(), single = slides.length === 1;
    for (var i = 0; i < slides.length; i++) {
      var c = await renderSlide(slides[i], W, H);
      var blob = await new Promise(function (res) { c.toBlob(res, "image/png"); });
      download(blob, single ? name + ".png" : name + "-" + (i + 1) + ".png");
    }
  }

  document.getElementById("pdfBtn").addEventListener("click", function () {
    exportPDF().catch(function (e) { alert("PDF export failed: " + e); });
  });
  document.getElementById("pngBtn").addEventListener("click", function () {
    exportPNG().catch(function (e) { alert("PNG export failed: " + e); });
  });

  // ---- init ----
  load();
  applySlide();
  renderRail();
})();
</script>
</body>
</html>
