<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Rider 3D</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(#7ec3e8, #cfe9f6);
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; user-select: none;
    text-shadow: 2px 2px 0 #003e5a, 0 0 12px rgba(0,0,0,0.5);
  }
  #score { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
  #gifts { font-size: 20px; color: #ffd76a; margin-top: 2px; }
  #best  { position: fixed; top: 14px; right: 14px; font-size: 14px; color: #aaddff; text-shadow: 2px 2px 0 #003e5a; }
  #hint  { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
           font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.85);
           text-transform: uppercase; pointer-events: none; user-select: none;
           text-shadow: 1px 1px 0 #003e5a; }
  #gameover {
    position: fixed; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,30,60,0.65); text-align: center;
  }
  #gameover.show { display: flex; }
  #gameover h1 {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 92px; color: #ff5050; margin: 0;
    -webkit-text-stroke: 4px #000;
    text-shadow: 0 0 28px rgba(255,80,80,0.55);
  }
  #gameover p { font-family: monospace; font-size: 24px; margin: 6px 0; }
  #gameover .best { color: #ffd76a; }
  #gameover .hint { font-size: 14px; opacity: 0.85; margin-top: 22px; }
  #loadhint { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
              font-size: 18px; color: #335; }
  #flash {
    position: fixed; inset: 0;
    background: rgba(255, 255, 255, 0);
    pointer-events: none;
    transition: background 0.16s ease-out;
  }
  /* High-speed screen vignette: white blur creeping in from the corners */
  #speedVignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0) 40%, rgba(220,235,255,0.55) 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease-out;
    mix-blend-mode: screen;
  }
  /* Streak lines for high speed */
  #speedLines {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    background:
      repeating-linear-gradient(60deg,  transparent 0 22px, rgba(255,255,255,0.06) 22px 24px),
      repeating-linear-gradient(120deg, transparent 0 22px, rgba(255,255,255,0.06) 22px 24px);
    mask-image: radial-gradient(circle at center, transparent 35%, black 80%);
    -webkit-mask-image: radial-gradient(circle at center, transparent 35%, black 80%);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loadhint">Loading 3D engine…</div>
<div id="hud" style="display:none">
  <div id="score">0</div>
  <div id="gifts">🎁 <span id="giftCount">0</span></div>
</div>
<div id="best" style="display:none">Best: <span id="bestScore">0</span></div>
<div id="hint" style="display:none">← → / A D : steer &nbsp;·&nbsp; ↑ / W / SPACE : jump &nbsp;·&nbsp; ↓ / S : duck</div>
<div id="flash"></div>
<div id="speedLines"></div>
<div id="speedVignette"></div>
<div id="gameover">
  <h1>CRASHED!</h1>
  <p>Score: <span id="finalScore">0</span></p>
  <p>Gifts: <span id="finalGifts">0</span></p>
  <p class="best">Best: <span id="finalBest">0</span></p>
  <p class="hint">Press SPACE / ENTER (or tap) to restart</p>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if (typeof THREE === 'undefined') {
  document.getElementById('loadhint').textContent = 'Failed to load Three.js. Check your connection.';
} else {
  document.getElementById('loadhint').remove();
  document.getElementById('hud').style.display = '';
  document.getElementById('best').style.display = '';
  document.getElementById('hint').style.display = '';
  start();
}

function start() {
// ============== RENDERER / SCENE / CAMERA ==============
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
if (THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb8dff2);
scene.fog = new THREE.Fog(0xdfeff8, 55, 180);

const camera = new THREE.PerspectiveCamera(72, 1, 0.1, 350);
camera.position.set(0, 4.6, 9.2);
camera.lookAt(0, 1.6, -8);

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// ============== LIGHTING ==============
scene.add(new THREE.HemisphereLight(0xdcefff, 0xc8d6dc, 0.95));
const sun = new THREE.DirectionalLight(0xfff2cc, 1.5);
sun.position.set(-9, 18, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 14;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0008;
scene.add(sun);

// Soft warm rim from low sun
const fill = new THREE.DirectionalLight(0xffe2a8, 0.35);
fill.position.set(8, 6, 12);
scene.add(fill);

// ============== CONSTANTS ==============
const LANE_WIDTH  = 2.4;
const LANE_X      = [-LANE_WIDTH, 0, LANE_WIDTH];
const SLOPE_LEN   = 240;
const SLOPE_HALFW = LANE_WIDTH * 2.4;

// ============== WORLD: SUN DISC + CLOUDS ==============
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(7, 28),
  new THREE.MeshBasicMaterial({ color: 0xfff6d0, transparent: true, opacity: 0.95 })
);
sunDisc.position.set(-42, 30, -150);
sunDisc.lookAt(0, 4, 0);
scene.add(sunDisc);
const sunHalo = new THREE.Mesh(
  new THREE.CircleGeometry(11, 28),
  new THREE.MeshBasicMaterial({ color: 0xffeab0, transparent: true, opacity: 0.32, depthWrite: false })
);
sunHalo.position.copy(sunDisc.position);
sunHalo.lookAt(0, 4, 0);
scene.add(sunHalo);

const clouds = [];
function makeCloud() {
  const g = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, depthWrite: false });
  const lumps = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < lumps; i++) {
    const s = 2 + Math.random() * 2.4;
    const c = new THREE.Mesh(new THREE.SphereGeometry(s, 8, 6), mat);
    c.position.set(i * 2.2 - lumps, Math.random() * 0.6, Math.random() * 0.8);
    c.scale.y = 0.6;
    g.add(c);
  }
  return g;
}
for (let i = 0; i < 9; i++) {
  const c = makeCloud();
  c.position.set(-60 + Math.random() * 120, 22 + Math.random() * 12, -140 - Math.random() * 60);
  c.userData.drift = 0.4 + Math.random() * 0.8;
  scene.add(c);
  clouds.push(c);
}

// ============== WORLD: GOD RAYS (sun shafts) ==============
const godRayGroup = new THREE.Group();
godRayGroup.position.copy(sunDisc.position);
const godRayMat = new THREE.MeshBasicMaterial({
  color: 0xfff6d0, transparent: true, opacity: 0.18,
  depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
});
for (let i = 0; i < 5; i++) {
  const len = 30 + Math.random() * 30;
  const ray = new THREE.Mesh(
    new THREE.ConeGeometry(2.2 + Math.random() * 1.6, len, 4, 1, true),
    godRayMat
  );
  ray.position.set(0, -len / 2, 0);
  ray.rotation.z = (Math.random() - 0.5) * 0.6;
  ray.userData.phase = Math.random() * Math.PI * 2;
  ray.userData.baseRot = ray.rotation.z;
  godRayGroup.add(ray);
}
// Orient group so its local -Y axis points from the sun toward the player area
{
  const dir = new THREE.Vector3(0, 1.5, 0).sub(sunDisc.position).normalize();
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, -1, 0), dir);
  godRayGroup.quaternion.copy(q);
}
scene.add(godRayGroup);

// ============== WORLD: DISTANT BIRD FLOCK ==============
const birdMat = new THREE.MeshBasicMaterial({ color: 0x202030, side: THREE.DoubleSide });
function makeBird() {
  // V-shape: two thin triangles meeting at center
  const g = new THREE.Group();
  const wingGeo = new THREE.BufferGeometry();
  const verts = new Float32Array([
     0, 0, 0,    1.2, 0.25, 0,   0.7, 0.05, 0,    // right wing
     0, 0, 0,   -1.2, 0.25, 0,  -0.7, 0.05, 0     // left wing
  ]);
  wingGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  wingGeo.computeVertexNormals();
  const wings = new THREE.Mesh(wingGeo, birdMat);
  g.add(wings);
  return g;
}
const birds = [];
for (let i = 0; i < 3; i++) {
  const flock = new THREE.Group();
  for (let k = 0; k < 5; k++) {
    const b = makeBird();
    b.position.set(k * 1.6 + Math.random() * 0.6, Math.random() * 1.2, k * 0.7);
    b.userData.flap = Math.random() * Math.PI * 2;
    flock.add(b);
  }
  flock.position.set(-80 + Math.random() * 40, 22 + Math.random() * 8, -90 - Math.random() * 40);
  flock.userData.speed = 4 + Math.random() * 3;
  scene.add(flock);
  birds.push(flock);
}

// ============== WORLD: DISTANT MOUNTAIN RING ==============
const mountainGroup = new THREE.Group();
{
  const mountMat   = new THREE.MeshStandardMaterial({ color: 0x6a7aa0, flatShading: true, roughness: 1 });
  const mountDark  = new THREE.MeshStandardMaterial({ color: 0x53618a, flatShading: true, roughness: 1 });
  const snowCapMat = new THREE.MeshStandardMaterial({ color: 0xfafdff, flatShading: true, roughness: 0.85 });
  const N = 22;
  for (let i = 0; i < N; i++) {
    // ang spans 0..PI: 0 = right side, PI/2 = straight ahead, PI = left side
    const ang = (i / (N - 1)) * Math.PI;
    const dist = 115 + Math.random() * 45;
    const h = 22 + Math.random() * 30;
    const r = 10 + Math.random() * 9;
    const x = Math.cos(ang) * dist;
    const z = -Math.sin(ang) * dist - 25;
    const baseMat = Math.random() < 0.5 ? mountMat : mountDark;
    const m = new THREE.Mesh(new THREE.ConeGeometry(r, h, 6, 1), baseMat);
    m.position.set(x, h / 2 - 6, z);
    mountainGroup.add(m);
    const cap = new THREE.Mesh(new THREE.ConeGeometry(r * 0.46, h * 0.34, 6, 1), snowCapMat);
    cap.position.set(x, h / 2 - 6 + h * 0.33, z);
    mountainGroup.add(cap);
  }
}
scene.add(mountainGroup);

// ============== WORLD: SLOPE (snow plane that scrolls) ==============
const snowMat = new THREE.MeshStandardMaterial({ color: 0xf3f7ff, roughness: 0.92, metalness: 0.02 });
const slopes = [];
for (let i = 0; i < 2; i++) {
  const s = new THREE.Mesh(new THREE.PlaneGeometry(SLOPE_HALFW * 2 + 20, SLOPE_LEN), snowMat);
  s.rotation.x = -Math.PI / 2;
  s.position.z = -SLOPE_LEN / 2 - i * SLOPE_LEN;
  s.receiveShadow = true;
  scene.add(s);
  slopes.push(s);
}

// Side berms (raised snow walls outside the playable area)
const bermMat = new THREE.MeshStandardMaterial({ color: 0xe8eff8, roughness: 0.9, flatShading: true });
const berms = [];
for (const side of [-1, 1]) {
  for (let i = 0; i < 2; i++) {
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.0, SLOPE_LEN), bermMat);
    b.position.set(side * (SLOPE_HALFW + 0.55), 0.45, -SLOPE_LEN / 2 - i * SLOPE_LEN);
    b.receiveShadow = true;
    scene.add(b);
    berms.push(b);
  }
}

// Subtle blue shadow stripes between lanes (just visual track separation)
const lineMat = new THREE.MeshBasicMaterial({ color: 0xc6daee, transparent: true, opacity: 0.55 });
const lineSep = [];
for (const sx of [-LANE_WIDTH / 2, LANE_WIDTH / 2]) {
  for (let i = 0; i < 2; i++) {
    const l = new THREE.Mesh(new THREE.PlaneGeometry(0.06, SLOPE_LEN), lineMat);
    l.rotation.x = -Math.PI / 2;
    l.position.set(sx, 0.015, -SLOPE_LEN / 2 - i * SLOPE_LEN);
    scene.add(l);
    lineSep.push(l);
  }
}

// Ski groove tracks down the lanes (decorative, scrolls with world)
const trackMat = new THREE.MeshBasicMaterial({ color: 0xb6c8dc, transparent: true, opacity: 0.55 });
const tracks = [];
for (const x of LANE_X) {
  for (const off of [-0.18, 0.18]) {
    for (let i = 0; i < 2; i++) {
      const t = new THREE.Mesh(new THREE.PlaneGeometry(0.07, SLOPE_LEN), trackMat);
      t.rotation.x = -Math.PI / 2;
      t.position.set(x + off, 0.02, -SLOPE_LEN / 2 - i * SLOPE_LEN);
      scene.add(t);
      tracks.push(t);
    }
  }
}

// Sparkly ice patches scattered on the slope (purely cosmetic)
const icePatchMat = new THREE.MeshStandardMaterial({
  color: 0xd0eaff, metalness: 0.55, roughness: 0.18,
  transparent: true, opacity: 0.6
});
const icePatches = [];
for (let i = 0; i < 20; i++) {
  const ip = new THREE.Mesh(new THREE.CircleGeometry(0.6 + Math.random() * 0.7, 14), icePatchMat);
  ip.rotation.x = -Math.PI / 2;
  ip.position.set(
    (Math.random() - 0.5) * (SLOPE_HALFW * 1.6),
    0.025,
    -Math.random() * SLOPE_LEN * 2 + 10
  );
  scene.add(ip);
  icePatches.push(ip);
}

// ============== WORLD: PINE FOREST (decor + future obstacle source) ==============
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2818, roughness: 1, flatShading: true });
const foliageDark = new THREE.MeshStandardMaterial({ color: 0x255839, roughness: 1, flatShading: true });
const foliageLight = new THREE.MeshStandardMaterial({ color: 0x2d7048, roughness: 1, flatShading: true });
const snowTipMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.85, flatShading: true });

function makePine(scale) {
  scale = scale || 1;
  const g = new THREE.Group();
  const trunkH = 0.6 * scale;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12 * scale, 0.16 * scale, trunkH, 6),
    trunkMat
  );
  trunk.position.y = trunkH / 2;
  trunk.castShadow = true;
  g.add(trunk);
  const fmat = Math.random() < 0.5 ? foliageDark : foliageLight;
  for (let i = 0; i < 3; i++) {
    const r = (1.0 - i * 0.22) * scale;
    const h = (1.3 - i * 0.18) * scale;
    const c = new THREE.Mesh(new THREE.ConeGeometry(r, h, 7), fmat);
    c.position.y = trunkH + i * 0.85 * scale + h / 2;
    c.castShadow = true;
    g.add(c);
  }
  // Snow cap on top
  const cap = new THREE.Mesh(new THREE.ConeGeometry(0.34 * scale, 0.5 * scale, 7), snowTipMat);
  cap.position.y = trunkH + 2.4 * scale + 0.1 * scale;
  g.add(cap);
  return g;
}

// Side forest borders (out of playable lanes)
const forestRows = [];
// Track individual trees so we can sway them
const swayableTrees = [];
for (const side of [-1, 1]) {
  for (let i = 0; i < 2; i++) {
    const row = new THREE.Group();
    const COUNT = 28;
    for (let k = 0; k < COUNT; k++) {
      const t = makePine(0.9 + Math.random() * 0.9);
      const x = side * (SLOPE_HALFW + 1.8 + Math.random() * 9);
      const z = -SLOPE_LEN / 2 + (k / COUNT) * SLOPE_LEN + (Math.random() - 0.5) * 4;
      t.position.set(x, 0, z);
      t.rotation.y = Math.random() * Math.PI * 2;
      t.userData.swayPhase = Math.random() * Math.PI * 2;
      t.userData.swayAmp   = 0.015 + Math.random() * 0.025;
      t.userData.swayFreq  = 0.8 + Math.random() * 0.6;
      row.add(t);
      swayableTrees.push(t);
    }
    row.position.z = -SLOPE_LEN / 2 - i * SLOPE_LEN;
    scene.add(row);
    forestRows.push(row);
  }
}

// ============== WORLD: SNOWMEN (decorative, scattered along the slope sides) ==============
function makeSnowman() {
  const g = new THREE.Group();
  const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.85, flatShading: true });
  const base = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 10), ballMat);
  base.position.y = 0.55; base.castShadow = true; g.add(base);
  const torso = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 10), ballMat);
  torso.position.y = 1.3; torso.castShadow = true; g.add(torso);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), ballMat);
  head.position.y = 1.9; head.castShadow = true; g.add(head);
  // Carrot nose
  const nose = new THREE.Mesh(
    new THREE.ConeGeometry(0.06, 0.28, 6),
    new THREE.MeshStandardMaterial({ color: 0xff8030, roughness: 0.6 })
  );
  nose.position.set(0, 1.93, 0.3);
  nose.rotation.x = Math.PI / 2;
  g.add(nose);
  // Coal eyes
  const eyeMat2 = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyeMat2);
  eL.position.set(-0.1, 2.0, 0.27); g.add(eL);
  const eR = eL.clone(); eR.position.x = 0.1; g.add(eR);
  // Coal buttons
  for (let i = 0; i < 3; i++) {
    const btn = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), eyeMat2);
    btn.position.set(0, 1.05 + i * 0.18, 0.42 - i * 0.04);
    g.add(btn);
  }
  // Top hat
  const hatMat = new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.45, metalness: 0.2 });
  const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.06, 14), hatMat);
  brim.position.y = 2.18; g.add(brim);
  const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.36, 14), hatMat);
  crown.position.y = 2.39; g.add(crown);
  const band = new THREE.Mesh(
    new THREE.CylinderGeometry(0.245, 0.245, 0.07, 14),
    new THREE.MeshStandardMaterial({ color: 0xc83030, roughness: 0.5 })
  );
  band.position.y = 2.23; g.add(band);
  // Scarf
  const scarfM = new THREE.MeshStandardMaterial({ color: 0x35a8c8, roughness: 0.75 });
  const scarfRing = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.16, 14), scarfM);
  scarfRing.position.y = 1.55; g.add(scarfRing);
  const scarfTail = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.45, 0.08), scarfM);
  scarfTail.position.set(0.28, 1.32, 0.05);
  scarfTail.rotation.z = -0.2;
  g.add(scarfTail);
  // Twig arms
  const twigMat = new THREE.MeshStandardMaterial({ color: 0x4a2818, roughness: 1 });
  const armL2 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.85, 5), twigMat);
  armL2.position.set(-0.45, 1.3, 0);
  armL2.rotation.z = Math.PI * 0.42;
  g.add(armL2);
  const armR2 = armL2.clone();
  armR2.position.x = 0.45;
  armR2.rotation.z = -Math.PI * 0.42;
  g.add(armR2);
  return g;
}
const snowmen = [];
for (const side of [-1, 1]) {
  for (let i = 0; i < 4; i++) {
    const sm = makeSnowman();
    const x = side * (SLOPE_HALFW + 1.6 + Math.random() * 4);
    const z = -SLOPE_LEN + Math.random() * SLOPE_LEN * 2;
    sm.position.set(x, 0, z);
    sm.rotation.y = Math.random() * Math.PI * 2 - Math.PI / 2;
    scene.add(sm);
    snowmen.push(sm);
  }
}

// ============== WORLD: DISTANT CABINS WITH CHIMNEY SMOKE ==============
function makeCabin() {
  const g = new THREE.Group();
  const logMat   = new THREE.MeshStandardMaterial({ color: 0x6a3d1c, roughness: 0.9, flatShading: true });
  const roofMat  = new THREE.MeshStandardMaterial({ color: 0x331c10, roughness: 0.85, flatShading: true });
  const snowRoof = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.85, flatShading: true });
  const winMat   = new THREE.MeshStandardMaterial({ color: 0xfff0a0, emissive: 0xffaa44, emissiveIntensity: 1.1 });
  // Walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(3.4, 2.0, 2.6), logMat);
  walls.position.y = 1.0; walls.castShadow = true; g.add(walls);
  // Pitched roof: two angled boxes
  const r1 = new THREE.Mesh(new THREE.BoxGeometry(3.7, 0.18, 1.8), roofMat);
  r1.position.set(0, 2.4, -0.7); r1.rotation.x = -0.45;
  g.add(r1);
  const r2 = r1.clone();
  r2.position.z = 0.7; r2.rotation.x = 0.45;
  g.add(r2);
  // Snow on roof
  const sR1 = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.14, 1.5), snowRoof);
  sR1.position.copy(r1.position); sR1.rotation.copy(r1.rotation);
  sR1.position.y += 0.16;
  g.add(sR1);
  const sR2 = sR1.clone();
  sR2.position.z = 0.7; sR2.rotation.x = 0.45;
  g.add(sR2);
  // Window
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.06), winMat);
  w.position.set(0, 1.2, 1.32); g.add(w);
  // Door
  const door = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 1.1, 0.05),
    new THREE.MeshStandardMaterial({ color: 0x3a1a08, roughness: 0.8 })
  );
  // Place door on the long side
  door.position.set(1.3, 0.55, 0.0); door.rotation.y = Math.PI / 2;
  g.add(door);
  // Chimney
  const chim = new THREE.Mesh(
    new THREE.BoxGeometry(0.36, 1.0, 0.36),
    new THREE.MeshStandardMaterial({ color: 0x4a2018, roughness: 0.9 })
  );
  chim.position.set(0.8, 2.85, 0); g.add(chim);
  // Snow cap on chimney

function spawnRow(z) {
  // Decide a gift lane (sometimes) and 1-2 obstacles in different lanes
  const giftLane = Math.random() < 0.55 ? Math.floor(Math.random() * 3) : -1;
  const numObs = Math.random() < 0.35 ? 2 : 1;
  const obsLanes = [];
  let safety = 0;
  while (obsLanes.length < numObs && safety++ < 20) {
    const l = Math.floor(Math.random() * 3);
    if (!obsLanes.includes(l) && l !== giftLane) obsLanes.push(l);
  }
  // Guarantee at least one free lane
  if (obsLanes.length >= 3) obsLanes.length = 2;

  for (const lane of obsLanes) {
    const r = Math.random();
    let mesh, type, highOK = false, lowOK = false;
    if (r < 0.55) {
      mesh = makePine(1.4 + Math.random() * 0.5); type = 'tree';
    } else if (r < 0.85) {
      mesh = makeRock(); type = 'rock'; highOK = true;
    } else {
      mesh = makeLowBranch(); type = 'lowBranch'; lowOK = true;
    }
    mesh.position.set(LANE_X[lane], 0, z);
    mesh.rotation.y = Math.random() * Math.PI * 2;
    scene.add(mesh);
    obstacles.push({ mesh, type, lane, z, highOK, lowOK });
  }
  if (giftLane >= 0) {
    const m = makeGift();
    m.position.set(LANE_X[giftLane], 1.05, z);
    scene.add(m);
    collectibles.push({ mesh: m, z, lane: giftLane, phase: Math.random() * Math.PI * 2 });
  }
}

function laneLeft()  { if (curLane > 0) { curLane--; targetX = LANE_X[curLane]; } }
function laneRight() { if (curLane < 2) { curLane++; targetX = LANE_X[curLane]; } }
function jump()      { if (onGround && !ducking) { velY = JUMP_VEL; onGround = false; } }
function duckOn()    { ducking = true; }
function duckOff()   { ducking = false; }

window.addEventListener('keydown', (e) => {
  if (gameOver) {
    if (e.code === 'Space' || e.code === 'Enter') restart();
    return;
  }
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') laneLeft();
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') laneRight();
  else if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') jump();
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') duckOn();
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') duckOff();
});

// Touch
let touchStart = null;
window.addEventListener('touchstart', (e) => {
  if (gameOver) { restart(); return; }
  if (e.touches.length) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (!touchStart || gameOver) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
    jump();
  } else if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) laneRight(); else laneLeft();
  } else {
    if (dy < 0) jump();
    else { duckOn(); setTimeout(duckOff, 550); }
  }
  touchStart = null;
}, { passive: true });

// ============== MAIN LOOP ==============
let lastT = performance.now();

function flashTint(color, opacity, duration) {
  const f = document.getElementById('flash');
  f.style.background = `rgba(${color},${opacity})`;
  setTimeout(() => f.style.background = 'rgba(255,255,255,0)', duration);
}

function crash() {
  if (gameOver) return;
  gameOver = true;
  const finalScore = Math.floor(distance);
  if (finalScore > best) {
    best = finalScore;
    localStorage.setItem('snowRiderBest', best);
  }
  document.getElementById('finalScore').textContent = finalScore;
  document.getElementById('finalGifts').textContent = gifts;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('bestScore').textContent = best;
  document.getElementById('gameover').classList.add('show');
  flashTint('255,40,40', 0.55, 220);
  const sv = document.getElementById('speedVignette'); if (sv) sv.style.opacity = 0;
  const sl = document.getElementById('speedLines');   if (sl) sl.style.opacity = 0;
}

function restart() {
  for (const o of obstacles) scene.remove(o.mesh);
  for (const c of collectibles) scene.remove(c.mesh);
  obstacles.length = 0;
  collectibles.length = 0;
  curLane = 1; targetX = LANE_X[curLane];
  velY = 0; onGround = true; ducking = false;
  speed = 18; distance = 0; gifts = 0;
  crashTumble = 0; gameOver = false;
  playerGroup.position.set(0, 0, 0);
  playerGroup.rotation.set(0, 0, 0);
  riderPivot.scale.set(1, 1, 1);
  document.getElementById('giftCount').textContent = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('gameover').classList.remove('show');
  lastSpawnZ = -20;
  for (let z = -20; z > -200; ) {
    spawnRow(z);
    lastSpawnZ = z;
    z -= SPAWN_GAP_MIN + Math.random() * (SPAWN_GAP_MAX - SPAWN_GAP_MIN);
  }
  // Clear effect pools
  for (const s of skidPool) { s.visible = false; s.userData.life = 0; }
  lastSkidZ = 0;
  for (let i = 0; i < CONFETTI_MAX; i++) confettiLife[i] = 0;
  const cv = document.getElementById('speedVignette'); if (cv) cv.style.opacity = 0;
  const cl = document.getElementById('speedLines');   if (cl) cl.style.opacity = 0;
}

function loop() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (!gameOver) {
    speed = Math.min(SPEED_MAX, speed + ACCEL * dt);
    distance += speed * dt;
    document.getElementById('score').textContent = Math.floor(distance);

    // Smooth lane movement
    const lerpAmt = Math.min(1, dt * 14);
    const prevX = playerGroup.position.x;
    playerGroup.position.x += (targetX - prevX) * lerpAmt;
    // Lean roll on the sled (positive Z = roll left when going right)
    const lateralDir = targetX - playerGroup.position.x;
    const targetRoll = -lateralDir * 0.18;
    playerGroup.rotation.z += (targetRoll - playerGroup.rotation.z) * Math.min(1, dt * 10);

    // Jump physics
    velY -= GRAVITY * dt;
    playerGroup.position.y += velY * dt;
    if (playerGroup.position.y <= 0) {
      playerGroup.position.y = 0;
      velY = 0;
      onGround = true;
    }

    // Duck (squash rider vertically)
    const targetScaleY = ducking ? 0.5 : 1.0;
    riderPivot.scale.y += (targetScaleY - riderPivot.scale.y) * Math.min(1, dt * 14);

    // Subtle idle bob
    const t = now * 0.001;
    riderPivot.rotation.z = Math.sin(t * 3) * 0.02;

    // Scroll world toward camera
    const dz = speed * dt;
    for (const o of obstacles) { o.mesh.position.z += dz; o.z += dz; }
    for (const c of collectibles) {
      c.mesh.position.z += dz; c.z += dz;
      c.mesh.rotation.y += dt * 2.2;
      c.phase += dt * 4;
      c.mesh.position.y = 1.05 + Math.sin(c.phase) * 0.18;
    }
    for (const f of forestRows) {
      f.position.z += dz;
      if (f.position.z > SLOPE_LEN / 2 + 5) f.position.z -= SLOPE_LEN * 2;
    }
    for (const s of slopes) {
      s.position.z += dz;
      if (s.position.z > SLOPE_LEN / 2 + 5) s.position.z -= SLOPE_LEN * 2;
    }
    for (const b of berms) {
      b.position.z += dz;
      if (b.position.z > SLOPE_LEN / 2 + 5) b.position.z -= SLOPE_LEN * 2;
    }
    for (const tr of tracks) {
      tr.position.z += dz;
      if (tr.position.z > SLOPE_LEN / 2 + 5) tr.position.z -= SLOPE_LEN * 2;
    }
    for (const ls of lineSep) {
      ls.position.z += dz;
      if (ls.position.z > SLOPE_LEN / 2 + 5) ls.position.z -= SLOPE_LEN * 2;
    }
    for (const ip of icePatches) {
      ip.position.z += dz;
      if (ip.position.z > SLOPE_LEN / 2 + 5) {
        ip.position.z -= SLOPE_LEN * 2;
        ip.position.x = (Math.random() - 0.5) * (SLOPE_HALFW * 1.6);
      }
    }

    // Recycle off-camera obstacles/collectibles + spawn new rows
    for (let i = obstacles.length - 1; i >= 0; i--) {
      if (obstacles[i].z > 8) { scene.remove(obstacles[i].mesh); obstacles.splice(i, 1); }
    }
    for (let i = collectibles.length - 1; i >= 0; i--) {
      if (collectibles[i].z > 8) { scene.remove(collectibles[i].mesh); collectibles.splice(i, 1); }
    }
    lastSpawnZ += dz;
    while (lastSpawnZ > -180) {
      lastSpawnZ -= SPAWN_GAP_MIN + Math.random() * (SPAWN_GAP_MAX - SPAWN_GAP_MIN);
      spawnRow(lastSpawnZ);
    }

    // Falling snowflakes
    const sp = snowGeo.attributes.position;
    for (let i = 0; i < SNOW_COUNT; i++) {
      sp.array[i * 3 + 1] -= dt * 4.5;
      sp.array[i * 3 + 2] += dz * 0.55;
      if (sp.array[i * 3 + 1] < 0 || sp.array[i * 3 + 2] > 10) {
        sp.array[i * 3]     = (Math.random() - 0.5) * 90;
        sp.array[i * 3 + 1] = 18 + Math.random() * 14;
        sp.array[i * 3 + 2] = -160 - Math.random() * 40;
      }
    }
    sp.needsUpdate = true;

    // Snow spray behind the sled
    const spA = sprayGeo.attributes.position;
    for (let i = 0; i < SPRAY_COUNT; i++) {
      sprayLife[i] -= dt * 2.2;
      if (sprayLife[i] <= 0) {
        sprayLife[i] = 0.6 + Math.random() * 0.4;
        // Reset at sled position with random outward velocity
        spA.array[i * 3]     = playerGroup.position.x + (Math.random() - 0.5) * 0.4;
        spA.array[i * 3 + 1] = 0.15 + Math.random() * 0.2;
        spA.array[i * 3 + 2] = playerGroup.position.z + 0.7 + Math.random() * 0.4;
        sprayVel[i * 3]     = (Math.random() - 0.5) * 1.4;
        sprayVel[i * 3 + 1] = 1.6 + Math.random() * 1.0;
        sprayVel[i * 3 + 2] = 1.5 + Math.random() * 1.5;
      } else {
        spA.array[i * 3]     += sprayVel[i * 3]     * dt;
        spA.array[i * 3 + 1] += sprayVel[i * 3 + 1] * dt;
        spA.array[i * 3 + 2] += sprayVel[i * 3 + 2] * dt;
        sprayVel[i * 3 + 1] -= 5 * dt;
      }
    }
    spA.needsUpdate = true;
    sprayMat.opacity = 0.4 + (speed - 18) / (SPEED_MAX - 18) * 0.5;

    // Drift clouds slowly across the sky
    for (const c of clouds) {
      c.position.x += c.userData.drift * dt;
      if (c.position.x > 80) c.position.x = -80;
    }

    // Drift bird flocks (and flap their wings)
    for (const flock of birds) {
      flock.position.x += flock.userData.speed * dt;
      if (flock.position.x > 80) {
        flock.position.x = -80;
        flock.position.y = 20 + Math.random() * 10;
        flock.position.z = -80 - Math.random() * 50;
      }
      for (const b of flock.children) {
        b.userData.flap += dt * 6;
        b.rotation.x = Math.sin(b.userData.flap) * 0.4;
      }
    }

    // Pulse god rays
    const grT = now * 0.001;
    for (const ray of godRayGroup.children) {
      ray.rotation.z = ray.userData.baseRot + Math.sin(grT * 0.6 + ray.userData.phase) * 0.12;
      ray.material.opacity = 0.12 + (Math.sin(grT * 0.9 + ray.userData.phase) * 0.5 + 0.5) * 0.14;
    }

    // Sway forest trees in a gentle wind
    for (const tr of swayableTrees) {
      tr.rotation.z = Math.sin(grT * tr.userData.swayFreq + tr.userData.swayPhase) * tr.userData.swayAmp;
    }

    // Scroll snowmen with the world and recycle when they pass the camera
    for (const sm of snowmen) {
      sm.position.z += dz;
      if (sm.position.z > 8) {
        sm.position.z -= SLOPE_LEN * 2;
        sm.position.x = (Math.random() < 0.5 ? -1 : 1) * (SLOPE_HALFW + 1.6 + Math.random() * 4);
      }
    }

    // Scroll cabins; recycle to back when they pass; animate smoke puffs
    for (const cab of cabins) {
      cab.position.z += dz;
      if (cab.position.z > 12) {
        cab.position.z -= SLOPE_LEN * 2;
        // Re-randomize side
        const side = Math.random() < 0.5 ? -1 : 1;
        cab.position.x = side * (12 + Math.random() * 16);
        cab.rotation.y = (side > 0 ? -1 : 1) * (Math.PI / 2 + (Math.random() - 0.5) * 0.5);
      }
      // Animate smoke
      if (cab.userData.smoke) {
        for (const puff of cab.userData.smoke.children) {
          puff.userData.life -= dt * 0.45;
          if (puff.userData.life <= 0) {
            puff.userData.life = 1.0;
            puff.position.y = 3.5;
            puff.position.x = 0.8 + (Math.random() - 0.5) * 0.2;
            puff.material.opacity = 0.65;
            puff.scale.setScalar(puff.userData.baseScale);
          } else {
            puff.position.y += dt * 1.1;
            puff.position.x += dt * 0.25;
            puff.material.opacity = puff.userData.life * 0.6;
            puff.scale.multiplyScalar(1 + dt * 0.5);
          }
        }
      }
    }

    // Skid trail: drop a small mark on the snow every short distance traveled
    lastSkidZ += dz;
    if (lastSkidZ > 0.35 && playerGroup.position.y < 0.3) {
      lastSkidZ = 0;
      for (const off of [-0.38, 0.38]) {
        const s = skidPool[skidWrite];
        skidWrite = (skidWrite + 1) % SKID_POOL;
        s.position.set(playerGroup.position.x + off, 0.03, 0.4);
        s.material.opacity = 0.55;
        s.userData.life = 1.6;
        s.visible = true;
      }
    }
    for (const s of skidPool) {
      if (!s.visible) continue;
      s.position.z += dz;
      s.userData.life -= dt;
      s.material.opacity = Math.max(0, s.userData.life / 1.6) * 0.55;
      if (s.userData.life <= 0 || s.position.z > 12) s.visible = false;
    }

    // Confetti update
    const cPos = confettiGeo.attributes.position;
    for (let i = 0; i < CONFETTI_MAX; i++) {
      if (confettiLife[i] <= 0) continue;
      confettiLife[i] -= dt;
      // Scroll with world
      cPos.array[i * 3]     += confettiVel[i * 3]     * dt;
      cPos.array[i * 3 + 1] += confettiVel[i * 3 + 1] * dt;
      cPos.array[i * 3 + 2] += confettiVel[i * 3 + 2] * dt + dz;
      confettiVel[i * 3 + 1] -= 9 * dt;
      if (cPos.array[i * 3 + 1] < 0) confettiLife[i] = 0;
    }
    cPos.needsUpdate = true;
    confettiMat.opacity = 1.0;

    // Speed vignette + streak lines, ramping in at high speed
    const speedFrac = Math.max(0, (speed - 24) / (SPEED_MAX - 24));
    const sv = document.getElementById('speedVignette');
    const sl = document.getElementById('speedLines');
    if (sv) sv.style.opacity = speedFrac * 0.9;
    if (sl) sl.style.opacity = speedFrac * 0.7;

    // ----- Collision detection -----
    const px = playerGroup.position.x;
    const py = playerGroup.position.y;
    for (const o of obstacles) {
      if (o.z < -1.0 || o.z > 1.6) continue;
      const dx = Math.abs(o.mesh.position.x - px);
      if (dx > 0.9) continue;
      // Vertical pass: rocks skippable by jumping, low branches by ducking
      if (o.highOK && py > 1.0) continue;
      if (o.lowOK && ducking && py < 0.4) continue;
      crash();
      break;
    }
    for (let i = collectibles.length - 1; i >= 0; i--) {
      const c = collectibles[i];
      if (c.z < -1.0 || c.z > 1.6) continue;
      const dx = Math.abs(c.mesh.position.x - px);
      const dy = Math.abs(c.mesh.position.y - (py + 1.05));
      if (dx < 0.75 && dy < 1.1) {
        scene.remove(c.mesh);
        collectibles.splice(i, 1);
        gifts++;
        distance += 50;
        document.getElementById('giftCount').textContent = gifts;
        flashTint('255,255,255', 0.45, 90);
        spawnConfetti(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z);
      }
    }
  } else {
    // Crash tumble
    crashTumble += dt;
    playerGroup.rotation.z += dt * 5;
    playerGroup.rotation.x += dt * 3.5;
    playerGroup.position.y = Math.max(playerGroup.position.y - dt * 1.4, -0.5);
  }

  // Camera subtle sway based on player x
  camera.position.x = playerGroup.position.x * 0.18;
  camera.lookAt(playerGroup.position.x * 0.4, 1.6, -8);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

} // end start()
</script>

</html>
