<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/escaperoad2city/">
  <title>Escape Road City 2 — Night</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #05060f; width: 100%; height: 100%; overflow: hidden; font-family: monospace; }
    #gameContainer { position: absolute; }
    #gameContainer canvas { position: absolute; }

    /* Strip the sunlight: drop the canvas to deep nighttime brightness with a cool cast.
       The slow hue cycle is preserved so the neon mood from the overlays still varies the scene,
       but it pivots around a much darker baseline so it reads as night rather than tinted day. */
    #gameContainer canvas {
      filter: brightness(0.38) contrast(1.25) saturate(0.95);
      animation: neonShift 22s linear infinite;
    }
    @keyframes neonShift {
      0%   { filter: brightness(0.38) contrast(1.25) saturate(0.95) hue-rotate(0deg); }
      25%  { filter: brightness(0.36) contrast(1.28) saturate(1.05) hue-rotate(25deg); }
      50%  { filter: brightness(0.4)  contrast(1.25) saturate(0.95) hue-rotate(-20deg); }
      75%  { filter: brightness(0.36) contrast(1.28) saturate(1.05) hue-rotate(15deg); }
      100% { filter: brightness(0.38) contrast(1.25) saturate(0.95) hue-rotate(0deg); }
    }
    /* Deep-blue nighttime tint multiplied over the entire scene — kills the daylit feel */
    #nightTint {
      position: fixed; inset: 0;
      background: rgba(8, 14, 44, 0.55);
      pointer-events: none;
      mix-blend-mode: multiply;
      z-index: 3;
    }

    /* Night sky fade — deep blue at top dissolving toward horizon */
    #nightSky {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom,
        rgba(6, 8, 22, 0.7)  0%,
        rgba(10, 16, 40, 0.5) 35%,
        rgba(20, 14, 40, 0.15) 60%,
        rgba(0, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: 5;
    }
    /* Vignette */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 35%,
        rgba(0,0,0,0.35) 70%,
        rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      mix-blend-mode: multiply;
      z-index: 6;
    }
    /* Animated neon color wash */
    #neonWash {
      position: fixed; inset: 0;
      pointer-events: none;
      opacity: 0.18;
      mix-blend-mode: screen;
      animation: washCycle 8s ease-in-out infinite;
      z-index: 7;
    }
    @keyframes washCycle {
      0%   { background: radial-gradient(circle at 20% 30%, rgba(255, 60, 180, 0.6),  transparent 60%); }
      20%  { background: radial-gradient(circle at 75% 45%, rgba(60, 200, 255, 0.6),  transparent 60%); }
      40%  { background: radial-gradient(circle at 50% 70%, rgba(255, 220, 60, 0.55), transparent 60%); }
      60%  { background: radial-gradient(circle at 30% 60%, rgba(120, 60, 255, 0.6),  transparent 60%); }
      80%  { background: radial-gradient(circle at 70% 25%, rgba(60, 255, 180, 0.55), transparent 60%); }
      100% { background: radial-gradient(circle at 20% 30%, rgba(255, 60, 180, 0.6),  transparent 60%); }
    }
    /* Animated street lamps — dense rows of warm and cool pools along the bottom + a mid-distance row */
    #streetLamps {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        /* --- Foreground row (big, bright, alternating warm amber & cool LED-white) --- */
        radial-gradient(ellipse 9vw 7vh at 4% 94%,  rgba(255, 200, 110, 0.55), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 14% 92%, rgba(240, 245, 255, 0.45), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 24% 95%, rgba(255, 190, 90,  0.5),  transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 34% 92%, rgba(255, 205, 120, 0.55), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 44% 95%, rgba(245, 250, 255, 0.45), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 54% 92%, rgba(255, 195, 95,  0.5),  transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 64% 95%, rgba(255, 200, 110, 0.55), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 74% 92%, rgba(240, 245, 255, 0.45), transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 84% 95%, rgba(255, 190, 90,  0.5),  transparent 60%),
        radial-gradient(ellipse 9vw 7vh at 94% 92%, rgba(255, 205, 120, 0.55), transparent 60%),
        /* --- Mid-distance row (smaller, dimmer, sits around 75% of the screen height) --- */
        radial-gradient(ellipse 5vw 3.5vh at 8% 74%,  rgba(255, 200, 130, 0.32), transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 20% 76%, rgba(255, 195, 110, 0.3),  transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 32% 74%, rgba(240, 245, 255, 0.28), transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 44% 76%, rgba(255, 200, 130, 0.32), transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 56% 74%, rgba(255, 195, 110, 0.3),  transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 68% 76%, rgba(240, 245, 255, 0.28), transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 80% 74%, rgba(255, 200, 130, 0.32), transparent 65%),
        radial-gradient(ellipse 5vw 3.5vh at 92% 76%, rgba(255, 195, 110, 0.3),  transparent 65%),
        /* --- Far-distance row (tiny pinpricks near the horizon for skyline depth) --- */
        radial-gradient(ellipse 2.2vw 1.4vh at 12% 56%, rgba(255, 220, 160, 0.22), transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 24% 58%, rgba(255, 215, 150, 0.2),  transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 38% 56%, rgba(245, 250, 255, 0.18), transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 50% 58%, rgba(255, 220, 160, 0.22), transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 62% 56%, rgba(255, 215, 150, 0.2),  transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 74% 58%, rgba(245, 250, 255, 0.18), transparent 70%),
        radial-gradient(ellipse 2.2vw 1.4vh at 86% 56%, rgba(255, 220, 160, 0.22), transparent 70%);
      mix-blend-mode: screen;
      animation: lampPulse 3.5s ease-in-out infinite;
    }
    @keyframes lampPulse {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    /* Road-side lamps — a dense, brighter column down each edge of the screen so they
       read as "streetlights along the road" no matter what camera angle the game uses
       (top-down OR chase). Each lamp is a tighter, more intense bloom. */
    #roadLamps {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        /* === LEFT column — bright, dense, stretching from the bottom to the horizon === */
        radial-gradient(circle  4vmin at 16% 95%, rgba(255, 215, 140, 0.95), transparent 60%),
        radial-gradient(circle 3.5vmin at 17% 85%, rgba(255, 210, 120, 0.9),  transparent 60%),
        radial-gradient(circle 3.2vmin at 18% 75%, rgba(255, 215, 140, 0.85), transparent 60%),
        radial-gradient(circle 2.8vmin at 19% 65%, rgba(255, 210, 120, 0.8),  transparent 60%),
        radial-gradient(circle 2.4vmin at 20% 55%, rgba(255, 215, 140, 0.75), transparent 60%),
        radial-gradient(circle 2.0vmin at 21% 45%, rgba(255, 210, 120, 0.7),  transparent 60%),
        radial-gradient(circle 1.6vmin at 22% 35%, rgba(255, 215, 140, 0.65), transparent 60%),
        radial-gradient(circle 1.3vmin at 23% 25%, rgba(255, 210, 120, 0.6),  transparent 60%),
        radial-gradient(circle 1.0vmin at 24% 15%, rgba(255, 215, 140, 0.55), transparent 60%),
        /* === RIGHT column — mirrored === */
        radial-gradient(circle  4vmin at 84% 95%, rgba(255, 215, 140, 0.95), transparent 60%),
        radial-gradient(circle 3.5vmin at 83% 85%, rgba(255, 210, 120, 0.9),  transparent 60%),
        radial-gradient(circle 3.2vmin at 82% 75%, rgba(255, 215, 140, 0.85), transparent 60%),
        radial-gradient(circle 2.8vmin at 81% 65%, rgba(255, 210, 120, 0.8),  transparent 60%),
        radial-gradient(circle 2.4vmin at 80% 55%, rgba(255, 215, 140, 0.75), transparent 60%),
        radial-gradient(circle 2.0vmin at 79% 45%, rgba(255, 210, 120, 0.7),  transparent 60%),
        radial-gradient(circle 1.6vmin at 78% 35%, rgba(255, 215, 140, 0.65), transparent 60%),
        radial-gradient(circle 1.3vmin at 77% 25%, rgba(255, 210, 120, 0.6),  transparent 60%),
        radial-gradient(circle 1.0vmin at 76% 15%, rgba(255, 215, 140, 0.55), transparent 60%);
      mix-blend-mode: screen;
      animation: lampPulse 3.5s ease-in-out infinite;
    }
    /* Emergency-strobe flash every ~6s */
    #flashStrobe {
      position: fixed; inset: 0;
      pointer-events: none;
      background: rgba(80, 160, 255, 0);
      z-index: 8;
      mix-blend-mode: screen;
      animation: strobe 6s steps(20, end) infinite;
    }
    @keyframes strobe {
      0%, 92%, 100% { background: rgba(80, 160, 255, 0); }
      93%   { background: rgba(80, 160, 255, 0.18); }
      94%   { background: rgba(255, 80, 90,  0.18); }
      95%   { background: rgba(80, 160, 255, 0.22); }
      96%   { background: rgba(255, 80, 90,  0.18); }
      97%   { background: rgba(80, 160, 255, 0.14); }
    }
    /* Subtle scanlines */
    #scanlines {
      position: fixed; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0) 4px);
      z-index: 9;
    }
    /* Toggle button */
    #nightToggle {
      position: fixed; top: 10px; right: 10px;
      background: rgba(15, 18, 38, 0.85);
      color: #aaddff;
      border: 1px solid rgba(100, 180, 255, 0.4);
      padding: 6px 12px;
      font: 12px monospace;
      cursor: pointer;
      z-index: 20;
      border-radius: 4px;
    }
    #nightToggle:hover { background: rgba(35, 50, 90, 0.9); }
    body.night-off #gameContainer canvas { filter: none; animation: none; }
    body.night-off #nightTint,
    body.night-off #nightSky,
    body.night-off #vignette,
    body.night-off #neonWash,
    body.night-off #streetLamps,
    body.night-off #roadLamps,
    body.night-off #flashStrobe,
    body.night-off #scanlines { display: none; }
  </style>
</head>
<body>

  <script id="gmsoft-jssdk" src="gmsoftsdk_v5.js"></script>

  <div id="gameContainer" style="display:none;">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBar" style="color:#aaddff; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:monospace; z-index:30;">
    loading... <span id="pct">0%</span>
  </div>

  <!-- Night-time overlay layers (rendered above the Unity canvas) -->
  <div id="nightTint"></div>
  <div id="streetLamps"></div>
  <div id="roadLamps"></div>
  <div id="nightSky"></div>
  <div id="vignette"></div>
  <div id="neonWash"></div>
  <div id="flashStrobe"></div>
  <div id="scanlines"></div>
  <button id="nightToggle" onclick="document.body.classList.toggle('night-off')">Toggle Night</button>

  <script>
    function firebaseLogEvent() {}
    function firebaseLogEventParameter() {}
    function firebaseSetUserProperties() {}
  </script>

  <script>
    var canvas = document.getElementById("unity-canvas");
    var container = document.getElementById("gameContainer");
    var loadingBar = document.getElementById("loadingBar");

    var buildUrl = "Build";
    var config = {
      dataUrl:         buildUrl + "/escape-road-city-2-v25022604.data.unityweb",
      frameworkUrl:    buildUrl + "/escape-road-city-2-v25022604.framework.js.unityweb",
      codeUrl:         buildUrl + "/escape-road-city-2-v25022604.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "azgames.io",
      productName: "Escape Road City 2",
      productVersion: "25051505",
      pubId: "",
      gameId: "escape-road-city-2",
      enableMoreGame: "yes",
      enablePromotion: true,
      eventLog: false
    };

    function onResize() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var r = 540 / 960;
      if (w * r > h) w = Math.ceil(h / r);
      h = Math.floor(w * r);
      container.style.width  = canvas.style.width  = w + "px";
      container.style.height = canvas.style.height = h + "px";
      container.style.top  = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left = Math.floor((window.innerWidth  - w) / 2) + "px";
    }
    onResize();
    window.addEventListener("resize", onResize);

    var script = document.createElement("script");
    script.src = buildUrl + "/escape-road-city-2-v25022604.loader.js";
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        document.getElementById("pct").innerText = Math.round(progress * 100) + "%";
      }).then(function(instance) {
        window.unityInstance = instance;
        setTimeout(function() {
          loadingBar.style.display = "none";
          container.style.display = "block";
          window.focus();
        }, 2000);
      }).catch(function(msg) {
        alert(msg);
      });
    };
    script.onerror = function() {
      loadingBar.textContent = 'Failed to load game (CDN unreachable).';
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
