<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtOS</title>
<style>
  :root{
    --accent:#2d7dd2; --accent2:#19c3b1;
    --glass:rgba(20,26,40,0.72); --glassb:rgba(255,255,255,0.14);
    --text:#f2f5fa;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);user-select:none;}
  #desktop{position:fixed;inset:0;background-size:cover;background-position:center;transition:background .4s;}
  /* ---------- boot ---------- */
  #boot{position:fixed;inset:0;background:#0a0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
  #boot.gone{opacity:0;pointer-events:none;}
  .logo{font-size:64px;font-weight:800;letter-spacing:2px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .spin{margin-top:30px;width:34px;height:34px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent2);border-radius:50%;animation:sp 1s linear infinite;}
  .bootmsg{margin-top:18px;font-size:13px;opacity:.6;font-family:Consolas,monospace;min-height:18px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  /* ---------- desktop icons ---------- */
  #icons{position:absolute;top:18px;left:18px;display:flex;flex-direction:column;flex-wrap:wrap;gap:6px;max-height:calc(100% - 70px);}
  .dicon{width:92px;height:92px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-align:center;padding:8px;}
  .dicon:hover{background:rgba(255,255,255,0.12);}
  .dicon .em{font-size:34px;}
  .dicon .nm{font-size:12px;line-height:1.1;text-shadow:0 1px 4px rgba(0,0,0,.6);}
  /* ---------- windows ---------- */
  .win{position:absolute;min-width:240px;min-height:160px;background:var(--glass);backdrop-filter:blur(14px);
    border:1px solid var(--glassb);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden;}
  .win.max{border-radius:0;}
  .titlebar{height:38px;display:flex;align-items:center;gap:8px;padding:0 8px 0 12px;cursor:move;
    background:rgba(255,255,255,0.06);border-bottom:1px solid var(--glassb);}
  .titlebar .tt{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .titlebar .em{font-size:15px;}
  .wbtn{width:26px;height:26px;border:none;border-radius:7px;background:transparent;color:var(--text);cursor:pointer;font-size:14px;display:grid;place-items:center;}
  .wbtn:hover{background:rgba(255,255,255,0.16);}
  .wbtn.close:hover{background:#e54848;}
  .wbody{flex:1;overflow:auto;position:relative;}
  .wbody iframe{width:100%;height:100%;border:none;background:#fff;}
  .rsz{position:absolute;width:16px;height:16px;right:0;bottom:0;cursor:nwse-resize;}
  /* ---------- taskbar ---------- */
  #taskbar{position:fixed;left:0;right:0;bottom:0;height:54px;display:flex;align-items:center;gap:6px;padding:0 10px;
    background:var(--glass);backdrop-filter:blur(16px);border-top:1px solid var(--glassb);z-index:5000;}
  #startbtn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;cursor:pointer;font-weight:600;}
  #startbtn:hover,#startbtn.open{background:rgba(255,255,255,0.16);}
  .qsep{width:1px;height:28px;background:var(--glassb);margin:0 4px;}
  #quick{display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;}
  #quick::-webkit-scrollbar{height:0;}
  .tbtn{display:flex;align-items:center;gap:6px;height:38px;padding:0 12px;border-radius:8px;cursor:pointer;font-size:13px;max-width:180px;flex:0 0 auto;}
  .tbtn .em{font-size:16px;}
  .tbtn .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tbtn:hover{background:rgba(255,255,255,0.12);}
  .tbtn.active{background:rgba(255,255,255,0.2);}
  .tbtn{position:relative;}
  .tbtn.running::after{content:"";position:absolute;left:50%;bottom:2px;transform:translateX(-50%);
    width:16px;height:3px;border-radius:3px;background:var(--accent2);opacity:.9;}
  .tbtn.active.running::after{width:22px;}
  /* right-click context menu */
  #ctxmenu{position:fixed;min-width:184px;background:var(--glass);backdrop-filter:blur(16px);
    border:1px solid var(--glassb);border-radius:10px;box-shadow:0 16px 50px rgba(0,0,0,.55);
    z-index:7000;padding:6px;display:none;}
  #ctxmenu.open{display:block;}
  .ctxitem{padding:9px 12px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;gap:9px;align-items:center;}
  .ctxitem:hover{background:rgba(255,255,255,0.14);}
  #tray{margin-left:auto;display:flex;align-items:center;gap:14px;padding-right:6px;font-size:13px;}
  #clock{text-align:right;line-height:1.15;cursor:default;}
  #clock .t{font-weight:600;} #clock .d{font-size:11px;opacity:.7;}
  /* ---------- start menu ---------- */
  #startmenu{position:fixed;left:10px;bottom:62px;width:380px;max-width:calc(100% - 20px);
    background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glassb);border-radius:14px;
    box-shadow:0 24px 70px rgba(0,0,0,.55);z-index:6000;padding:16px;display:none;}
  #startmenu.open{display:block;animation:rise .15s ease;}
  @keyframes rise{from{transform:translateY(8px);opacity:0;}to{transform:none;opacity:1;}}
  #startmenu h3{margin:0 0 12px;font-size:13px;opacity:.7;font-weight:600;}
  .smgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .smapp{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:10px;cursor:pointer;text-align:center;font-size:12px;}
  .smapp:hover{background:rgba(255,255,255,0.14);}
  .smapp .em{font-size:30px;}
  .smfoot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--glassb);font-size:13px;}
  .smfoot button{background:transparent;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;}
  .smfoot button:hover{background:rgba(255,255,255,0.14);}
  /* ---------- app internals ---------- */
  .term{font-family:Consolas,monospace;font-size:13px;background:#0c1018;height:100%;padding:10px;overflow:auto;color:#d7e2f0;}
  .term .line{white-space:pre-wrap;word-break:break-word;}
  .term .prompt{color:#19c3b1;}
  .term input{background:transparent;border:none;color:#d7e2f0;font-family:inherit;font-size:inherit;outline:none;width:70%;}
  .note{display:flex;flex-direction:column;height:100%;}
  .note textarea{flex:1;border:none;resize:none;padding:12px;font-family:Consolas,monospace;font-size:14px;background:#0e1320;color:#eaf0fa;outline:none;}
  .note .bar{display:flex;gap:6px;padding:6px;background:rgba(255,255,255,0.05);border-bottom:1px solid var(--glassb);}
  .note .bar button,.calc button,.settings button,.files .bar button{background:rgba(255,255,255,0.1);border:1px solid var(--glassb);color:var(--text);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px;}
  .files{height:100%;display:flex;flex-direction:column;}
  .files .bar{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid var(--glassb);font-size:13px;}
  .files .grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,84px);gap:10px;padding:14px;align-content:start;overflow:auto;}
  .fitem{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px;border-radius:9px;cursor:pointer;text-align:center;font-size:12px;}
  .fitem:hover{background:rgba(255,255,255,0.12);}
  .fitem .em{font-size:32px;}
  .fchoose{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;}
  .fchoose h3{font-size:17px;font-weight:600;opacity:.9;}
  .fcards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  .fcard{width:210px;background:rgba(255,255,255,0.06);border:1px solid var(--glassb);border-radius:14px;padding:22px 18px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .fcard:hover{background:rgba(255,255,255,0.13);transform:translateY(-3px);}
  .fcard .em{font-size:44px;}
  .fcard b{font-size:15px;}
  .fcard small{opacity:.65;font-size:12px;line-height:1.45;}
  .files .bar #fpath{opacity:.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .calc{display:flex;flex-direction:column;height:100%;background:#0e1320;padding:12px;gap:10px;}
  .calc .disp{background:#0b0f18;border-radius:10px;padding:14px;font-size:26px;text-align:right;min-height:54px;font-family:Consolas,monospace;overflow:hidden;}
  .calc .pad{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .calc .pad button{font-size:18px;border-radius:10px;border:1px solid var(--glassb);background:rgba(255,255,255,0.07);color:var(--text);cursor:pointer;}
  .calc .pad button.op{background:rgba(45,125,210,0.4);} .calc .pad button.eq{background:linear-gradient(135deg,var(--accent),var(--accent2));}
  .settings{padding:18px;height:100%;overflow:auto;font-size:14px;}
  .settings h2{margin:0 0 6px;} .settings .sec{margin:18px 0;}
  .settings .swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .swatch{width:54px;height:38px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
  .swatch.sel{border-color:#fff;}
  .accents{display:flex;gap:10px;margin-top:8px;}
  .acc{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .acc.sel{border-color:#fff;}
  .about{padding:22px;height:100%;overflow:auto;}
  .about .big{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .about table{margin-top:14px;font-size:13px;} .about td{padding:3px 14px 3px 0;opacity:.9;}
  .launch{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:24px;}
  .launch a{padding:12px 22px;border-radius:10px;text-decoration:none;color:#fff;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));}
  /* ---------- v1.4 shared ---------- */
  .tabs{display:flex;gap:4px;padding:8px;background:rgba(255,255,255,0.05);border-bottom:1px solid var(--glassb);}
  .tab{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;opacity:.7;}
  .tab.sel{background:rgba(255,255,255,0.16);opacity:1;font-weight:600;}
  .btn{background:rgba(255,255,255,0.1);border:1px solid var(--glassb);color:var(--text);border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px;}
  .btn:hover{background:rgba(255,255,255,0.18);}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;font-weight:600;}
  /* ---------- toasts ---------- */
  #toasts{position:fixed;right:14px;bottom:66px;display:flex;flex-direction:column;gap:10px;z-index:8000;align-items:flex-end;}
  .toast{display:flex;gap:12px;align-items:flex-start;min-width:240px;max-width:340px;padding:13px 15px;border-radius:12px;
    background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glassb);box-shadow:0 16px 50px rgba(0,0,0,.55);animation:toastIn .25s ease;}
  .toast .tem{font-size:24px;}
  .toast .tt{font-weight:600;font-size:14px;margin-bottom:2px;}
  .toast .tm{font-size:12px;opacity:.8;line-height:1.4;}
  @keyframes toastIn{from{transform:translateX(30px);opacity:0;}to{transform:none;opacity:1;}}
  .toast.out{animation:toastOut .3s ease forwards;}
  @keyframes toastOut{to{transform:translateX(40px);opacity:0;}}
  /* ---------- clock ---------- */
  .clockapp{height:100%;display:flex;flex-direction:column;background:#0e1320;}
  .clockapp .face{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
  .clockapp .big{font-size:clamp(38px,11vw,72px);font-weight:700;font-family:Consolas,monospace;letter-spacing:1px;}
  .clockapp .sub{opacity:.7;font-size:15px;}
  .clockapp .swatch-time{font-size:clamp(34px,9vw,60px);font-family:Consolas,monospace;font-weight:700;}
  .clockapp .ctrls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .world{display:flex;flex-direction:column;gap:8px;padding:14px;overflow:auto;}
  .world .row{display:flex;justify-content:space-between;padding:11px 14px;border-radius:10px;background:rgba(255,255,255,0.06);}
  .world .row b{font-weight:600;} .world .row .z{opacity:.6;font-size:12px;}
  .laps{max-height:130px;overflow:auto;width:min(280px,90%);font-family:Consolas,monospace;font-size:13px;}
  .laps div{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid var(--glassb);}
  .timerset{display:flex;gap:8px;align-items:center;font-size:22px;font-family:Consolas,monospace;}
  .timerset input{width:64px;font-size:22px;text-align:center;background:#0b0f18;border:1px solid var(--glassb);color:var(--text);border-radius:8px;padding:6px;}
  /* ---------- calendar ---------- */
  .calapp{height:100%;display:flex;flex-direction:column;padding:12px;background:#0e1320;}
  .calapp .head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .calapp .head .mlabel{flex:1;text-align:center;font-size:17px;font-weight:600;}
  .calgrid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:4px;}
  .calgrid .dow{text-align:center;font-size:11px;opacity:.6;padding:2px;grid-row:1;}
  .cell{border-radius:8px;padding:5px;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;flex-direction:column;gap:3px;font-size:12px;overflow:hidden;}
  .cell:hover{background:rgba(255,255,255,0.12);}
  .cell.other{opacity:.32;} .cell.today{outline:2px solid var(--accent2);}
  .cell .dn{font-weight:600;} .cell .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);}
  .evlist{max-height:118px;overflow:auto;margin-top:8px;font-size:13px;}
  .evlist .ev{display:flex;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:7px;background:rgba(255,255,255,0.06);margin-bottom:5px;}
  .evlist .ev button{background:transparent;border:none;color:#e88;cursor:pointer;font-size:13px;}
  /* ---------- paint ---------- */
  .paint{height:100%;display:flex;flex-direction:column;background:#0e1320;}
  .paint .tools{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid var(--glassb);flex-wrap:wrap;}
  .paint .pal{display:flex;gap:5px;}
  .paint .sw{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
  .paint .sw.sel{border-color:#fff;}
  .paint canvas{flex:1;width:100%;background:#fff;cursor:crosshair;touch-action:none;}
  .paint input[type=range]{width:90px;}
  /* ---------- tasks ---------- */
  .tasks{height:100%;display:flex;flex-direction:column;background:#0e1320;}
  .tasks .add{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--glassb);}
  .tasks .add input{flex:1;background:#0b0f18;border:1px solid var(--glassb);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;}
  .tasks .filters{display:flex;gap:6px;padding:8px 12px;font-size:12px;align-items:center;}
  .tasks .filters .spacer{flex:1;}
  .tasks .list{flex:1;overflow:auto;padding:6px 12px;}
  .titem{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;margin-bottom:6px;background:rgba(255,255,255,0.05);}
  .titem.done .tx{text-decoration:line-through;opacity:.5;}
  .titem .tx{flex:1;font-size:14px;word-break:break-word;}
  .titem input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent2);}
  .titem .del{background:transparent;border:none;color:#e88;cursor:pointer;font-size:15px;}
  /* ---------- sysmon ---------- */
  .sysmon{height:100%;overflow:auto;padding:16px;background:#0e1320;font-size:13px;}
  .sysmon .card{background:rgba(255,255,255,0.05);border:1px solid var(--glassb);border-radius:11px;padding:14px;margin-bottom:12px;}
  .sysmon .card h4{margin:0 0 10px;font-size:13px;opacity:.8;font-weight:600;display:flex;justify-content:space-between;}
  .meter{height:10px;border-radius:6px;background:rgba(255,255,255,0.08);overflow:hidden;margin:6px 0;}
  .meter > span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  .sysmon .kv{display:flex;justify-content:space-between;padding:4px 0;opacity:.9;}
  .spark{display:flex;align-items:flex-end;gap:2px;height:46px;margin-top:6px;}
  .spark i{flex:1;background:linear-gradient(180deg,var(--accent2),var(--accent));border-radius:2px 2px 0 0;min-height:2px;}
  /* ---------- notepad+ / calc+ / settings+ ---------- */
  .note .status{display:flex;gap:14px;padding:5px 12px;font-size:11px;opacity:.65;background:rgba(255,255,255,0.04);border-top:1px solid var(--glassb);font-family:Consolas,monospace;}
  .note .find{display:none;gap:6px;padding:6px;background:rgba(255,255,255,0.06);border-bottom:1px solid var(--glassb);}
  .note .find.show{display:flex;}
  .note .find input{background:#0b0f18;border:1px solid var(--glassb);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;}
  .calc .pad button.fn{background:rgba(255,255,255,0.04);font-size:14px;}
  .calc .pad button.mem{background:rgba(25,195,177,0.22);font-size:13px;}
  .calc .chist{font-family:Consolas,monospace;font-size:12px;opacity:.6;text-align:right;min-height:18px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .calc .padsci{grid-template-columns:repeat(5,1fr);}
  .calc .histbox{max-height:96px;overflow:auto;font-family:Consolas,monospace;font-size:12px;background:#0b0f18;border-radius:8px;padding:6px;display:none;}
  .calc .histbox.show{display:block;} .calc .histbox div{padding:2px 4px;cursor:pointer;border-radius:4px;}
  .calc .histbox div:hover{background:rgba(255,255,255,0.1);}
  .settings .row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:10px;}
  .settings input[type=text]{background:#0b0f18;border:1px solid var(--glassb);color:var(--text);border-radius:7px;padding:7px 10px;font-size:13px;}
  .toggle{position:relative;width:46px;height:25px;border-radius:14px;background:rgba(255,255,255,0.15);cursor:pointer;transition:.2s;flex:0 0 auto;}
  .toggle.on{background:var(--accent);}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;}
  .toggle.on::after{left:24px;}
  body.light{--glass:rgba(245,247,251,0.82);--glassb:rgba(0,0,0,0.12);--text:#161b25;}
  body.light .term,body.light .note textarea,body.light .calc,body.light .clockapp,body.light .calapp,
  body.light .paint,body.light .tasks,body.light .sysmon{background:#eef2f8;color:#161b25;}
  body.noanim *{transition:none!important;animation:none!important;}
  /* desktop right-click menu reuses #ctxmenu */
</style>
</head>
<body>

<div id="desktop">
  <div id="icons"></div>
</div>

<div id="startmenu">
  <h3>ALL APPS</h3>
  <div class="smgrid" id="smgrid"></div>
  <div class="smfoot">
    <span style="opacity:.7">👤 You</span>
    <div>
      <button onclick="ArtOS.app('settings')">⚙ Settings</button>
      <button onclick="ArtOS.reboot()">⏻ Reboot</button>
    </div>
  </div>
</div>

<div id="ctxmenu"></div>
<div id="toasts"></div>

<div id="taskbar">
  <div id="startbtn"><span style="font-size:18px">≡</span> Start</div>
  <div class="qsep"></div>
  <div id="quick"></div>
  <div id="tray">
    <span id="netbatt">📶 🔋</span>
    <div id="clock"><div class="t">--:--</div><div class="d">---</div></div>
  </div>
</div>

<div id="boot">
  <div class="logo">ArtOS</div>
  <div class="spin"></div>
  <div class="bootmsg" id="bootmsg"></div>
</div>

<script>
(function(){
  // ---------------------------------------------------------------- app registry
  const APPS = {
    "math":     {icon:"🧮", name:"Math Solver", kind:"iframe", url:"../math-solver/"},
    "resup":    {icon:"⬆️", name:"ResUp",       kind:"iframe", url:"../resup/"},
    "nova":     {icon:"🌐", name:"Nova Browser",kind:"nova",   url:"http://127.0.0.1:5098/"},
    "aria":     {icon:"🎬", name:"Aria Player", kind:"native", target:"aria"},
    "ariaos":   {icon:"🎞️", name:"Aria ArtOS Media Player", kind:"iframe", url:"../aria/"},
    "youtube":  {icon:"▶️", name:"YouTube",     kind:"iframe", url:"../youtube/"},
    "claude":   {icon:"✳️", name:"Claude Code", kind:"iframe", url:"../claude/"},
    "converter":{icon:"📼", name:"Converter",   kind:"native", target:"converter"},
    "imagine":  {icon:"🖼️", name:"Imagine",     kind:"native", target:"imagine"},

  };
  const DESKTOP = ["math","resup","nova","aria","ariaos","youtube","claude","converter","imagine","recolor","store","files","terminal","notepad","calc","clock","calendar","paint","tasks","sysmon","settings","about"];
  const QUICK   = ["math","files","terminal","notepad","store"];

  const WALLPAPERS = [
    "linear-gradient(135deg,#141e30,#243b55)",
    "linear-gradient(135deg,#0f2027,#203a43,#2c5364)",
    "linear-gradient(135deg,#42275a,#734b6d)",
    "linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d)",
    "linear-gradient(135deg,#0b486b,#f56217)",
    "radial-gradient(circle at 30% 20%,#3a1c71,#d76d77,#ffaf7b)",
  ];
  const ACCENTS = [["#2d7dd2","#19c3b1"],["#7b2ff7","#f107a3"],["#ff512f","#dd2476"],
                   ["#11998e","#38ef7d"],["#fc5c7d","#6a82fb"],["#f7971e","#ffd200"]];

  const $ = s => document.querySelector(s);
  const store = {
    get:(k,d)=>{try{return JSON.parse(localStorage.getItem("artos:"+k))??d;}catch(e){return d;}},
    set:(k,v)=>localStorage.setItem("artos:"+k,JSON.stringify(v)),
  };

  let zTop = 10, winCount = 0;
  const windows = {};         // id -> {el, app, min, prev}
  let pinned = store.get("pinned", QUICK.slice());   // pinned app ids (persisted)
  if(!pinned.includes("store")){ pinned.push("store"); store.set("pinned",pinned); }  // store ships pinned even for existing layouts
  const taskBtns = {};        // appId -> taskbar button element

  // ---------------------------------------------------------------- window manager
  function makeWindow(appId){
    const app = APPS[appId];
    // focus existing single-instance window
    for(const id in windows){ if(windows[id].app===appId){ focus(id); unmin(id); return; } }

    const id = "w"+(++winCount);
    const el = document.createElement("div");
    el.className = "win";
    const w = Math.min(720, innerWidth-80), h = Math.min(520, innerHeight-120);
    el.style.width = w+"px"; el.style.height = h+"px";
    el.style.left = (40 + (winCount%6)*26)+"px";
    el.style.top  = (40 + (winCount%6)*22)+"px";
    el.style.zIndex = ++zTop;
    el.innerHTML =
      `<div class="titlebar"><span class="em">${app.icon}</span><span class="tt">${app.name}</span>`+
      `<button class="wbtn min" title="Minimize">─</button>`+
      `<button class="wbtn maxb" title="Maximize">▢</button>`+
      `<button class="wbtn close" title="Close">✕</button></div>`+
      `<div class="wbody"></div><div class="rsz"></div>`;
    $("#desktop").appendChild(el);

    const body = el.querySelector(".wbody");
    buildApp(appId, body);

    el.addEventListener("mousedown", ()=>focus(id));
    dragify(el.querySelector(".titlebar"), el, id);
    resizify(el.querySelector(".rsz"), el);
    el.querySelector(".close").onclick = e=>{e.stopPropagation();closeWin(id);};
    el.querySelector(".min").onclick   = e=>{e.stopPropagation();minimize(id);};
    el.querySelector(".maxb").onclick  = e=>{e.stopPropagation();toggleMax(id);};
    el.querySelector(".titlebar").ondblclick = ()=>toggleMax(id);

    windows[id] = {el, app:appId, min:false, prev:null};
    renderTaskbar();
    focus(id);
    return id;
  }

  // ---- app-centric taskbar (pinned + running) --------------------------------
  function runningId(appId){ for(const id in windows){ if(windows[id].app===appId) return id; } return null; }

  function renderTaskbar(){
    const q = $("#quick");
    const order = pinned.slice();
    for(const id in windows){ const a=windows[id].app; if(!order.includes(a)) order.push(a); }
    // drop buttons no longer pinned or running
    for(const a in taskBtns){ if(!order.includes(a)){ taskBtns[a].remove(); delete taskBtns[a]; } }
    order.forEach(appId=>{
      let b = taskBtns[appId];
      if(!b){
        const app=APPS[appId];
        b=document.createElement("div"); b.className="tbtn";
        b.innerHTML=`<span class="em">${app.icon}</span><span class="lbl">${app.name}</span>`;
        b.title=app.name;
        b.onclick=()=>onTaskClick(appId);
        b.oncontextmenu=(e)=>{ e.preventDefault(); showCtx(e, appId); };
        taskBtns[appId]=b;
      }
      q.appendChild(b);   // re-append enforces order
    });
    updateTaskActive();
  }
  function updateTaskActive(){
    for(const a in taskBtns){
      const id=runningId(a), running=!!id;
      taskBtns[a].classList.toggle("running", running);
      taskBtns[a].classList.toggle("active", running && !windows[id].min && windows[id].el.style.zIndex==zTop);
    }
  }
  function onTaskClick(appId){
    const id=runningId(appId);
    if(!id){ makeWindow(appId); return; }
    const W=windows[id];
    if(W.min){ unmin(id); focus(id); }
    else if(W.el.style.zIndex==zTop){ minimize(id); }
    else focus(id);
  }

  function focus(id){
    const W = windows[id]; if(!W) return;
    W.el.style.zIndex = ++zTop;
    updateTaskActive();
  }
  function minimize(id){ const W=windows[id]; W.min=true; W.el.style.display="none"; updateTaskActive(); }
  function unmin(id){ const W=windows[id]; W.min=false; W.el.style.display="flex"; updateTaskActive(); }
  function closeWin(id){ const W=windows[id]; if(!W)return; W.el.remove(); delete windows[id]; renderTaskbar(); }

  // ---- pinning + context menu ------------------------------------------------
  const isPinned = appId => pinned.includes(appId);
  function pin(appId){ if(!isPinned(appId)){ pinned.push(appId); store.set("pinned",pinned); renderTaskbar(); } }
  function unpin(appId){ pinned=pinned.filter(a=>a!==appId); store.set("pinned",pinned); renderTaskbar(); }

  function showCtx(e, appId){
    const m=$("#ctxmenu"); m.innerHTML="";
    const add=(label,fn)=>{ const d=document.createElement("div"); d.className="ctxitem"; d.textContent=label;
      d.onclick=()=>{ fn(); hideCtx(); }; m.appendChild(d); };
    add("Open", ()=>makeWindow(appId));
    add(isPinned(appId)?"📌 Unpin from taskbar":"📌 Pin to taskbar", ()=> isPinned(appId)?unpin(appId):pin(appId));
    if(runningId(appId)) add("Close window", ()=>{ const id=runningId(appId); if(id) closeWin(id); });
    m.classList.add("open");
    const h=m.offsetHeight, w=m.offsetWidth;
    m.style.left=Math.min(e.clientX, innerWidth-w-6)+"px";
    let top=e.clientY-h-4; if(top<4) top=e.clientY+4;
    m.style.top=top+"px";
  }
  function hideCtx(){ $("#ctxmenu").classList.remove("open"); }
  function toggleMax(id){
    const W=windows[id], el=W.el;
    if(el.classList.contains("max")){
      el.classList.remove("max"); Object.assign(el.style, W.prev);
    } else {
      W.prev={left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
      el.classList.add("max");
      Object.assign(el.style,{left:"0px",top:"0px",width:"100%",height:(innerHeight-54)+"px"});
    }
  }
  function dragify(handle, el, id){
    handle.addEventListener("mousedown", e=>{
      if(e.target.classList.contains("wbtn")) return;
      if(el.classList.contains("max")) return;
      focus(id);
      const sx=e.clientX, sy=e.clientY, ox=el.offsetLeft, oy=el.offsetTop;
      const mv=ev=>{ el.style.left=Math.max(0,Math.min(innerWidth-60,ox+ev.clientX-sx))+"px";
                     el.style.top =Math.max(0,Math.min(innerHeight-90,oy+ev.clientY-sy))+"px"; };
      const up=()=>{document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
      document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
    });
  }
  function resizify(handle, el){
    handle.addEventListener("mousedown", e=>{
      e.stopPropagation();
      const sx=e.clientX, sy=e.clientY, ow=el.offsetWidth, oh=el.offsetHeight;
      const mv=ev=>{ el.style.width=Math.max(240,ow+ev.clientX-sx)+"px";
                     el.style.height=Math.max(160,oh+ev.clientY-sy)+"px"; };
      const up=()=>{document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
      document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
    });
  }

  // ---------------------------------------------------------------- app builders
  function buildApp(appId, body){
    const app = APPS[appId];
    if(app.kind==="iframe"){
      body.innerHTML = `<iframe src="${app.url}" allow="clipboard-write"></iframe>`;
    } else if(app.kind==="terminal") buildTerminal(body);
    else if(app.kind==="notepad")  buildNotepad(body);
    else if(app.kind==="files")    buildFiles(body);
    else if(app.kind==="calc")     buildCalc(body);
    else if(app.kind==="settings") buildSettings(body);
    else if(app.kind==="about")    buildAbout(body);
    else if(app.kind==="nova")     buildNova(body, app);
    else if(app.kind==="native")   buildNative(body, app);
    else if(app.kind==="clock")    buildClock(body);
    else if(app.kind==="calendar") buildCalendar(body);
    else if(app.kind==="paint")    buildPaint(body);
    else if(app.kind==="tasks")    buildTasks(body);
    else if(app.kind==="sysmon")   buildSysmon(body);
  }

  // --- Nova Browser: embed Nova's own search server (runs inside ArtOS desktop)
  function buildNova(body, app){
    let tries = 0;
    (function load(){
      if(window.__artosDesktop){
        body.innerHTML = `<iframe src="${app.url}" allow="clipboard-write"></iframe>`;
      } else if(tries++ < 14){
        body.innerHTML = `<div class="launch"><div style="font-size:48px">${app.icon}</div>
          <div style="opacity:.8">Starting ${app.name}…</div></div>`;

          <div style="font-size:20px;font-weight:700">${app.name}</div>

          Launch ArtOS Desktop (start.bat) to browse with Nova right here in a window.</p></div>`;
      }
    })();
  }

  // --- Native app launcher (e.g. Nova Browser) — works in the ArtOS desktop app
  function buildNative(body, app){
    body.innerHTML = `<div class="launch">
      <div style="font-size:54px">${app.icon}</div>
      <div style="font-size:20px;font-weight:700">${app.name}</div>
      <p style="opacity:.8;max-width:360px">Opens the ${app.name} app installed on this computer.</p>
      <a href="#" id="nvGo">Open ${app.name}</a>

    const msg = body.querySelector("#nvMsg");
    const go = ()=>{ const ok = ArtOS.launchNative(app.target);
      msg.textContent = ok ? `Launching ${app.name}…`
        : `${app.name} is a native app — available when ArtOS runs as the desktop app.`; };
    body.querySelector("#nvGo").onclick = e=>{ e.preventDefault(); go(); };

  }

  // --- Terminal (history, tab-completion, extended commands)
  const TERM_CMDS=["help","echo","clear","date","whoami","ls","pwd","open","apps","calc","neofetch","sysinfo","uptime","history","theme","wall","accent","version","cowsay","random","about","reboot","kernel","boot"];
  // ArtOS kernel (the real bare-metal x86_64 kernel) reproduced in-terminal.
  const KERNEL_CMDS=["help","echo","clear","calc","cpuid","mem","date","regs","colors","banner","uptime","ticks","ver","about","panic","reboot","halt","exit"];
  const KPALETTE=[["black","#000000"],["blue","#0000aa"],["green","#00aa00"],["cyan","#00aaaa"],["red","#aa0000"],["magenta","#aa00aa"],["brown","#aa5500"],["lgray","#aaaaaa"],["dgray","#555555"],["lblue","#5555ff"],["lgreen","#55ff55"],["lcyan","#55ffff"],["lred","#ff5555"],["pink","#ff55ff"],["yellow","#ffff55"],["white","#ffffff"]];
  const KBANNER=['    _         _    ___  ____','   / \\   _ __| |_ / _ \\/ ___|','  / _ \\ | \'__| __| | | \\___ \\',' / ___ \\| |  | |_| |_| |___) |','/_/   \\_\\_|   \\__|\\___/|____/'];
  // Integer expression evaluator mirroring the kernel's calc (hex, %, int division).
  function kcalc(s){
    let i=0; const t=s;
    const ws=()=>{ while(i<t.length && t[i]===' ') i++; };
    const peek=()=>{ ws(); return t[i]; };
    function num(){ ws();
      if(t[i]==='0' && (t[i+1]==='x'||t[i+1]==='X')){ i+=2; const st=i; let v=0;
        while(i<t.length && /[0-9a-fA-F]/.test(t[i])){ v=v*16+parseInt(t[i],16); i++; }
        if(i===st) throw "bad hex literal"; return v; }
      const st=i; let v=0;
      while(i<t.length && t[i]>='0' && t[i]<='9'){ v=v*10+(t.charCodeAt(i)-48); i++; }
      if(i===st) throw "expected a number"; return v; }
    function factor(){ const c=peek();
      if(c==='-'){ i++; return -factor(); }
      if(c==='+'){ i++; return factor(); }
      if(c==='('){ i++; const v=expr(); if(peek()!==')') throw "missing ')'"; i++; return v; }
      return num(); }
    function term(){ let v=factor();
      for(;;){ const c=peek();
        if(c==='*'){ i++; v=v*factor(); }
        else if(c==='/'){ i++; const d=factor(); if(d===0) throw "division by zero"; v=Math.trunc(v/d); }
        else if(c==='%'){ i++; const d=factor(); if(d===0) throw "division by zero"; v=v%d; }
        else return v; } }
    function expr(){ let v=term();
      for(;;){ const c=peek();
        if(c==='+'){ i++; v=v+term(); }
        else if(c==='-'){ i++; v=v-term(); }
        else return v; } }
    const r=expr(); if(peek()!==undefined) throw "unexpected trailing characters"; return r;
  }
  const khex=v=> (v<0?"-0x"+(-v).toString(16):"0x"+v.toString(16));
  function buildTerminal(body){
    body.innerHTML = `<div class="term" id="termOut"></div>`;
    const out = body.querySelector(".term");
    const print = (t, cls)=>{ const d=document.createElement("div"); d.className="line"+(cls?" "+cls:""); d.textContent=t; out.appendChild(d); out.scrollTop=out.scrollHeight; };
    const printH = (html, cls)=>{ const d=document.createElement("div"); d.className="line"+(cls?" "+cls:""); d.innerHTML=html; out.appendChild(d); out.scrollTop=out.scrollHeight; };
    const clearTerm = ()=>{ out.innerHTML=""; };
    print("ArtOS Terminal 1.4 “Horizon” — type 'help'. Use ↑/↓ for history, Tab to complete.");
    const hist=store.get("termhist",[]); let hi=hist.length;

    // ---- ArtOS kernel mode (faithful reproduction of the bare-metal kernel) ----
    let kmode=false, kbootTs=0;
    function kernelBoot(){
      clearTerm();
      printH('<span style="color:#55ffff">ArtOS kernel 2.0.0</span>');
      printH('<span style="color:#777">================================================</span>');
      [["long mode active, paging on",".........."],["remapping PIC (IRQ 0x20..0x2f)","......."],
       ["loading IDT (256 vectors)","............"],["programming PIT timer @ 100 Hz","......."],
       ["unmasking timer + keyboard IRQs","......"],["enabling interrupts (sti)","............"]]
        .forEach(([m,d])=>printH('[ boot ] '+m+' '+d+' <span style="color:#55ff55">ok</span>'));
      print("");
      printH('<span style="color:#ffff55">Welcome to ArtOS. Type \'help\' for commands.</span>');
      print("");
      kbootTs=Date.now();
    }
    // returns true to leave kernel mode
    function kernelCmd(raw){
      const s=raw.trim(); if(!s) return false;
      const sp=s.indexOf(" "); const cmd=(sp<0?s:s.slice(0,sp)); const rest=(sp<0?"":s.slice(sp+1).trim());
      switch(cmd){
        case "help":
          print("ArtOS kernel shell - commands:");
          [["help","this message"],["echo <text>","print text"],["clear","clear the screen"],
           ["calc <expr>","evaluate an integer expression"],["cpuid","CPU vendor, brand and features"],
           ["mem","memory map (from multiboot)"],["date","current date/time (CMOS RTC)"],
           ["regs","control registers + RFLAGS"],["colors","show the 16-colour palette"],
           ["banner","print the ArtOS banner"],["uptime","seconds since boot (PIT @ 100 Hz)"],
           ["ticks","raw timer tick count"],["ver","kernel version"],["about","about ArtOS"],
           ["panic","trigger a CPU exception (demo)"],["reboot","reset the machine"],
           ["halt","stop the CPU"],["exit","return to the ArtOS terminal"]]
            .forEach(([c,d])=>print("  "+c.padEnd(15)+" "+d));
          return false;
        case "echo": print(rest); return false;
        case "clear": clearTerm(); return false;
        case "calc":
          if(!rest){ print("usage: calc <expression>   e.g. calc (2+3)*7"); }
          else { try{ const v=kcalc(rest); print(rest+" = "+v+" ("+khex(v)+")"); }catch(e){ print("calc: "+e); } }
          return false;
        case "cpuid":
          print("vendor:   ArtOSVirtual");
          print("brand:    ArtOS Virtual CPU @ "+(navigator.hardwareConcurrency||4)+" cores");
          print("features: edx=0x078bfbfd ecx=0x80002001");
          [["fpu",1],["pae",1],["apic",1],["sse",1],["sse2",1],["avx",0]].forEach(([n,o])=>print("  ["+(o?"x":" ")+"] "+n));
          return false;
        case "regs":
          print("CR0=0x0000000080000011  CR2=0x0000000000000000");
          print("CR3=0x0000000000116000  CR4=0x0000000000000020");
          print("RFLAGS=0x0000000000000006");
          print("paging=true pe=true pae=true long=true");
          return false;
        case "mem":
          print("memory: 639 KiB low + 64384 KiB high = 63 MiB");
          print("memory map:");
          [["0x000000000000","0x00000009fc00","639","usable"],["0x00000009fc00","0x00000a0000","1","reserved"],
           ["0x00000f0000","0x000000100000","64","reserved"],["0x000000100000","0x0003fe0000","64384","usable"],
           ["0x0003fe0000","0x000004000000","128","reserved"],["0x00fffc0000","0x000100000000","256","reserved"]]
            .forEach(([a,b,k,t])=>print("  "+a+" - "+b+"  "+k.padStart(6)+" KiB  "+t));
          return false;
        case "date": case "time": {
          const d=new Date(), p=n=>String(n).padStart(2,"0");
          print(d.getUTCFullYear()+"-"+p(d.getUTCMonth()+1)+"-"+p(d.getUTCDate())+" "+p(d.getUTCHours())+":"+p(d.getUTCMinutes())+":"+p(d.getUTCSeconds())+" UTC");
          return false; }
        case "colors":
          printH(KPALETTE.map(([n,c])=>'<span style="color:'+c+'"> '+n+' </span>').join(""));
          return false;
        case "banner":
          KBANNER.forEach(l=>printH('<span style="color:#55ffff">'+escapeHtml(l)+'</span>'));
          return false;
        case "uptime": { const s=(Date.now()-kbootTs)/1000; print("up "+Math.floor(s)+"."+String(Math.floor((s%1)*100)).padStart(2,"0")+"s"); return false; }
        case "ticks": print(String(Math.floor((Date.now()-kbootTs)/10))); return false;
        case "ver": case "version": print("ArtOS kernel 2.0.0 (x86_64, long mode)"); return false;
        case "about":
          printH('<span style="color:#55ffff">ArtOS - a from-scratch x86_64 kernel.</span>');
          print("Boots via multiboot, runs in 64-bit long mode,");
          print("with its own GDT, IDT, PIC, PIT timer and PS/2 keyboard.");
          return false;
        case "panic":
          print("triggering a divide-by-zero...");
          printH('<span style="background:#aa0000;color:#fff"> *** KERNEL PANIC: Divide-by-zero (vector 0, err 0x0) *** </span>');
          printH('<span style="background:#aa0000;color:#fff"> RIP=0x0000000000101a41  RSP=0x0000000000113e80 </span>');
          printH('<span style="background:#aa0000;color:#fff"> System halted. </span>');
          print("(back to the ArtOS terminal)");
          return true;
        case "reboot": print("rebooting..."); kernelBoot(); return false;
        case "halt": print("halted. (back to the ArtOS terminal)"); return true;
        case "exit": print("leaving kernel — back to the ArtOS terminal."); return true;
        default: print("unknown command: "+cmd+" (try 'help')"); return false;
      }
    }

    function newPrompt(){
      const line=document.createElement("div"); line.className="line";
      line.innerHTML = kmode
        ? `<span style="color:#19c3b1">artos</span><span style="color:#9fb0c3">&gt; </span><input autofocus>`
        : `<span class="prompt">${escapeHtml(store.get("username","you"))}@artos</span>:~$ <input autofocus>`;
      out.appendChild(line); const inp=line.querySelector("input"); inp.focus(); out.scrollTop=out.scrollHeight;
      inp.addEventListener("keydown", e=>{
        if(e.key==="Enter"){ const v=inp.value; inp.outerHTML=" "+escapeHtml(v);
          if(v.trim()){ hist.push(v); if(hist.length>100)hist.shift(); store.set("termhist",hist); } hi=hist.length;
          if(kmode){ if(kernelCmd(v)) kmode=false; }
          else if(v.trim()==="kernel" || v.trim()==="boot"){ kmode=true; kernelBoot(); }
          else { runCmd(v,print); }
          newPrompt(); }
        else if(e.key==="ArrowUp"){ if(hi>0){ hi--; inp.value=hist[hi]||""; } e.preventDefault(); }
        else if(e.key==="ArrowDown"){ if(hi<hist.length-1){ hi++; inp.value=hist[hi]||""; } else { hi=hist.length; inp.value=""; } e.preventDefault(); }
        else if(e.key==="Tab"){ e.preventDefault(); const p=inp.value.split(/\s+/);
          if(kmode){ const m=KERNEL_CMDS.filter(c=>c.startsWith(p[0])); if(m.length===1) inp.value=m[0]+" "; else if(m.length>1) print(m.join("  ")); }
          else if(p[0]==="open" && p.length===2){ const m=Object.keys(APPS).filter(a=>a.startsWith(p[1]));
            if(m.length===1) inp.value="open "+m[0]; else if(m.length>1) print(m.join("  ")); }
          else { const m=TERM_CMDS.filter(c=>c.startsWith(p[0])); if(m.length===1) inp.value=m[0]+" "; else if(m.length>1) print(m.join("  ")); } }
      });
    }
    newPrompt();
    out.addEventListener("click", ()=>{ const i=out.querySelector("input"); if(i)i.focus(); });
  }
  function runCmd(raw, print){
    const [cmd,...args]=raw.trim().split(/\s+/); const rest=args.join(" ");
    switch((cmd||"").toLowerCase()){
      case "": break;
      case "help": print("Commands: help, echo, clear, date, whoami, ls, pwd, open <app>, apps, calc <expr>, neofetch, sysinfo, uptime, history, theme <dark|light>, wall <n>, accent <n>, version, cowsay <text>, random [max], about, reboot, kernel"); print("Tip: 'kernel' boots the ArtOS x86_64 kernel right here (type 'exit' to leave)."); break;
      case "echo": print(rest); break;
      case "clear": $("#termOut").innerHTML=""; break;
      case "date": print(new Date().toString()); break;
      case "whoami": print(store.get("username","you")); break;
      case "pwd": print("/home/"+store.get("username","you")); break;
      case "ls": print("Documents  Pictures  Music  Projects  readme.txt"); break;
      case "apps": print(Object.keys(APPS).join("  ")); break;
      case "open": if(APPS[rest]){AprtOpen(rest);print("Opening "+APPS[rest].name+"…");}else print("No such app: "+rest); break;
      case "calc": try{print(String(calcEval(rest)));}catch(e){print("calc: bad expression");} break;
      case "about": AprtOpen("about"); break;
      case "reboot": ArtOS.reboot(); break;
      case "neofetch": case "sysinfo": neofetch(print); break;
      case "uptime": { const s=Math.floor((Date.now()-BOOT_TS)/1000); print("up "+Math.floor(s/3600)+"h "+Math.floor(s%3600/60)+"m "+s%60+"s"); } break;
      case "history": store.get("termhist",[]).forEach((h,i)=>print(" "+(i+1)+"  "+h)); break;
      case "theme": if(rest==="light"||rest==="dark"){ document.body.classList.toggle("light",rest==="light"); store.set("theme",rest); print("Theme set to "+rest); } else print("usage: theme dark|light"); break;
      case "wall": { const n=+rest; if(n>=0&&n<WALLPAPERS.length){ setWall(n); store.set("wall",n); print("Wallpaper "+n); } else print("usage: wall 0-"+(WALLPAPERS.length-1)); } break;
      case "accent": { const n=+rest; if(n>=0&&n<ACCENTS.length){ setAccent(n); store.set("accent",n); print("Accent "+n); } else print("usage: accent 0-"+(ACCENTS.length-1)); } break;
      case "version": print("ArtOS 1.4 “Horizon”"); break;
      case "random": { const max=+rest||100; print(String(Math.floor(Math.random()*max)+1)); } break;
      case "cowsay": { const t=rest||"moo"; print(" "+"_".repeat(t.length+2)); print("< "+t+" >"); print(" "+"-".repeat(t.length+2));
        ["        \\   ^__^","         \\  (oo)\\_______","            (__)\\       )\\/\\","                ||----w |","                ||     ||"].forEach(l=>print(l)); } break;
      default: print(cmd+": command not found");
    }
  }
  function neofetch(print){
    const up=Math.floor((Date.now()-BOOT_TS)/1000);
    ["       _______        ","      / ArtOS  \\      OS: ArtOS 1.4 “Horizon”",
     "     |  ^   ^  |     Shell: artsh","     |    <    |     WM: GlassWM",
     "     |  \\___/  |     Apps: "+Object.keys(APPS).length+"   Uptime: "+Math.floor(up/60)+"m",
     "      \\_______/      Host: "+(location.host||"local")].forEach(l=>print(l));
  }

  function buildNotepad(body){

        <button class="btn" data-a="frep">Replace</button>
        <button class="btn" data-a="frepall">All</button>
      </div>
      <textarea spellcheck="false" placeholder="Start typing…"></textarea>
      <div class="status"><span id="npstat"></span><span style="flex:1"></span><span id="nppos"></span></div>
    </div>`;
    const ta=body.querySelector("textarea"), nm=body.querySelector("#npname");
    const stat=body.querySelector("#npstat"), pos=body.querySelector("#nppos"), findbar=body.querySelector("#npfind");
    let size=store.get("npsize",14); ta.style.fontSize=size+"px";
    const draft=store.get("npdraft",null); if(draft) ta.value=draft;
    function updateStats(){
      const v=ta.value, words=(v.match(/\S+/g)||[]).length, lines=v?v.split(/\n/).length:0;
      stat.textContent=`${v.length} chars · ${words} words · ${lines} lines`;
      const upto=v.slice(0,ta.selectionStart||0), ln=upto.split("\n").length, col=upto.length-upto.lastIndexOf("\n");
      pos.textContent=`Ln ${ln}, Col ${col}`;
    }
    ta.addEventListener("input",()=>{ updateStats(); store.set("npdraft",ta.value); });
    ta.addEventListener("keyup",updateStats); ta.addEventListener("click",updateStats);
    body.querySelector('[data-a="new"]').onclick=()=>{ if(ta.value && !confirm("Clear the current note?"))return; ta.value=""; nm.textContent="untitled"; store.set("npdraft",""); updateStats(); };
    body.querySelector('[data-a="save"]').onclick=()=>{
      const name=prompt("Save as:", nm.textContent==="untitled"?"note1":nm.textContent); if(!name)return;
      const docs=store.get("docs",{}); docs[name]=ta.value; store.set("docs",docs); nm.textContent=name; notify("📝","Notepad","Saved “"+name+"”"); };
    body.querySelector('[data-a="open"]').onclick=()=>{
      const docs=store.get("docs",{}), keys=Object.keys(docs);
      if(!keys.length){alert("No saved notes yet.");return;}
      const name=prompt("Open which? "+keys.join(", "), keys[0]);
      if(name&&docs[name]!=null){ ta.value=docs[name]; nm.textContent=name; updateStats(); } };
    body.querySelector('[data-a="download"]').onclick=()=>{
      const a=document.createElement("a"); a.download=(nm.textContent==="untitled"?"note":nm.textContent).replace(/\.txt$/,"")+".txt";
      a.href=URL.createObjectURL(new Blob([ta.value],{type:"text/plain"})); a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); };
    body.querySelector('[data-a="wrap"]').onclick=()=>{ ta.style.whiteSpace = ta.style.whiteSpace==="pre"?"pre-wrap":"pre"; };
    body.querySelector('[data-a="finc"]').onclick=()=>{ size=Math.min(34,size+1); ta.style.fontSize=size+"px"; store.set("npsize",size); };
    body.querySelector('[data-a="fdec"]').onclick=()=>{ size=Math.max(9,size-1); ta.style.fontSize=size+"px"; store.set("npsize",size); };
    body.querySelector('[data-a="find"]').onclick=()=>{ findbar.classList.toggle("show"); if(findbar.classList.contains("show"))body.querySelector("#npq").focus(); };
    function findNext(){ const q=body.querySelector("#npq").value; if(!q)return;
      let idx=ta.value.indexOf(q, ta.selectionEnd||0); if(idx<0) idx=ta.value.indexOf(q,0);
      if(idx>=0){ ta.focus(); ta.setSelectionRange(idx,idx+q.length); updateStats(); } }
    body.querySelector('[data-a="fnext"]').onclick=findNext;
    body.querySelector('[data-a="frep"]').onclick=()=>{ const q=body.querySelector("#npq").value, r=body.querySelector("#npr").value;
      if(q && ta.value.substring(ta.selectionStart,ta.selectionEnd)===q){ ta.setRangeText(r,ta.selectionStart,ta.selectionEnd,"end"); store.set("npdraft",ta.value); }
      findNext(); updateStats(); };
    body.querySelector('[data-a="frepall"]').onclick=()=>{ const q=body.querySelector("#npq").value, r=body.querySelector("#npr").value;
      if(!q)return; ta.value=ta.value.split(q).join(r); store.set("npdraft",ta.value); updateStats(); };
    updateStats();
  }

  // --- Calculator (standard + scientific, memory keys, history, keyboard)
  function buildCalc(body){
    let expr="", mem=0, deg=true, sci=false, showHist=false; const hist=[];
    function sciEval(raw){
      let s=raw.replace(/π/g,"PI").replace(/e/g,"E").replace(/\^/g,"**").replace(/√/g,"sqrt").replace(/%/g,"/100");
      s=s.replace(/(\d+(?:\.\d+)?)!/g,"fact($1)");
      const ids=s.replace(/\*\*/g," ").match(/[A-Za-z]+/g)||[];
      const ok={sin:1,cos:1,tan:1,asin:1,acos:1,atan:1,log:1,ln:1,sqrt:1,abs:1,fact:1,PI:1,E:1};
      for(const id of ids) if(!ok[id]) throw "bad";
      const D=deg?Math.PI/180:1;
      const env={ sin:x=>Math.sin(x*D),cos:x=>Math.cos(x*D),tan:x=>Math.tan(x*D),
        asin:x=>Math.asin(x)/D,acos:x=>Math.acos(x)/D,atan:x=>Math.atan(x)/D,
        log:x=>Math.log10(x),ln:x=>Math.log(x),sqrt:Math.sqrt,abs:Math.abs,
        fact:n=>{n=Math.round(n);if(n<0||n>170)return NaN;let r=1;for(let i=2;i<=n;i++)r*=i;return r;},
        PI:Math.PI,E:Math.E };
      const r=new Function(...Object.keys(env),'"use strict";return ('+s+')')(...Object.values(env));
      if(typeof r!=="number"||!isFinite(r)) throw "bad"; return Math.round(r*1e12)/1e12;
    }
    function render(){
      body.innerHTML=`<div class="calc" tabindex="0">
        <div class="chist" id="chist"></div>
        <div class="disp" id="cd">0</div>
        <div class="histbox" id="chbox"></div>
        <div style="display:flex;gap:6px;font-size:12px">
          <button class="btn" id="cmode">${sci?"🔢 Standard":"🔬 Scientific"}</button>
          <button class="btn" id="cdeg" style="${sci?"":"display:none"}">${deg?"DEG":"RAD"}</button>
          <button class="btn" id="chtog">🕘 History</button>
          <span style="flex:1"></span><span style="opacity:.55;align-self:center" id="cmem"></span>
        </div>
        <div class="pad${sci?" padsci":""}" id="cpad"></div></div>`;
      const calc=body.querySelector(".calc"), disp=body.querySelector("#cd"), pad=body.querySelector("#cpad");
      const chist=body.querySelector("#chist"), chbox=body.querySelector("#chbox"), cmem=body.querySelector("#cmem");
      const sciRows=["sin","cos","tan","ln","log","√","^","!","π","e"];
      const stdRows=sci
        ? ["MC","MR","M+","M-","C","7","8","9","/","⌫","4","5","6","*","%","1","2","3","-","(","0",".","=","+",")"]
        : ["C","(",")","⌫","7","8","9","/","4","5","6","*","1","2","3","-","0",".","=","+"];
      const keys = sci ? sciRows.concat(stdRows) : stdRows;
      function refresh(){
        disp.textContent=expr||"0";
        cmem.textContent = mem ? "M: "+mem : "";
        chbox.classList.toggle("show",showHist);
        chbox.innerHTML = hist.length? hist.map((h,i)=>`<div data-i="${i}">${escapeHtml(h)}</div>`).join("") : `<div style="opacity:.5">No history yet</div>`;
        chbox.querySelectorAll("div[data-i]").forEach(d=> d.onclick=()=>{ expr=hist[+d.dataset.i].split(" = ")[0]; refresh(); });
      }
      function val(){ try{return sciEval(expr);}catch(e){return NaN;} }
      function press(k){
        if(expr==="Error" && k!=="C" && k!=="⌫") expr="";
        switch(k){
          case "C": expr=""; break;
          case "⌫": expr=expr.slice(0,-1); break;
          case "=": try{ const r=sciEval(expr); if(expr.trim()){ hist.unshift(expr+" = "+r); if(hist.length>20)hist.pop(); chist.textContent=expr+" ="; } expr=String(r); }catch(e){ expr="Error"; } break;
          case "MC": mem=0; break;
          case "MR": expr+=String(mem); break;
          case "M+": { const v=val(); if(!isNaN(v))mem+=v; } break;
          case "M-": { const v=val(); if(!isNaN(v))mem-=v; } break;
          case "√": expr+="√("; break;
          case "sin": case "cos": case "tan": case "ln": case "log": expr+=k+"("; break;
          default: expr+=k;
        }
        refresh();
      }
      keys.forEach(k=>{ const b=document.createElement("button"); b.textContent=k;
        if("+-*/".includes(k)&&k.length===1) b.className="op";
        else if(k==="=") b.className="eq";
        else if(["MC","MR","M+","M-"].includes(k)) b.className="mem";
        else if(sciRows.includes(k)) b.className="fn";
        b.onclick=()=>press(k); pad.appendChild(b); });
      body.querySelector("#cmode").onclick=()=>{ sci=!sci; render(); };
      body.querySelector("#cdeg").onclick=()=>{ deg=!deg; render(); };
      body.querySelector("#chtog").onclick=()=>{ showHist=!showHist; refresh(); };
      calc.addEventListener("keydown",e=>{ const k=e.key;
        if(k.length===1 && /[0-9.+\-*/()^%!]/.test(k)){ press(k); e.preventDefault(); }
        else if(k==="Enter"||k==="="){ press("="); e.preventDefault(); }
        else if(k==="Backspace"){ press("⌫"); e.preventDefault(); }
        else if(k==="Escape"){ press("C"); e.preventDefault(); } });
      setTimeout(()=>calc.focus(),30);
      refresh();
    }
    render();
  }

  // ---------------------------------------------------------------- v1.4 apps
  const BOOT_TS = Date.now();
  function tick(el, fn, ms){ fn(); const iv=setInterval(()=>{ if(!el.isConnected){clearInterval(iv);return;} fn(); }, ms||1000); return iv; }
  function notify(icon,title,msg){
    const wrap=document.getElementById("toasts"); if(!wrap)return;
    const t=document.createElement("div"); t.className="toast";
    t.innerHTML=`<span class="tem">${icon}</span><div><div class="tt">${escapeHtml(title)}</div><div class="tm">${escapeHtml(msg)}</div></div>`;
    wrap.appendChild(t);
    setTimeout(()=>{ t.classList.add("out"); setTimeout(()=>t.remove(),320); }, 4200);
  }
  function beep(){ try{ const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    o.type="sine"; o.frequency.value=880; g.gain.value=0.14; o.start();
    setTimeout(()=>{o.frequency.value=660;},220);
    setTimeout(()=>{o.stop();ac.close();},460);
  }catch(e){} }

  // --- Clock (time / world / stopwatch / timer)
  function buildClock(body){
    body.innerHTML=`<div class="clockapp">
      <div class="tabs">
        <div class="tab sel" data-t="time">🕐 Time</div>
        <div class="tab" data-t="world">🌍 World</div>
        <div class="tab" data-t="stop">⏱️ Stopwatch</div>
        <div class="tab" data-t="timer">⏲️ Timer</div>
      </div>
      <div class="face" id="cface"></div></div>`;
    const face=body.querySelector("#cface"), tabs=body.querySelectorAll(".clockapp .tab");
    const h12=()=>!store.get("clock24",false);
    tabs.forEach(t=>t.onclick=()=>{ tabs.forEach(x=>x.classList.remove("sel")); t.classList.add("sel"); show(t.dataset.t); });
    function show(which){
      if(which==="time"){
        face.innerHTML=`<div class="big" id="ct">--:--:--</div><div class="sub" id="cd"></div>`;
        tick(face,()=>{ const d=new Date(), ct=face.querySelector("#ct"), cd=face.querySelector("#cd");
          if(ct)ct.textContent=d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:h12()});
          if(cd)cd.textContent=d.toLocaleDateString([], {weekday:"long",year:"numeric",month:"long",day:"numeric"}); });
      } else if(which==="world"){
        const zones=[["Local",undefined],["New York","America/New_York"],["London","Europe/London"],["Paris","Europe/Paris"],
          ["Dubai","Asia/Dubai"],["Tokyo","Asia/Tokyo"],["Sydney","Australia/Sydney"],["Los Angeles","America/Los_Angeles"]];
        face.innerHTML=`<div class="world" style="width:100%">`+zones.map((z,i)=>`<div class="row"><span><b>${z[0]}</b> <span class="z">${z[1]||Intl.DateTimeFormat().resolvedOptions().timeZone}</span></span><span id="wz${i}">—</span></div>`).join("")+`</div>`;
        tick(face,()=>{ zones.forEach((z,i)=>{ const el=face.querySelector("#wz"+i); if(!el)return;
          try{ el.textContent=new Date().toLocaleTimeString([], {timeZone:z[1],hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:h12()}); }catch(e){ el.textContent="—"; } }); });
      } else if(which==="stop"){
        face.innerHTML=`<div class="swatch-time" id="sw">00:00.00</div>
          <div class="ctrls"><button class="btn primary" id="swgo">Start</button><button class="btn" id="swlap">Lap</button><button class="btn" id="swrst">Reset</button></div>
          <div class="laps" id="laps"></div>`;
        let running=false, base=0, acc=0, lapn=0;
        const disp=face.querySelector("#sw"), go=face.querySelector("#swgo"), laps=face.querySelector("#laps");
        const f=ms=>{ const m=Math.floor(ms/60000), s=Math.floor(ms%60000/1000), cs=Math.floor(ms%1000/10);
          return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(cs).padStart(2,"0"); };
        function frame(){ if(!running||!disp.isConnected)return; disp.textContent=f(acc+performance.now()-base); requestAnimationFrame(frame); }
        go.onclick=()=>{ if(running){ acc+=performance.now()-base; running=false; go.textContent="Start"; go.classList.add("primary"); }
          else{ base=performance.now(); running=true; go.textContent="Stop"; go.classList.remove("primary"); frame(); } };
        face.querySelector("#swlap").onclick=()=>{ const t=acc+(running?performance.now()-base:0); const d=document.createElement("div");
          d.innerHTML=`<span>Lap ${++lapn}</span><span>${f(t)}</span>`; laps.prepend(d); };
        face.querySelector("#swrst").onclick=()=>{ running=false; acc=0; lapn=0; disp.textContent="00:00.00"; laps.innerHTML=""; go.textContent="Start"; go.classList.add("primary"); };
      } else if(which==="timer"){
        face.innerHTML=`<div class="timerset"><input id="tm" type="number" min="0" max="999" value="5"> :
          <input id="ts" type="number" min="0" max="59" value="0"></div>
          <div class="swatch-time" id="tdisp" style="display:none">00:00</div>
          <div class="ctrls"><button class="btn primary" id="tgo">Start</button><button class="btn" id="trst">Reset</button></div>`;
        let end=0, running=false;
        const setbox=face.querySelector(".timerset"), disp=face.querySelector("#tdisp"), go=face.querySelector("#tgo");
        const f=ms=>{ ms=Math.max(0,ms); const m=Math.floor(ms/60000), s=Math.floor(ms%60000/1000); return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"); };
        function frame(){ if(!running||!disp.isConnected)return; const left=end-performance.now(); disp.textContent=f(left);
          if(left<=0){ running=false; go.textContent="Start"; setbox.style.display=""; disp.style.display="none"; beep(); notify("⏲️","Timer","Time's up!"); return; }
          requestAnimationFrame(frame); }
        go.onclick=()=>{ if(running){ running=false; go.textContent="Start"; setbox.style.display=""; disp.style.display="none"; return; }
          const total=((+face.querySelector("#tm").value||0)*60+(+face.querySelector("#ts").value||0))*1000; if(total<=0)return;
          end=performance.now()+total; running=true; go.textContent="Stop"; setbox.style.display="none"; disp.style.display=""; frame(); };
        face.querySelector("#trst").onclick=()=>{ running=false; go.textContent="Start"; setbox.style.display=""; disp.style.display="none"; };
      }
    }
    show("time");
  }

  // --- Calendar (month view + local events)
  function buildCalendar(body){
    let view=new Date(); view.setDate(1);
    const key=(y,m,d)=> y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    function render(){
      const evs=store.get("events",{}), y=view.getFullYear(), m=view.getMonth();
      const today=new Date(), tk=key(today.getFullYear(),today.getMonth(),today.getDate());
      const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate(), prevDays=new Date(y,m,0).getDate();
      const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      let cells="";
      for(let i=first-1;i>=0;i--) cells+=`<div class="cell other"><span class="dn">${prevDays-i}</span></div>`;
      for(let d=1;d<=days;d++){ const k=key(y,m,d), has=evs[k]&&evs[k].length;
        cells+=`<div class="cell${k===tk?" today":""}" data-d="${d}"><span class="dn">${d}</span>${has?'<span class="dot"></span>':''}</div>`; }
      body.innerHTML=`<div class="calapp">
        <div class="head"><button class="btn" id="pm">‹</button><div class="mlabel">${view.toLocaleDateString([], {month:"long",year:"numeric"})}</div><button class="btn" id="tdy">Today</button><button class="btn" id="nm">›</button></div>
        <div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>
        <div class="evlist" id="evl"><div style="opacity:.5;font-size:12px">Click a day to add events.</div></div></div>`;
      body.querySelector("#pm").onclick=()=>{ view.setMonth(m-1); render(); };
      body.querySelector("#nm").onclick=()=>{ view.setMonth(m+1); render(); };
      body.querySelector("#tdy").onclick=()=>{ view=new Date(); view.setDate(1); render(); };
      body.querySelectorAll(".cell[data-d]").forEach(c=> c.onclick=()=>openDay(+c.dataset.d));
    }
    function openDay(d){
      const y=view.getFullYear(), m=view.getMonth(), k=key(y,m,d), evl=body.querySelector("#evl");
      const list=(store.get("events",{})[k])||[];
      evl.innerHTML=`<div style="font-weight:600;margin-bottom:6px">${new Date(y,m,d).toLocaleDateString([], {weekday:"long",month:"short",day:"numeric"})}
        <button class="btn" id="addev" style="float:right;padding:3px 10px">＋ Add</button></div>`
        +(list.length? list.map((e,i)=>`<div class="ev"><span>${escapeHtml(e)}</span><button data-i="${i}">✕</button></div>`).join("")
          : `<div style="opacity:.5;font-size:12px">No events.</div>`);
      evl.querySelector("#addev").onclick=()=>{ const t=prompt("New event on "+k+":"); if(!t)return;
        const ev=store.get("events",{}); (ev[k]=ev[k]||[]).push(t); store.set("events",ev); render(); openDay(d); };
      evl.querySelectorAll(".ev button").forEach(b=> b.onclick=()=>{ const ev=store.get("events",{}); ev[k].splice(+b.dataset.i,1); if(!ev[k].length)delete ev[k]; store.set("events",ev); render(); openDay(d); });
    }
    render();
  }

  // --- Paint (canvas)
  function buildPaint(body){
    body.innerHTML=`<div class="paint">
      <div class="tools">
        <div class="pal" id="pal"></div>
        <input type="color" id="pcustom" value="#222222" title="Custom color">
        <span style="font-size:12px;opacity:.7">Size</span><input type="range" id="psz" min="1" max="40" value="4">
        <button class="btn" id="perase">🩹 Eraser</button>
        <button class="btn" id="pclear">🗑 Clear</button>
        <button class="btn primary" id="psave">💾 Save</button>
      </div><canvas id="pcanvas"></canvas></div>`;
    const cv=body.querySelector("#pcanvas"), ctx=cv.getContext("2d");
    const colors=["#222222","#ffffff","#e53935","#fb8c00","#fdd835","#43a047","#1e88e5","#8e24aa","#6d4c41","#00acc1"];
    let color="#222222", size=4, erasing=false, drawing=false, last=null;
    const pal=body.querySelector("#pal"), eraseBtn=body.querySelector("#perase");
    colors.forEach((c,i)=>{ const s=document.createElement("div"); s.className="sw"+(i===0?" sel":""); s.style.background=c;
      s.onclick=()=>{ color=c; erasing=false; eraseBtn.classList.remove("primary"); pal.querySelectorAll(".sw").forEach(x=>x.classList.remove("sel")); s.classList.add("sel"); };
      pal.appendChild(s); });
    body.querySelector("#pcustom").oninput=e=>{ color=e.target.value; erasing=false; eraseBtn.classList.remove("primary"); pal.querySelectorAll(".sw").forEach(x=>x.classList.remove("sel")); };
    body.querySelector("#psz").oninput=e=>size=+e.target.value;
    eraseBtn.onclick=()=>{ erasing=!erasing; eraseBtn.classList.toggle("primary",erasing); };
    body.querySelector("#pclear").onclick=()=>{ ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height); };
    body.querySelector("#psave").onclick=()=>{ const a=document.createElement("a"); a.download="artos-paint.png"; a.href=cv.toDataURL(); a.click(); };
    function refit(){ if(!cv.isConnected)return; const r=cv.getBoundingClientRect();
      if(!r.width||(Math.abs(r.width-cv.width)<1&&Math.abs(r.height-cv.height)<1))return;
      let data=null; try{ if(cv.width)data=ctx.getImageData(0,0,cv.width,cv.height); }catch(e){}
      cv.width=r.width; cv.height=r.height; ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height); if(data)try{ctx.putImageData(data,0,0);}catch(e){} }
    setTimeout(refit,60);
    try{ const ro=new ResizeObserver(()=>{ if(!drawing)refit(); }); ro.observe(cv); }catch(e){}
    const pos=e=>{ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*cv.width/r.width, y:(e.clientY-r.top)*cv.height/r.height}; };
    const stroke=()=>{ ctx.strokeStyle=ctx.fillStyle=erasing?"#fff":color; ctx.lineWidth=size; ctx.lineCap="round"; ctx.lineJoin="round"; };
    cv.addEventListener("pointerdown",e=>{ cv.setPointerCapture(e.pointerId); drawing=true; last=pos(e); stroke(); ctx.beginPath(); ctx.arc(last.x,last.y,size/2,0,7); ctx.fill(); });
    cv.addEventListener("pointermove",e=>{ if(!drawing)return; const p=pos(e); stroke(); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; });
    const up=()=>{ drawing=false; last=null; }; cv.addEventListener("pointerup",up); cv.addEventListener("pointercancel",up);
  }

  // --- Tasks (to-do, persisted)
  function buildTasks(body){
    let filter="all";
    body.innerHTML=`<div class="tasks">
      <div class="add"><input id="tnew" placeholder="Add a task and press Enter…" maxlength="200"><button class="btn primary" id="tadd">Add</button></div>
      <div class="filters"><button class="btn" data-f="all">All</button><button class="btn" data-f="active">Active</button><button class="btn" data-f="done">Done</button>
        <span class="spacer"></span><span id="tcount" style="opacity:.6"></span><button class="btn" id="tclear">Clear done</button></div>
      <div class="list" id="tlist"></div></div>`;
    const inp=body.querySelector("#tnew"), list=body.querySelector("#tlist"), count=body.querySelector("#tcount");
    const get=()=>store.get("tasks",[]), save=t=>store.set("tasks",t);
    function add(){ const v=inp.value.trim(); if(!v)return; const t=get(); t.push({t:v,done:false}); save(t); inp.value=""; render(); }
    function render(){
      const t=get(); list.innerHTML="";
      const shown=t.map((x,i)=>({x,i})).filter(o=> filter==="all"||(filter==="active"&&!o.x.done)||(filter==="done"&&o.x.done));
      if(!shown.length) list.innerHTML=`<div style="opacity:.5;padding:14px;font-size:13px">${t.length?"Nothing here.":"No tasks yet — add one above."}</div>`;
      shown.forEach(({x,i})=>{ const d=document.createElement("div"); d.className="titem"+(x.done?" done":"");
        d.innerHTML=`<input type="checkbox" ${x.done?"checked":""}><span class="tx">${escapeHtml(x.t)}</span><button class="del">✕</button>`;
        d.querySelector("input").onchange=()=>{ const a=get(); a[i].done=!a[i].done; save(a); render(); };
        d.querySelector(".del").onclick=()=>{ const a=get(); a.splice(i,1); save(a); render(); };
        list.appendChild(d); });
      count.textContent=t.filter(x=>!x.done).length+" left · "+t.length+" total";
      body.querySelectorAll(".filters .btn[data-f]").forEach(b=>b.classList.toggle("primary",b.dataset.f===filter));
    }
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter")add(); });
    body.querySelector("#tadd").onclick=add;
    body.querySelectorAll(".filters .btn[data-f]").forEach(b=> b.onclick=()=>{ filter=b.dataset.f; render(); });
    body.querySelector("#tclear").onclick=()=>{ save(get().filter(x=>!x.done)); render(); };
    render();
  }

  // --- System Monitor (live)
  function buildSysmon(body){
    body.innerHTML=`<div class="sysmon">
      <div class="card"><h4>Performance <span id="fps">— FPS</span></h4><div class="spark" id="spark"></div></div>
      <div class="card"><h4>Memory <span id="memv"></span></h4><div class="meter"><span id="memb" style="width:0%"></span></div>
        <div class="kv"><span>JS heap used</span><span id="memused">—</span></div><div class="kv"><span>Heap limit</span><span id="memlim">—</span></div></div>
      <div class="card"><h4>System</h4>
        <div class="kv"><span>ArtOS version</span><span>1.4 “Horizon”</span></div>
        <div class="kv"><span>Uptime</span><span id="uptime">—</span></div>
        <div class="kv"><span>Open windows</span><span id="winc">—</span></div>
        <div class="kv"><span>Installed apps</span><span>${Object.keys(APPS).length}</span></div>
        <div class="kv"><span>Resolution</span><span>${innerWidth}×${innerHeight}</span></div>
        <div class="kv"><span>CPU cores</span><span>${navigator.hardwareConcurrency||"—"}</span></div>
        <div class="kv"><span>Platform</span><span>${navigator.platform||"—"}</span></div>
        <div class="kv"><span>Network</span><span id="online">—</span></div></div></div>`;
    const spark=body.querySelector("#spark"), bars=[], vals=new Array(32).fill(0);
    for(let i=0;i<32;i++){ const b=document.createElement("i"); b.style.height="2px"; spark.appendChild(b); bars.push(b); }
    let frames=0, lastT=performance.now(), fps=60;
    (function loop(){ if(!spark.isConnected)return; frames++; requestAnimationFrame(loop); })();
    tick(body.querySelector(".sysmon"),()=>{
      const now=performance.now(); fps=Math.min(144,Math.round(frames*1000/(now-lastT))); frames=0; lastT=now;
      const sset=(sel,v)=>{ const el=body.querySelector(sel); if(el)el.textContent=v; };
      sset("#fps",fps+" FPS");
      vals.push(fps); vals.shift(); bars.forEach((bar,i)=> bar.style.height=Math.max(2, vals[i]/60*46)+"px");
      const mem=performance.memory, mb=x=>(x/1048576).toFixed(1)+" MB";
      if(mem){ sset("#memused",mb(mem.usedJSHeapSize)); sset("#memlim",mb(mem.jsHeapSizeLimit));
        sset("#memv",Math.round(mem.usedJSHeapSize/mem.jsHeapSizeLimit*100)+"%");
        const bb=body.querySelector("#memb"); if(bb)bb.style.width=(mem.usedJSHeapSize/mem.jsHeapSizeLimit*100)+"%";
      } else { sset("#memv","n/a"); sset("#memused","not exposed"); sset("#memlim","—"); }
      const up=Math.floor((Date.now()-BOOT_TS)/1000), h=Math.floor(up/3600), m=Math.floor(up%3600/60), s=up%60;
      sset("#uptime",(h?h+"h ":"")+(m||h?m+"m ":"")+s+"s");
      sset("#winc",String(Object.keys(windows).length));
      sset("#online",navigator.onLine?"Online":"Offline");
    },1000);
  }

  // ---------------------------------------------------------------- helpers
  function calcEval(s){
    if(!/^[-+*/(). 0-9]+$/.test(s)) throw "bad";
    // eslint-disable-next-line no-new-func
    const r=Function('"use strict";return ('+s+')')(); if(typeof r!=="number"||!isFinite(r))throw "bad"; return Math.round(r*1e10)/1e10;
  }
  function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  // wallpaper / accent
  function setWall(i){ store.set("wall",i); $("#desktop").style.background=WALLPAPERS[i]; }
  function setAccent(i){ store.set("accent",i); const a=ACCENTS[i];
    document.documentElement.style.setProperty("--accent",a[0]); document.documentElement.style.setProperty("--accent2",a[1]); }

  // ---------------------------------------------------------------- shell glue
  function AprtOpen(id){ return makeWindow(id); }

  function buildDesktopIcons(){
    const wrap=$("#icons");
    DESKTOP.forEach(id=>{ const a=APPS[id]; const d=document.createElement("div"); d.className="dicon";
      d.innerHTML=`<span class="em">${a.icon}</span><span class="nm">${a.name}</span>`;
      d.ondblclick=()=>AprtOpen(id);
      d.oncontextmenu=(e)=>{ e.preventDefault(); showCtx(e, id); };
      wrap.appendChild(d); });
  }
  function buildQuick(){ const q=$("#quick"); /* quick launch added before window buttons via separate area? keep simple */ }
  function buildStartMenu(){
    const g=$("#smgrid");
    Object.keys(APPS).forEach(id=>{ const a=APPS[id]; const d=document.createElement("div"); d.className="smapp";
      d.innerHTML=`<span class="em">${a.icon}</span><span>${a.name}</span>`;
      d.onclick=()=>{ AprtOpen(id); toggleStart(false); };
      d.oncontextmenu=(e)=>{ e.preventDefault(); showCtx(e, id); };
      g.appendChild(d); });
  }
  function toggleStart(force){ const m=$("#startmenu"), b=$("#startbtn");
    const open = force!==undefined?force:!m.classList.contains("open");
    m.classList.toggle("open",open); b.classList.toggle("open",open); }

  function clock(){ const d=new Date();
    const t=d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    const ds=d.toLocaleDateString([], {month:"short",day:"numeric"});
    $("#clock").innerHTML=`<div class="t">${t}</div><div class="d">${ds}</div>`; }

  function boot(){
    const msgs=["Initializing GlassWM…","Mounting filesystem…","Loading apps…","Starting desktop…","Welcome."];
    const bm=$("#bootmsg"); let i=0;
    const iv=setInterval(()=>{ bm.textContent=msgs[i++]||""; if(i>msgs.length){clearInterval(iv);
      $("#boot").classList.add("gone"); setTimeout(()=>$("#boot").remove(),700); } },420);
  }

  // ---------------------------------------------------------------- public API
  window.ArtOS = {
    app:(id)=>{ if(APPS[id]) AprtOpen(id); },
    reboot:()=>{ location.reload(); },
    // Launch a native app via the ArtOS desktop HTTP bridge; false on the web.
    launchNative:(target)=>{
      if(!window.__artosDesktop) return false;
      try{ fetch("http://127.0.0.1:5099/launch/"+encodeURIComponent(target),{mode:"no-cors"}); }catch(e){}
      return true;
    },
  };

  // ---------------------------------------------------------------- init
  setWall(store.get("wall",0)); setAccent(store.get("accent",0));
  buildDesktopIcons(); buildStartMenu(); renderTaskbar();
  $("#startbtn").onclick=(e)=>{ e.stopPropagation(); toggleStart(); };
  document.addEventListener("click", e=>{
    if(!e.target.closest("#startmenu")&&!e.target.closest("#startbtn")) toggleStart(false);
    if(!e.target.closest("#ctxmenu")) hideCtx();
  });
  clock(); setInterval(clock,1000);
  boot();

  // Detect the ArtOS desktop app via its loopback HTTP bridge. If present,
  // mark desktop mode and add a real Shut Down button to the tray.
  (function wireDesktop(){
    fetch("http://127.0.0.1:5099/ping",{mode:"no-cors"}).then(()=>{
      window.__artosDesktop = true;
      if(document.getElementById("osPower")) return;
      const tray=$("#tray");
      const b=document.createElement("span");
      b.id="osPower"; b.textContent="⏻"; b.title="Shut down ArtOS";
      b.style.cssText="cursor:pointer;font-size:16px;";
      b.onclick=()=>{ fetch("http://127.0.0.1:5099/shutdown",{mode:"no-cors"}); };
      tray.insertBefore(b, tray.firstChild);
      window.ArtOS.shutdown=()=>{ fetch("http://127.0.0.1:5099/shutdown",{mode:"no-cors"}); };
    }).catch(()=>{});
  })();
})();
</script>
