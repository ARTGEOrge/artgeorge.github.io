<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTGEOrge Sheets</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden;
           background: #16131f; color: #e8eaed;
           font-family: 'Segoe UI', system-ui, sans-serif; }
    a { color: inherit; text-decoration: none; }

    .logo { font-weight: 800; letter-spacing: -1px; font-size: 22px; }
    .logo .a { background: linear-gradient(90deg,#a78bfa,#7c5cff);
               -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* top bar */
    header { display: flex; align-items: center; gap: 12px; padding: 12px 18px;
             background: #1c1726; border-bottom: 1px solid #2b2238; flex-shrink: 0; }
    header .tag { color: #8b8595; font-size: 13px; }
    .spacer { flex: 1; }
    .toolbtn { background: #241d33; border: 1px solid #34294d; color: #d8d2e6;
               border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
    .toolbtn:hover { background: #2a2240; border-color: #8b6cff; color: #cdbcff; }
    .toolbtn.danger:hover { border-color: #ff6b8a; color: #ff9bb0; }

    /* formula bar */
    .fbar { display: flex; align-items: center; gap: 10px; padding: 8px 18px;
            background: #1a1524; border-bottom: 1px solid #2b2238; flex-shrink: 0; }
    .cellref { min-width: 56px; text-align: center; font-weight: 700; color: #cdbcff;
               background: #241d33; border: 1px solid #34294d; border-radius: 6px; padding: 6px 8px; }
    .fx { color: #8b8595; font-style: italic; }
    #formula { flex: 1; background: #241d33; border: 1px solid #34294d; color: #fff;
               border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none;
               font-family: 'Consolas', monospace; }
    #formula:focus { border-color: #8b6cff; background: #2a2240; }

    /* grid */
    .gridwrap { flex: 1; overflow: auto; }
    table { border-collapse: collapse; table-layout: fixed; }
    th, td { border: 1px solid #2b2238; height: 26px; }
    th { background: #221b30; color: #9b93ac; font-weight: 600; font-size: 12px;
         position: sticky; z-index: 2; user-select: none; }
    thead th { top: 0; }
    th.rowhead { left: 0; z-index: 3; width: 46px; min-width: 46px; }
    thead th.corner { left: 0; z-index: 4; }
    tbody th { position: sticky; left: 0; }
    td { width: 96px; min-width: 96px; padding: 0 6px; font-size: 13px;
         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: cell;
         background: #16131f; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.bool { text-align: center; color: #9fd0ff; }
    td.sel { outline: 2px solid #8b6cff; outline-offset: -2px; background: #211a31; }
    td.err { color: #ff6b8a; }
    td input { width: 100%; height: 100%; border: none; outline: none;
               background: #2a2240; color: #fff; font-size: 13px;
               font-family: 'Consolas', monospace; padding: 0 5px; }

    /* sheet tabs */
    .tabbar { display: flex; align-items: center; gap: 4px; padding: 6px 12px;
              background: #1c1726; border-top: 1px solid #2b2238; flex-shrink: 0; overflow-x: auto; }
    .tab { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 7px 7px 0 0;
           background: #221b30; color: #9b93ac; font-size: 13px; cursor: pointer; white-space: nowrap;
           border: 1px solid transparent; border-bottom: none; }
    .tab:hover { background: #2a2240; color: #cdbcff; }
    .tab.active { background: #16131f; color: #fff; border-color: #34294d; font-weight: 600; }
    .tab .x { color: #6f6880; font-size: 14px; line-height: 1; padding: 0 2px; }
    .tab .x:hover { color: #ff6b8a; }
    .addtab { background: none; border: none; color: #8b8595; font-size: 20px; line-height: 1;
              cursor: pointer; padding: 2px 10px; border-radius: 6px; }
    .addtab:hover { background: #2a2240; color: #cdbcff; }
    .hint { color: #6f6880; font-size: 12px; margin-left: auto; padding-right: 4px; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span class="a">ARTGE</span>Orge <span style="font-weight:600;color:#cdbcff">Sheets</span></a>
    <span class="tag">free spreadsheet · type values or =formulas</span>
    <span class="spacer"></span>
    <button class="toolbtn" id="importBtn">Import CSV</button>
    <button class="toolbtn" id="exportBtn">Export CSV</button>
    <button class="toolbtn danger" id="clearBtn">Clear sheet</button>
    <input type="file" id="fileInput" accept=".csv,text/csv" style="display:none" />
  </header>

  <div class="fbar">
    <span class="cellref" id="cellRef">A1</span>
    <span class="fx">fx</span>
    <input id="formula" type="text" placeholder="Enter a value or =IF(A1>10, &quot;big&quot;, ROUND(A1,2))" autocomplete="off" spellcheck="false" />
  </div>

  <div class="gridwrap">
    <table id="grid"></table>
  </div>

  <div class="tabbar" id="tabbar"></div>

<script>
(function () {
  var ROWS = 50, COLS = 26;

  // workbook = { sheets: [{name, data}], active }
  var wb = { sheets: [{ name: "Sheet1", data: {} }], active: 0 };
  var sel = { r: 0, c: 0 };
  var editing = null;

  function D() { return wb.sheets[wb.active].data; }

  // ---- cell address helpers ----
  function colName(c) {
    var s = ""; c += 1;
    while (c > 0) { var m = (c - 1) % 26; s = String.fromCharCode(65 + m) + s; c = (c - m - 1) / 26; }
    return s;
  }
  function colIndex(s) {
    var c = 0;
    for (var i = 0; i < s.length; i++) c = c * 26 + (s.charCodeAt(i) - 64);
    return c - 1;
  }
  function key(r, c) { return colName(c) + (r + 1); }
  function parseRef(ref) {
    var m = /^([A-Z]+)([0-9]+)$/.exec(ref);
    return { c: colIndex(m[1]), r: parseInt(m[2], 10) - 1 };
  }
  function cellEl(r, c) { return document.getElementById("cell-" + r + "-" + c); }

  // =====================================================================
  //  FORMULA ENGINE — tokenizer + recursive-descent parser + evaluator
  // =====================================================================
  var RANGE = "__isRange";

  function tokenize(s) {
    var toks = [], i = 0, n = s.length;
    while (i < n) {
      var ch = s[i];
      if (ch === " " || ch === "\t") { i++; continue; }
      if (ch >= "0" && ch <= "9" || ch === "." && s[i + 1] >= "0" && s[i + 1] <= "9") {
        var j = i; while (j < n && (s[j] >= "0" && s[j] <= "9" || s[j] === ".")) j++;
        toks.push({ t: "num", v: parseFloat(s.slice(i, j)) }); i = j; continue;
      }
      if (ch === '"') {
        var k = i + 1, str = "";
        while (k < n) { if (s[k] === '"') { if (s[k + 1] === '"') { str += '"'; k += 2; continue; } break; } str += s[k++]; }
        toks.push({ t: "str", v: str }); i = k + 1; continue;
      }
      if (/[A-Za-z]/.test(ch)) {
        var p = i; while (p < n && /[A-Za-z]/.test(s[p])) p++;
        var letters = s.slice(i, p);
        if (p < n && /[0-9]/.test(s[p])) {
          var q = p; while (q < n && /[0-9]/.test(s[q])) q++;
          toks.push({ t: "cell", v: letters.toUpperCase() + s.slice(p, q) }); i = q; continue;
        }
        toks.push({ t: "name", v: letters.toUpperCase() }); i = p; continue;
      }
      var two = s.slice(i, i + 2);
      if (two === "<=" || two === ">=" || two === "<>") { toks.push({ t: "op", v: two }); i += 2; continue; }
      if ("+-*/^&=<>(),:".indexOf(ch) >= 0) { toks.push({ t: "op", v: ch }); i++; continue; }
      throw "syntax";
    }
    toks.push({ t: "end" });
    return toks;
  }

  function parse(toks) {
    var pos = 0;
    function peek() { return toks[pos]; }
    function next() { return toks[pos++]; }
    function expect(v) { if (toks[pos].v !== v) throw "syntax"; pos++; }

    function parseExpr() { return parseCompare(); }

    function parseCompare() {
      var l = parseConcat();
      while (peek().t === "op" && ["=", "<>", "<", ">", "<=", ">="].indexOf(peek().v) >= 0) {
        var op = next().v; l = { t: "cmp", op: op, l: l, r: parseConcat() };
      }
      return l;
    }
    function parseConcat() {
      var l = parseAdd();
      while (peek().t === "op" && peek().v === "&") { next(); l = { t: "concat", l: l, r: parseAdd() }; }
      return l;
    }
    function parseAdd() {
      var l = parseMul();
      while (peek().t === "op" && (peek().v === "+" || peek().v === "-")) {
        var op = next().v; l = { t: "bin", op: op, l: l, r: parseMul() };
      }
      return l;
    }
    function parseMul() {
      var l = parseUnary();
      while (peek().t === "op" && (peek().v === "*" || peek().v === "/")) {
        var op = next().v; l = { t: "bin", op: op, l: l, r: parseUnary() };
      }
      return l;
    }
    function parseUnary() {
      if (peek().t === "op" && (peek().v === "-" || peek().v === "+")) {
        var op = next().v; return { t: "unary", op: op, x: parseUnary() };
      }
      return parsePow();
    }
    function parsePow() {
      var l = parsePrimary();
      if (peek().t === "op" && peek().v === "^") { next(); return { t: "bin", op: "^", l: l, r: parseUnary() }; }
      return l;
    }
    function parsePrimary() {
      var tk = peek();
      if (tk.t === "num") { next(); return { t: "num", v: tk.v }; }
      if (tk.t === "str") { next(); return { t: "str", v: tk.v }; }
      if (tk.t === "op" && tk.v === "(") { next(); var e = parseExpr(); expect(")"); return e; }
      if (tk.t === "cell") {
        next();
        if (peek().t === "op" && peek().v === ":") { next(); var b = next(); if (b.t !== "cell") throw "syntax"; return { t: "range", a: tk.v, b: b.v }; }
        return { t: "ref", v: tk.v };
      }
      if (tk.t === "name") {
        next();
        if (peek().t === "op" && peek().v === "(") {
          next(); var args = [];
          if (!(peek().t === "op" && peek().v === ")")) {
            args.push(parseExpr());
            while (peek().t === "op" && peek().v === ",") { next(); args.push(parseExpr()); }
          }
          expect(")"); return { t: "call", name: tk.v, args: args };
        }
        if (tk.v === "TRUE") return { t: "bool", v: true };
        if (tk.v === "FALSE") return { t: "bool", v: false };
        throw "name";
      }
      throw "syntax";
    }

    var node = parseExpr();
    if (peek().t !== "end") throw "syntax";
    return node;
  }

  // value coercions
  function toNum(v) {
    if (typeof v === "number") return v;
    if (typeof v === "boolean") return v ? 1 : 0;
    if (v === null || v === undefined) return 0;
    if (Array.isArray(v)) throw "value";
    if (typeof v === "string") {
      if (v.trim() === "") return 0;
      var n = Number(v.trim());
      if (isNaN(n)) throw "value";
      return n;
    }
    throw "value";
  }
  function toStr(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "boolean") return v ? "TRUE" : "FALSE";
    if (Array.isArray(v)) throw "value";
    return String(v);
  }
  function toBool(v) {
    if (typeof v === "boolean") return v;
    if (typeof v === "number") return v !== 0;
    if (v === null || v === undefined) return false;
    if (typeof v === "string") {
      if (v.toUpperCase() === "TRUE") return true;
      if (v.toUpperCase() === "FALSE" || v === "") return false;
      return true;
    }
    return false;
  }

  function evalNode(node, seen) {
    switch (node.t) {
      case "num": return node.v;
      case "str": return node.v;
      case "bool": return node.v;
      case "ref": return evalRef(node.v, seen);
      case "range": return evalRange(node.a, node.b, seen);
      case "unary": { var x = toNum(evalNode(node.x, seen)); return node.op === "-" ? -x : x; }
      case "concat": return toStr(evalNode(node.l, seen)) + toStr(evalNode(node.r, seen));
      case "bin": {
        var a = toNum(evalNode(node.l, seen)), b = toNum(evalNode(node.r, seen)), r;
        switch (node.op) {
          case "+": r = a + b; break;
          case "-": r = a - b; break;
          case "*": r = a * b; break;
          case "/": if (b === 0) throw "div0"; r = a / b; break;
          case "^": r = Math.pow(a, b); break;
        }
        if (!isFinite(r)) throw "value";
        return r;
      }
      case "cmp": return compare(node.op, evalNode(node.l, seen), evalNode(node.r, seen));
      case "call": return callFunc(node.name, node.args, seen);
    }
    throw "syntax";
  }

  function compare(op, a, b) {
    var an = typeof a === "number", bn = typeof b === "number";
    var x, y;
    if (an && bn) { x = a; y = b; }
    else if (typeof a === "boolean" || typeof b === "boolean") { x = toBool(a) ? 1 : 0; y = toBool(b) ? 1 : 0; }
    else { x = toStr(a).toUpperCase(); y = toStr(b).toUpperCase(); }
    switch (op) {
      case "=": return x === y;
      case "<>": return x !== y;
      case "<": return x < y;
      case ">": return x > y;
      case "<=": return x <= y;
      case ">=": return x >= y;
    }
  }

  function evalRef(ref, seen) {
    var raw = D()[ref];
    if (raw === undefined || raw === "") return null;
    if (raw[0] !== "=") {
      var t = raw.trim();
      if (t !== "" && !isNaN(Number(t))) return Number(t);
      if (t.toUpperCase() === "TRUE") return true;
      if (t.toUpperCase() === "FALSE") return false;
      return raw;
    }
    if (seen[ref]) throw "circular";
    seen[ref] = true;
    var v = evalNode(parse(tokenize(raw.slice(1))), seen);
    delete seen[ref];
    return v;
  }

  function evalRange(a, b, seen) {
    var pa = parseRef(a), pb = parseRef(b), out = [];
    out[RANGE] = true;
    for (var r = Math.min(pa.r, pb.r); r <= Math.max(pa.r, pb.r); r++)
      for (var c = Math.min(pa.c, pb.c); c <= Math.max(pa.c, pb.c); c++)
        out.push(evalRef(key(r, c), seen));
    return out;
  }

  // flatten call args into a list of scalar values (expanding ranges)
  function flatVals(args, seen) {
    var out = [];
    for (var i = 0; i < args.length; i++) {
      var v = evalNode(args[i], seen);
      if (Array.isArray(v) && v[RANGE]) { for (var j = 0; j < v.length; j++) out.push(v[j]); }
      else out.push(v);
    }
    return out;
  }
  function flatNums(args, seen) {
    return flatVals(args, seen).filter(function (v) { return typeof v === "number"; });
  }

  var FUNCS = {
    // aggregates
    SUM: function (a, s) { return flatNums(a, s).reduce(function (x, y) { return x + y; }, 0); },
    AVERAGE: function (a, s) { var v = flatNums(a, s); if (!v.length) throw "div0"; return v.reduce(function (x, y) { return x + y; }, 0) / v.length; },
    MIN: function (a, s) { var v = flatNums(a, s); return v.length ? Math.min.apply(null, v) : 0; },
    MAX: function (a, s) { var v = flatNums(a, s); return v.length ? Math.max.apply(null, v) : 0; },
    COUNT: function (a, s) { return flatNums(a, s).length; },
    COUNTA: function (a, s) { return flatVals(a, s).filter(function (v) { return v !== null && v !== ""; }).length; },
    PRODUCT: function (a, s) { return flatNums(a, s).reduce(function (x, y) { return x * y; }, 1); },
    // math
    ROUND: function (a, s) { var n = toNum(evalNode(a[0], s)), d = a[1] ? toNum(evalNode(a[1], s)) : 0, f = Math.pow(10, d); return Math.round(n * f) / f; },
    ROUNDUP: function (a, s) { var n = toNum(evalNode(a[0], s)), d = a[1] ? toNum(evalNode(a[1], s)) : 0, f = Math.pow(10, d); return (n < 0 ? -1 : 1) * Math.ceil(Math.abs(n) * f) / f; },
    ROUNDDOWN: function (a, s) { var n = toNum(evalNode(a[0], s)), d = a[1] ? toNum(evalNode(a[1], s)) : 0, f = Math.pow(10, d); return (n < 0 ? -1 : 1) * Math.floor(Math.abs(n) * f) / f; },
    ABS: function (a, s) { return Math.abs(toNum(evalNode(a[0], s))); },
    SQRT: function (a, s) { var n = toNum(evalNode(a[0], s)); if (n < 0) throw "value"; return Math.sqrt(n); },
    POWER: function (a, s) { return Math.pow(toNum(evalNode(a[0], s)), toNum(evalNode(a[1], s))); },
    MOD: function (a, s) { var x = toNum(evalNode(a[0], s)), y = toNum(evalNode(a[1], s)); if (y === 0) throw "div0"; return x - y * Math.floor(x / y); },
    INT: function (a, s) { return Math.floor(toNum(evalNode(a[0], s))); },
    FLOOR: function (a, s) { return Math.floor(toNum(evalNode(a[0], s))); },
    CEILING: function (a, s) { return Math.ceil(toNum(evalNode(a[0], s))); },
    TRUNC: function (a, s) { return Math.trunc(toNum(evalNode(a[0], s))); },
    SIGN: function (a, s) { return Math.sign(toNum(evalNode(a[0], s))); },
    PI: function () { return Math.PI; },
    // logic
    IF: function (a, s) { return toBool(evalNode(a[0], s)) ? evalNode(a[1], s) : (a[2] !== undefined ? evalNode(a[2], s) : false); },
    IFERROR: function (a, s) { try { return evalNode(a[0], s); } catch (e) { return evalNode(a[1], s); } },
    AND: function (a, s) { return flatVals(a, s).every(function (v) { return toBool(v); }); },
    OR: function (a, s) { return flatVals(a, s).some(function (v) { return toBool(v); }); },
    NOT: function (a, s) { return !toBool(evalNode(a[0], s)); },
    TRUE: function () { return true; },
    FALSE: function () { return false; },
    // text
    CONCAT: function (a, s) { return flatVals(a, s).map(toStr).join(""); },
    CONCATENATE: function (a, s) { return flatVals(a, s).map(toStr).join(""); },
    LEN: function (a, s) { return toStr(evalNode(a[0], s)).length; },
    LEFT: function (a, s) { return toStr(evalNode(a[0], s)).slice(0, a[1] ? toNum(evalNode(a[1], s)) : 1); },
    RIGHT: function (a, s) { var str = toStr(evalNode(a[0], s)), n = a[1] ? toNum(evalNode(a[1], s)) : 1; return str.slice(str.length - n); },
    MID: function (a, s) { var str = toStr(evalNode(a[0], s)), st = toNum(evalNode(a[1], s)), ln = toNum(evalNode(a[2], s)); return str.substr(st - 1, ln); },
    UPPER: function (a, s) { return toStr(evalNode(a[0], s)).toUpperCase(); },
    LOWER: function (a, s) { return toStr(evalNode(a[0], s)).toLowerCase(); },
    TRIM: function (a, s) { return toStr(evalNode(a[0], s)).trim(); }
  };

  function callFunc(name, args, seen) {
    var f = FUNCS[name];
    if (!f) throw "name";
    return f(args, seen);
  }

  // ---- display ----
  function displayValue(r, c) {
    var raw = D()[key(r, c)];
    if (raw === undefined || raw === "") return { text: "", cls: "" };
    try {
      var v;
      if (raw[0] === "=") v = evalNode(parse(tokenize(raw.slice(1))), {});
      else {
        var t = raw.trim();
        if (t !== "" && !isNaN(Number(t))) v = Number(t);
        else if (t.toUpperCase() === "TRUE") v = true;
        else if (t.toUpperCase() === "FALSE") v = false;
        else return { text: raw, cls: "" };
      }
      if (typeof v === "number") { var rounded = Math.round(v * 1e10) / 1e10; return { text: String(rounded), cls: "num" }; }
      if (typeof v === "boolean") return { text: v ? "TRUE" : "FALSE", cls: "bool" };
      return { text: String(v), cls: "" };
    } catch (e) {
      var msg = { circular: "#CIRC!", div0: "#DIV/0!", name: "#NAME?", value: "#VALUE!" }[e] || "#ERROR!";
      return { text: msg, cls: "err" };
    }
  }

  function recalc() {
    for (var r = 0; r < ROWS; r++)
      for (var c = 0; c < COLS; c++) {
        var td = cellEl(r, c);
        if (!td || (td.firstChild && td.firstChild.tagName === "INPUT")) continue;
        var d = displayValue(r, c);
        td.textContent = d.text;
        td.classList.remove("num", "bool", "err");
        if (d.cls) td.classList.add(d.cls);
      }
  }

  // ---- grid build ----
  function buildGrid() {
    var t = document.getElementById("grid"); t.innerHTML = "";
    var thead = document.createElement("thead"), hr = document.createElement("tr");
    var corner = document.createElement("th"); corner.className = "rowhead corner"; hr.appendChild(corner);
    for (var c = 0; c < COLS; c++) { var th = document.createElement("th"); th.textContent = colName(c); hr.appendChild(th); }
    thead.appendChild(hr); t.appendChild(thead);
    var tbody = document.createElement("tbody");
    for (var r = 0; r < ROWS; r++) {
      var tr = document.createElement("tr");
      var rh = document.createElement("th"); rh.className = "rowhead"; rh.textContent = r + 1; tr.appendChild(rh);
      for (c = 0; c < COLS; c++) {
        var td = document.createElement("td");
        td.id = "cell-" + r + "-" + c; td.dataset.r = r; td.dataset.c = c; tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    t.appendChild(tbody);
  }

  // ---- selection + editing ----
  function selectCell(r, c) {
    if (r < 0 || c < 0 || r >= ROWS || c >= COLS) return;
    var prev = cellEl(sel.r, sel.c); if (prev) prev.classList.remove("sel");
    sel = { r: r, c: c };
    var td = cellEl(r, c); td.classList.add("sel");
    document.getElementById("cellRef").textContent = key(r, c);
    document.getElementById("formula").value = D()[key(r, c)] || "";
    td.scrollIntoView({ block: "nearest", inline: "nearest" });
  }

  function startEdit(initial) {
    var td = cellEl(sel.r, sel.c), ref = key(sel.r, sel.c);
    var input = document.createElement("input"); input.type = "text";
    input.value = initial !== undefined ? initial : (D()[ref] || "");
    td.textContent = ""; td.appendChild(input); editing = input; input.focus();
    if (initial === undefined) input.select();
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); commitEdit(); selectCell(sel.r + 1, sel.c); }
      else if (e.key === "Tab") { e.preventDefault(); commitEdit(); selectCell(sel.r, sel.c + (e.shiftKey ? -1 : 1)); }
      else if (e.key === "Escape") { e.preventDefault(); cancelEdit(); }
      e.stopPropagation();
    });
    input.addEventListener("input", function () { document.getElementById("formula").value = input.value; });
    input.addEventListener("blur", function () { if (editing) commitEdit(); });
  }
  function commitEdit() {
    if (!editing) return;
    var ref = key(sel.r, sel.c), val = editing.value; editing = null;
    if (val === "") delete D()[ref]; else D()[ref] = val;
    save(); recalc();
  }
  function cancelEdit() { editing = null; recalc(); selectCell(sel.r, sel.c); }

  // ---- persistence ----
  function save() { try { localStorage.setItem("artgeorge-sheets-wb", JSON.stringify(wb)); } catch (e) {} }
  function load() {
    try {
      var d = localStorage.getItem("artgeorge-sheets-wb");
      if (d) { wb = JSON.parse(d); if (!wb.sheets || !wb.sheets.length) wb = { sheets: [{ name: "Sheet1", data: {} }], active: 0 }; if (wb.active >= wb.sheets.length) wb.active = 0; return; }
      var old = localStorage.getItem("artgeorge-sheets"); // migrate single-sheet format
      if (old) wb = { sheets: [{ name: "Sheet1", data: JSON.parse(old) }], active: 0 };
    } catch (e) { wb = { sheets: [{ name: "Sheet1", data: {} }], active: 0 }; }
  }

  // ---- sheet tabs ----
  function renderTabs() {
    var bar = document.getElementById("tabbar"); bar.innerHTML = "";
    wb.sheets.forEach(function (sh, i) {
      var tab = document.createElement("div");
      tab.className = "tab" + (i === wb.active ? " active" : "");
      var label = document.createElement("span"); label.textContent = sh.name; tab.appendChild(label);
      if (wb.sheets.length > 1) {
        var x = document.createElement("span"); x.className = "x"; x.textContent = "×"; x.title = "Delete sheet";
        x.addEventListener("click", function (e) { e.stopPropagation(); deleteSheet(i); });
        tab.appendChild(x);
      }
      tab.addEventListener("click", function () { switchSheet(i); });
      tab.addEventListener("dblclick", function () { renameSheet(i); });
      bar.appendChild(tab);
    });
    var add = document.createElement("button"); add.className = "addtab"; add.textContent = "+"; add.title = "Add sheet";
    add.addEventListener("click", addSheet); bar.appendChild(add);
    var hint = document.createElement("span"); hint.className = "hint"; hint.textContent = "double-click a tab to rename"; bar.appendChild(hint);
  }
  function switchSheet(i) {
    if (editing) commitEdit();
    wb.active = i; save(); recalc(); selectCell(0, 0); renderTabs();
  }
  function addSheet() {
    var n = 1, name; do { name = "Sheet" + (wb.sheets.length + n); n++; } while (wb.sheets.some(function (s) { return s.name === name; }));
    wb.sheets.push({ name: name, data: {} }); wb.active = wb.sheets.length - 1;
    save(); recalc(); selectCell(0, 0); renderTabs();
  }
  function deleteSheet(i) {
    if (wb.sheets.length <= 1) return;
    if (!confirm('Delete "' + wb.sheets[i].name + '"?')) return;
    wb.sheets.splice(i, 1);
    if (wb.active >= wb.sheets.length) wb.active = wb.sheets.length - 1;
    save(); recalc(); selectCell(0, 0); renderTabs();
  }
  function renameSheet(i) {
    var name = prompt("Rename sheet:", wb.sheets[i].name);
    if (name === null) return;
    name = name.trim(); if (!name) return;
    if (wb.sheets.some(function (s, j) { return j !== i && s.name === name; })) { alert("A sheet with that name already exists."); return; }
    wb.sheets[i].name = name; save(); renderTabs();
  }

  // ---- CSV import / export ----
  function usedBounds() {
    var maxR = -1, maxC = -1;
    Object.keys(D()).forEach(function (k) { var p = parseRef(k); if (p.r > maxR) maxR = p.r; if (p.c > maxC) maxC = p.c; });
    return { maxR: maxR, maxC: maxC };
  }
  function csvField(s) {
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function exportCSV() {
    var b = usedBounds();
    if (b.maxR < 0) { alert("This sheet is empty."); return; }
    var lines = [];
    for (var r = 0; r <= b.maxR; r++) {
      var row = [];
      for (var c = 0; c <= b.maxC; c++) row.push(csvField(displayValue(r, c).text));
      lines.push(row.join(","));
    }
    var blob = new Blob([lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
    var url = URL.createObjectURL(blob), a = document.createElement("a");
    a.href = url; a.download = wb.sheets[wb.active].name + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function parseCSV(text) {
    var rows = [], row = [], field = "", i = 0, n = text.length, inQ = false;
    while (i < n) {
      var ch = text[i];
      if (inQ) {
        if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i += 2; continue; } inQ = false; i++; continue; }
        field += ch; i++; continue;
      }
      if (ch === '"') { inQ = true; i++; continue; }
      if (ch === ",") { row.push(field); field = ""; i++; continue; }
      if (ch === "\r") { i++; continue; }
      if (ch === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
      field += ch; i++;
    }
    row.push(field); rows.push(row);
    return rows;
  }
  function importCSV(text) {
    var rows = parseCSV(text);
    while (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === "") rows.pop();
    if (!rows.length) return;
    if (!confirm("Import will replace the contents of this sheet. Continue?")) return;
    var d = {};
    for (var r = 0; r < rows.length && r < ROWS; r++)
      for (var c = 0; c < rows[r].length && c < COLS; c++) {
        var val = rows[r][c];
        if (val !== "") d[key(r, c)] = val;
      }
    wb.sheets[wb.active].data = d; save(); recalc(); selectCell(0, 0);
  }

  // ---- events ----
  document.getElementById("grid").addEventListener("mousedown", function (e) {
    var td = e.target.closest("td"); if (!td) return;
    if (editing) commitEdit();
    selectCell(parseInt(td.dataset.r, 10), parseInt(td.dataset.c, 10));
  });
  document.getElementById("grid").addEventListener("dblclick", function (e) {
    var td = e.target.closest("td"); if (!td) return;
    selectCell(parseInt(td.dataset.r, 10), parseInt(td.dataset.c, 10)); startEdit();
  });

  document.addEventListener("keydown", function (e) {
    if (editing) return;
    if (document.activeElement === document.getElementById("formula")) return;
    switch (e.key) {
      case "ArrowUp": e.preventDefault(); selectCell(sel.r - 1, sel.c); break;
      case "ArrowDown": e.preventDefault(); selectCell(sel.r + 1, sel.c); break;
      case "ArrowLeft": e.preventDefault(); selectCell(sel.r, sel.c - 1); break;
      case "ArrowRight": e.preventDefault(); selectCell(sel.r, sel.c + 1); break;
      case "Tab": e.preventDefault(); selectCell(sel.r, sel.c + (e.shiftKey ? -1 : 1)); break;
      case "Enter": e.preventDefault(); startEdit(); break;
      case "Delete": case "Backspace": e.preventDefault(); delete D()[key(sel.r, sel.c)]; save(); recalc(); break;
      default:
        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); startEdit(e.key); }
    }
  });

  var formula = document.getElementById("formula");
  formula.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      var ref = key(sel.r, sel.c);
      if (formula.value === "") delete D()[ref]; else D()[ref] = formula.value;
      save(); recalc(); selectCell(sel.r + 1, sel.c); document.getElementById("grid").focus();
    } else if (e.key === "Escape") { formula.value = D()[key(sel.r, sel.c)] || ""; formula.blur(); }
  });

  document.getElementById("clearBtn").addEventListener("click", function () {
    if (confirm('Clear all cells in "' + wb.sheets[wb.active].name + '"?')) { wb.sheets[wb.active].data = {}; save(); recalc(); selectCell(sel.r, sel.c); }
  });
  document.getElementById("exportBtn").addEventListener("click", exportCSV);
  document.getElementById("importBtn").addEventListener("click", function () { document.getElementById("fileInput").click(); });
  document.getElementById("fileInput").addEventListener("change", function (e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function () { importCSV(String(reader.result)); };
    reader.readAsText(file);
    e.target.value = "";
  });

  // ---- init ----
  load();
  buildGrid();
  renderTabs();
  recalc();
  selectCell(0, 0);
})();
</script>
</body>
</html>
