<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Random 3D</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0e1a;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 32px; align-items: center;
    pointer-events: none; user-select: none;
    text-shadow: 2px 2px 0 #000, 0 0 16px rgba(0,0,0,0.7);
  }
  .team { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
  .team.red  { color: #ff5050; }
  .team.blue { color: #6aaaff; }
  #score { font-size: 48px; font-weight: 900; font-family: Impact, "Arial Black", sans-serif; }
  #timer { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(70px);
           font-size: 18px; letter-spacing: 2px; color: #fcd34d;
           text-shadow: 1px 1px 0 #000; pointer-events: none; user-select: none; }
  #hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 1px;
    color: rgba(255,255,255,0.7); text-transform: uppercase;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none; user-select: none;
    text-align: center; line-height: 1.6;
  }
  #scoreFlash {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  #scoreFlash.show { display: flex; }
  #scoreFlash .word {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 96px; color: #ffd700;
    -webkit-text-stroke: 4px #000;
    text-shadow: 0 0 30px rgba(255,200,40,0.7);
    animation: bigPop 0.7s ease-out forwards;
  }
  @keyframes bigPop {
    0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
    25%  { transform: scale(1.35) rotate(4deg); opacity: 1; }
    65%  { transform: scale(1.0)  rotate(-2deg); opacity: 1; }
    100% { transform: scale(1.1) rotate(0deg); opacity: 0; }
  }
  #winScreen {
    position: fixed; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); text-align: center; z-index: 20;
  }
  #winScreen.show { display: flex; }
  #winScreen h1 {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 92px; margin: 0;
    -webkit-text-stroke: 4px #000;
    text-shadow: 0 0 32px rgba(255,255,255,0.5);
  }
  #winScreen p { font-family: monospace; font-size: 22px; margin: 10px 0; }
  #winScreen .hint { font-size: 16px; opacity: 0.8; margin-top: 24px; }
  #loadhint {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #aaa;
  }
  #flash {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0);
    pointer-events: none;
    transition: background 0.18s ease-out;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loadhint">Loading 3D engine…</div>
<div id="hud" style="display:none">
  <div class="team red">PISTONS</div>
  <div id="score"><span id="scoreL">0</span> : <span id="scoreR">0</span></div>
  <div class="team blue">BUCKS</div>
</div>
<div id="timer" style="display:none">No Limit</div>
<div id="hint" style="display:none">
  <span style="color:#ff5050">PISTONS</span> &nbsp;A / D move &nbsp;·&nbsp; W jump &amp; throw<br>
  <span style="color:#6aaaff">BUCKS</span> &nbsp;← / → move &nbsp;·&nbsp; ↑ jump &amp; throw<br>
  walk over the ball to pick it up &nbsp;·&nbsp; first to 7 wins
</div>
<div id="flash"></div>
<div id="scoreFlash"><div class="word">SCORE!</div></div>
<div id="winScreen">
  <h1 id="winTitle">PISTONS WIN!</h1>
  <p>Final score: <span id="winScore">7 - 5</span></p>
  <p class="hint">Press SPACE / ENTER to play again</p>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if (typeof THREE === 'undefined') {
  document.getElementById('loadhint').textContent = 'Failed to load Three.js. Check your connection.';
} else {
  document.getElementById('loadhint').remove();
  document.getElementById('hud').style.display = '';
  document.getElementById('timer').style.display = '';
  document.getElementById('hint').style.display = '';
  start();
}

function start() {
// ============== RENDERER / SCENE / CAMERA ==============
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
if (THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);
scene.fog = new THREE.Fog(0x0a0e1a, 35, 90);

const camera = new THREE.PerspectiveCamera(58, 1, 0.1, 200);
camera.position.set(0, 7, 22);
camera.lookAt(0, 2.5, 0);

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// ============== LIGHTING ==============
scene.add(new THREE.HemisphereLight(0x99bbff, 0x442a18, 0.55));
const sun = new THREE.DirectionalLight(0xffeec8, 1.0);
sun.position.set(8, 18, 12);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -18;
sun.shadow.camera.right = 18;
sun.shadow.camera.top = 14;
sun.shadow.camera.bottom = -6;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0005;
scene.add(sun);
// Stadium fill from the other side
const fill = new THREE.DirectionalLight(0xa8c8ff, 0.4);
fill.position.set(-10, 12, -8);
scene.add(fill);

// Two warm spotlights aimed at center court for that arena vibe
const sp1 = new THREE.SpotLight(0xffe4a0, 0.8, 40, Math.PI / 5, 0.4, 1);
sp1.position.set(-8, 16, 6);
sp1.target.position.set(0, 0, 0);
scene.add(sp1); scene.add(sp1.target);
const sp2 = new THREE.SpotLight(0xffe4a0, 0.8, 40, Math.PI / 5, 0.4, 1);
sp2.position.set(8, 16, 6);
sp2.target.position.set(0, 0, 0);
scene.add(sp2); scene.add(sp2.target);

// ============== CONSTANTS ==============
const COURT_HALFW = 14;     // court extends x: [-14, +14]
const COURT_HALFD = 6;      // court depth z: [-6, +6]
const GRAVITY     = 18;     // world gravity (m/s^2) for ball + player jumps
const JUMP_V      = 9.5;    // player jump initial velocity
const MOVE_SPEED  = 7.5;    // player horizontal speed
const HOOP_X      = 12.5;
const HOOP_Y      = 3.0;    // height of rim
const HOOP_Z      = 0;
const RIM_R       = 0.55;
const BALL_R      = 0.32;
const PICKUP_R    = 1.2;    // pickup radius (player <-> ball)
const PLAYER_R    = 0.55;
const PLAYER_H    = 2.0;
const WIN_SCORE   = 7;

// ============== WORLD: COURT ==============
const woodMat = new THREE.MeshStandardMaterial({ color: 0xd49050, roughness: 0.55, metalness: 0.1 });
const courtFloor = new THREE.Mesh(
  new THREE.PlaneGeometry(COURT_HALFW * 2, COURT_HALFD * 2),
  woodMat
);
courtFloor.rotation.x = -Math.PI / 2;
courtFloor.receiveShadow = true;
scene.add(courtFloor);

// Glossy floor sheen overlay
const courtSheen = new THREE.Mesh(
  new THREE.PlaneGeometry(COURT_HALFW * 2, COURT_HALFD * 2),
  new THREE.MeshStandardMaterial({ color: 0xfff2cc, metalness: 0.7, roughness: 0.25,
    transparent: true, opacity: 0.18, depthWrite: false })
);
courtSheen.rotation.x = -Math.PI / 2;
courtSheen.position.y = 0.005;
scene.add(courtSheen);

// Court lines: center line, center circle, 3-point arcs, key boxes
const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
function addLine(w, d, x, z) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), lineMat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.015, z);
  scene.add(m);
}
// Sidelines + baseline
addLine(COURT_HALFW * 2, 0.1, 0,  COURT_HALFD - 0.05);
addLine(COURT_HALFW * 2, 0.1, 0, -COURT_HALFD + 0.05);
addLine(0.1, COURT_HALFD * 2,  COURT_HALFW - 0.05, 0);
addLine(0.1, COURT_HALFD * 2, -COURT_HALFW + 0.05, 0);
// Center line
addLine(0.1, COURT_HALFD * 2, 0, 0);
// Center circle (thin ring made from a torus)
const centerCircle = new THREE.Mesh(
  new THREE.TorusGeometry(1.6, 0.05, 6, 32),
  lineMat
);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.y = 0.02;
scene.add(centerCircle);
// 3-point arcs (half-tori at each end of the court)
for (const side of [-1, 1]) {
  const arc = new THREE.Mesh(
    new THREE.TorusGeometry(4.2, 0.05, 6, 28, Math.PI),
    lineMat
  );
  arc.rotation.x = -Math.PI / 2;
  arc.rotation.z = side > 0 ? Math.PI : 0;
  arc.position.set(side * (COURT_HALFW - 1.8), 0.02, 0);
  scene.add(arc);
  // Key (paint area)
  const key = new THREE.Mesh(
    new THREE.PlaneGeometry(3.5, 3.0),
    new THREE.MeshStandardMaterial({ color: side > 0 ? 0x3060c0 : 0xc03040, roughness: 0.6, transparent: true, opacity: 0.45 })
  );
  key.rotation.x = -Math.PI / 2;
  key.position.set(side * (COURT_HALFW - 1.75), 0.012, 0);
  scene.add(key);
}

// ============== WORLD: STANDS / CROWD ==============
function makeStands() {
  const g = new THREE.Group();
  const seatMat = new THREE.MeshStandardMaterial({ color: 0x303040, roughness: 0.8 });
  // Far-side stands (behind the court along -Z)
  for (let row = 0; row < 4; row++) {
    const tier = new THREE.Mesh(
      new THREE.BoxGeometry(COURT_HALFW * 2 + 8, 0.6, 1.4),
      seatMat
    );
    tier.position.set(0, 0.3 + row * 0.55, -COURT_HALFD - 1.2 - row * 1.1);
    tier.receiveShadow = true;
    g.add(tier);
    // Crowd dots: small colored sphere-people on each tier
    const PEOPLE = 24;
    for (let i = 0; i < PEOPLE; i++) {
      const headHue = Math.random();
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 8, 8),
        new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(headHue, 0.6, 0.5), roughness: 0.6 })
      );
      head.position.set(
        -COURT_HALFW + 0.6 + (i / (PEOPLE - 1)) * (COURT_HALFW * 2 - 1.2) + (Math.random() - 0.5) * 0.3,
        0.85 + row * 0.55,
        -COURT_HALFD - 1.2 - row * 1.1
      );
      head.userData.bobPhase = Math.random() * Math.PI * 2;
      head.userData.bobAmp = 0.04 + Math.random() * 0.05;
      head.userData.bobY = head.position.y;
      g.add(head);
      crowdHeads.push(head);
    }
  }
  // Near-side stands (along +Z, behind the camera area — partial so they don't block view)
  for (let row = 0; row < 3; row++) {
    const tier = new THREE.Mesh(
      new THREE.BoxGeometry(COURT_HALFW * 2 + 8, 0.6, 1.4),
      seatMat
    );
    tier.position.set(0, 0.3 + row * 0.55, COURT_HALFD + 1.2 + row * 1.1);
    g.add(tier);
  }
  // Side baselines (behind each hoop)
  for (const side of [-1, 1]) {
    for (let row = 0; row < 3; row++) {
      const tier = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.6, COURT_HALFD * 2 + 4),
        seatMat
      );
      tier.position.set(side * (COURT_HALFW + 1.2 + row * 1.1), 0.3 + row * 0.55, 0);
      g.add(tier);
    }
  }
  return g;
}
const crowdHeads = [];
scene.add(makeStands());

// ============== WORLD: SCOREBOARD (hanging above center court) ==============
const scoreboardGroup = new THREE.Group();
{
  const housing = new THREE.Mesh(
    new THREE.BoxGeometry(7, 2.5, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.45, metalness: 0.3 })
  );
  scoreboardGroup.add(housing);
  // Front + back panels: dark with glowing display area
  for (const sgn of [-1, 1]) {
    const panel = new THREE.Mesh(
      new THREE.BoxGeometry(6.6, 2.1, 0.06),
      new THREE.MeshStandardMaterial({
        color: 0x1a1a28, emissive: 0xff2244, emissiveIntensity: 0.4
      })
    );
    panel.position.z = sgn * 0.81;
    scoreboardGroup.add(panel);
    // Team-colored side stripes
    const sl = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 1.9, 0.08),
      new THREE.MeshStandardMaterial({ color: 0xff5050, emissive: 0xff5050, emissiveIntensity: 1.0 })
    );
    sl.position.set(-2.85, 0, sgn * 0.85);
    scoreboardGroup.add(sl);
    const sr = sl.clone();
    sr.material = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x4488ff, emissiveIntensity: 1.0 });
    sr.position.x = 2.85;
    scoreboardGroup.add(sr);
  }
  // Suspension wires
  const wireMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6 });
  for (const wx of [-2, 2]) {
    const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 6, 6), wireMat);
    wire.position.set(wx, 4, 0);
    scoreboardGroup.add(wire);
  }
  scoreboardGroup.position.set(0, 9, 0);
}
scene.add(scoreboardGroup);

// ============== WORLD: HOOPS ==============
function makeHoop(side) {
  // side = -1 (left) or +1 (right). Hoop faces inward (toward center court).
  const g = new THREE.Group();
  // Pole (vertical metal post behind baseline)
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.7, roughness: 0.35 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, HOOP_Y + 1.5, 12), poleMat);
  pole.position.set(side * (COURT_HALFW + 0.5), (HOOP_Y + 1.5) / 2, 0);
  pole.castShadow = true;
  g.add(pole);
  // Arm reaching out from pole to backboard
  const arm = new THREE.Mesh(new THREE.BoxGeometry(side * -0.9, 0.18, 0.18), poleMat);
  arm.position.set(side * (COURT_HALFW + 0.05), HOOP_Y + 0.4, 0);
  g.add(arm);
  // Backboard (white panel facing court)
  const backboard = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 1.6, 2.5),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 })
  );
  backboard.position.set(side * (COURT_HALFW - 0.4), HOOP_Y + 0.6, 0);
  g.add(backboard);
  // Red square (target painted on backboard)
  const target = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.5, 0.8),
    new THREE.MeshStandardMaterial({ color: 0xff3333 })
  );
  target.position.set(side * (COURT_HALFW - 0.36), HOOP_Y + 0.4, 0);
  g.add(target);
  // Rim (orange torus). Position on inside face of backboard.
  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(RIM_R, 0.06, 8, 24),
    new THREE.MeshStandardMaterial({ color: 0xff6020, metalness: 0.7, roughness: 0.35, emissive: 0x441500, emissiveIntensity: 0.4 })
  );
  rim.rotation.x = Math.PI / 2;
  rim.position.set(side * (HOOP_X), HOOP_Y, HOOP_Z);
  g.add(rim);
  // Net (cone of vertical strands made via thin transparent cylinder mesh)
  const netMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false
  });
  const net = new THREE.Mesh(
    new THREE.CylinderGeometry(RIM_R * 0.95, RIM_R * 0.55, 0.7, 16, 1, true),
    netMat
  );
  net.position.set(side * HOOP_X, HOOP_Y - 0.35, HOOP_Z);
  g.add(net);
  // Visible vertical strands (12 thin lines)
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2;
    const x1 = Math.cos(ang) * RIM_R * 0.95;
    const z1 = Math.sin(ang) * RIM_R * 0.95;
    const x2 = Math.cos(ang) * RIM_R * 0.55;
    const z2 = Math.sin(ang) * RIM_R * 0.55;
    const dx = x2 - x1, dz = z2 - z1, dy = -0.7;
    const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const strand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, len, 4),
      new THREE.MeshStandardMaterial({ color: 0xeeeeee })
    );
    strand.position.set(
      side * HOOP_X + (x1 + x2) / 2,
      HOOP_Y - 0.35,
      HOOP_Z + (z1 + z2) / 2
    );
    // Orient strand from top ring point to bottom ring point
    strand.lookAt(side * HOOP_X + x2, HOOP_Y - 0.7, HOOP_Z + z2);
    strand.rotateX(Math.PI / 2);
    g.add(strand);
  }
  return g;
}
scene.add(makeHoop(-1));
scene.add(makeHoop(+1));

// ============== WORLD: BALL ==============
const ballMat = new THREE.MeshStandardMaterial({ color: 0xe06a20, roughness: 0.55, metalness: 0.05 });
const ballGroup = new THREE.Group();
const ballSphere = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 20, 16), ballMat);
ballSphere.castShadow = true;
ballGroup.add(ballSphere);
// Ball seam lines (black bands)
const seamMat = new THREE.MeshBasicMaterial({ color: 0x14140a });
for (let i = 0; i < 4; i++) {
  const seam = new THREE.Mesh(
    new THREE.TorusGeometry(BALL_R + 0.001, 0.012, 4, 24),
    seamMat
  );
  if (i === 0) { /* equator */ }
  else if (i === 1) { seam.rotation.x = Math.PI / 2; }
  else if (i === 2) { seam.rotation.x = Math.PI / 4; }
  else { seam.rotation.x = -Math.PI / 4; }
  ballGroup.add(seam);
}
scene.add(ballGroup);
const ball = {
  pos: new THREE.Vector3(0, 1.0, 0),
  vel: new THREE.Vector3(0, 0, 0),
  heldBy: null
};

// ============== PLAYERS ==============
function makePlayer(teamColor, secondaryColor) {
  const g = new THREE.Group();
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xfdc97a, roughness: 0.6 });
  const shirtMat = new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.7 });
  const shortsMat = new THREE.MeshStandardMaterial({ color: secondaryColor, roughness: 0.75 });
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });

  // Torso (capsule for rounded look)
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.42, 0.5, 4, 12), shirtMat);
  torso.position.y = 1.25;
  torso.scale.set(1, 1, 0.7);
  torso.castShadow = true;
  g.add(torso);
  // Shorts (lower body band)
  const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.34, 0.35, 14), shortsMat);
  shorts.position.y = 0.78;
  g.add(shorts);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 18, 16), skinMat);
  head.position.y = 1.95;
  head.castShadow = true;
  g.add(head);
  // Eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyeMat);
  eyeL.position.set(-0.1, 1.97, 0.27);
  g.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.1; g.add(eyeR);
  // Mouth (smile dash)
  const mouth = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 0.025, 0.02),
    new THREE.MeshBasicMaterial({ color: 0x6e1b22 })
  );
  mouth.position.set(0, 1.82, 0.3);
  g.add(mouth);
  // Headband (team color)
  const band = new THREE.Mesh(new THREE.CylinderGeometry(0.33, 0.33, 0.08, 18), shirtMat);
  band.position.y = 2.13;
  g.add(band);

  // Arms — pivot at shoulder, capsule segment hanging down
  function makeArm() {
    const pivot = new THREE.Group();
    const seg = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.55, 4, 8), shirtMat);
    seg.position.y = -0.4;
    seg.castShadow = true;
    pivot.add(seg);
    // Hand (skin sphere at end)
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8), skinMat);
    hand.position.y = -0.78;
    pivot.add(hand);
    // Shoulder cap
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8), shirtMat);
    pivot.add(cap);
    return pivot;
  }
  const armL = makeArm();
  armL.position.set(-0.42, 1.55, 0);
  g.add(armL);
  const armR = makeArm();
  armR.position.set( 0.42, 1.55, 0);
  g.add(armR);

  // Legs
  function makeLeg() {
    const pivot = new THREE.Group();
    const seg = new THREE.Mesh(new THREE.CapsuleGeometry(0.13, 0.5, 4, 8), shortsMat);
    seg.position.y = -0.35;
    seg.castShadow = true;
    pivot.add(seg);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.16, 0.42), shoeMat);
    shoe.position.set(0, -0.7, 0.08);
    pivot.add(shoe);
    return pivot;
  }
  const legL = makeLeg();
  legL.position.set(-0.18, 0.6, 0);
  g.add(legL);
  const legR = makeLeg();
  legR.position.set( 0.18, 0.6, 0);
  g.add(legR);

  // Wrap into a player descriptor with limb refs for animation
  return {
    group: g,
    armL, armR, legL, legR,
    head, torso,
    // Physics state
    x: 0, y: 0, z: 0,
    vy: 0,
    facing: 1,    // +1 facing right, -1 facing left
    onGround: true,
    holding: false,
    teamColor,
    score: 0,
    walkPhase: 0
  };
}

const playerL = makePlayer(0xe04848, 0x202020);
playerL.x = -6; playerL.facing = 1; playerL.team = 'L';
scene.add(playerL.group);
const playerR = makePlayer(0x4488ff, 0x202020);
playerR.x = 6; playerR.facing = -1; playerR.team = 'R';
scene.add(playerR.group);

function setPlayerTransform(p) {
  p.group.position.set(p.x, p.y, p.z);
  // Face direction: rotate Y so the body faces +X or -X
  p.group.rotation.y = p.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
}
setPlayerTransform(playerL);
setPlayerTransform(playerR);

// ============== INPUT ==============
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (winner && (e.code === 'Space' || e.code === 'Enter')) restart();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============== GAME STATE ==============
let winner = null;
const scoreLEl = document.getElementById('scoreL');
const scoreREl = document.getElementById('scoreR');
const flashEl = document.getElementById('flash');
const scoreFlashEl = document.getElementById('scoreFlash');
const winScreenEl = document.getElementById('winScreen');
const winTitleEl = document.getElementById('winTitle');
const winScoreEl = document.getElementById('winScore');

function flashTint(rgba, ms) {
  flashEl.style.background = rgba;
  setTimeout(() => flashEl.style.background = 'rgba(255,255,255,0)', ms);
}
function popScore(team) {
  const word = scoreFlashEl.querySelector('.word');
  word.textContent = team === 'L' ? 'PISTONS +1' : 'BUCKS +1';
  word.style.color = team === 'L' ? '#ff7070' : '#80aaff';
  scoreFlashEl.classList.remove('show');
  void scoreFlashEl.offsetWidth; // restart animation
  scoreFlashEl.classList.add('show');
  setTimeout(() => scoreFlashEl.classList.remove('show'), 700);
}

function resetPositions() {
  playerL.x = -6; playerL.y = 0; playerL.vy = 0; playerL.holding = false; playerL.facing = 1;
  playerR.x = 6;  playerR.y = 0; playerR.vy = 0; playerR.holding = false; playerR.facing = -1;
  ball.pos.set((Math.random() - 0.5) * 4, 4, 0);
  ball.vel.set((Math.random() - 0.5) * 2, 0, 0);
  ball.heldBy = null;
  setPlayerTransform(playerL);
  setPlayerTransform(playerR);
}

function restart() {
  playerL.score = 0; playerR.score = 0;
  scoreLEl.textContent = 0; scoreREl.textContent = 0;
  winner = null;
  winScreenEl.classList.remove('show');
  resetPositions();
}

// ============== PHYSICS HELPERS ==============
function distXZ(ax, az, bx, bz) {
  const dx = ax - bx, dz = az - bz;
  return Math.sqrt(dx*dx + dz*dz);
}

function tryPickup(p) {
  if (ball.heldBy || p.holding) return;
  if (p.y > 1.0) return; // must be near ground to pick up
  const dx = ball.pos.x - p.x;
  const dy = ball.pos.y - (p.y + 1.0);
  const dz = ball.pos.z - p.z;
  const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
  if (d < PICKUP_R) {
    ball.heldBy = p;
    p.holding = true;
  }
}

function throwBall(p) {
  // Release the ball with arc toward opponent's hoop
  if (!p.holding) return;
  const targetHoopX = (p === playerL) ? HOOP_X : -HOOP_X;
  const horizontalDir = Math.sign(targetHoopX - p.x);
  // Throw strength scales with distance to hoop (so longer throws still reach)
  const dist = Math.abs(targetHoopX - p.x);
  const speedX = Math.max(8, dist * 1.05);
  const speedY = 11 + Math.min(3, dist * 0.15);
  ball.pos.set(p.x + horizontalDir * 0.4, p.y + 2.0, p.z);
  ball.vel.set(horizontalDir * speedX * 0.6, speedY, 0);
  ball.heldBy = null;
  p.holding = false;
}

// ============== MAIN LOOP ==============
let lastT = performance.now();
let prevBallY = ball.pos.y;
// Track jump-key press for each player to detect KEY DOWN edge (not held)
let prevJumpL = false, prevJumpR = false;

function updatePlayer(p, leftKey, rightKey, jumpKey, prevJumpFlag, isLeft, dt) {
  if (winner) return prevJumpFlag;
  // Movement
  let move = 0;
  if (keys[leftKey])  move -= 1;
  if (keys[rightKey]) move += 1;
  p.x += move * MOVE_SPEED * dt;
  // Clamp inside the court
  p.x = Math.max(-COURT_HALFW + 0.6, Math.min(COURT_HALFW - 0.6, p.x));
  // Facing direction (kept stable while idle, flips on direction change)
  if (move !== 0) p.facing = move > 0 ? 1 : -1;

  // Jump / throw edge detection
  const jumpNow = !!keys[jumpKey];
  if (jumpNow && !prevJumpFlag) {
    if (p.holding) {
      // Throw the ball
      // Need to also leave the ground (small hop) for visual feedback
      if (p.onGround) { p.vy = JUMP_V * 0.7; p.onGround = false; }
      throwBall(p);
    } else if (p.onGround) {
      p.vy = JUMP_V;
      p.onGround = false;
    }
  }
  prevJumpFlag = jumpNow;

  // Gravity / vertical motion
  if (!p.onGround) {
    p.vy -= GRAVITY * dt;
    p.y += p.vy * dt;
    if (p.y <= 0) {
      p.y = 0; p.vy = 0; p.onGround = true;
    }
  }

  // Walk cycle phase: only advance while moving on ground
  if (Math.abs(move) > 0 && p.onGround) {
    p.walkPhase += dt * 12;
  } else {
    p.walkPhase += dt * 1.5; // idle breathing
  }
  const swing = Math.sin(p.walkPhase) * (p.onGround && Math.abs(move) > 0 ? 0.8 : 0.1);
  p.legL.rotation.x =  swing;
  p.legR.rotation.x = -swing;
  if (p.holding) {
    // Cradle the ball in front of the chest
    p.armL.rotation.x = -1.6; p.armL.rotation.z = 0.2;
    p.armR.rotation.x = -1.6; p.armR.rotation.z = -0.2;
  } else {
    p.armL.rotation.x = -swing * 0.9;
    p.armR.rotation.x =  swing * 0.9;
    p.armL.rotation.z = 0; p.armR.rotation.z = 0;
  }

  // Try pickup (every frame if on ground & no holding)
  tryPickup(p);

  setPlayerTransform(p);
  return jumpNow;
}

function updateBall(dt) {
  if (ball.heldBy) {
    const p = ball.heldBy;
    // Ball cradled in front of chest, slightly in the direction the player faces
    ball.pos.set(p.x + p.facing * 0.35, p.y + 1.5, p.z);
    ball.vel.set(0, 0, 0);
    ballGroup.position.copy(ball.pos);
    ballGroup.rotation.y += dt * 4;
    return;
  }
  // Gravity
  ball.vel.y -= GRAVITY * dt;
  ball.pos.x += ball.vel.x * dt;
  ball.pos.y += ball.vel.y * dt;
  ball.pos.z += ball.vel.z * dt;

  // Floor bounce
  if (ball.pos.y - BALL_R < 0) {
    ball.pos.y = BALL_R;
    ball.vel.y *= -0.55;
    ball.vel.x *= 0.82;
    ball.vel.z *= 0.82;
    if (Math.abs(ball.vel.y) < 0.5) ball.vel.y = 0;
  }
  // Court Z boundaries (gentle wall bounce)
  if (Math.abs(ball.pos.z) > COURT_HALFD - BALL_R) {
    ball.pos.z = Math.sign(ball.pos.z) * (COURT_HALFD - BALL_R);
    ball.vel.z *= -0.6;
  }
  // Court X boundaries (loose, ball can fly past hoops)
  if (Math.abs(ball.pos.x) > COURT_HALFW + 3) {
    // Reset if it flies away
    ball.pos.set(0, 5, 0);
    ball.vel.set((Math.random() - 0.5) * 3, 0, 0);
  }

  // Backboard collisions
  for (const sgn of [-1, 1]) {
    const bx = sgn * (COURT_HALFW - 0.4);
    if (Math.abs(ball.pos.x - bx) < BALL_R + 0.05
        && Math.abs(ball.pos.z) < 1.25
        && ball.pos.y > HOOP_Y - 0.2 && ball.pos.y < HOOP_Y + 1.4) {
      ball.pos.x = bx + Math.sign(ball.pos.x - bx) * (BALL_R + 0.05);
      ball.vel.x *= -0.55;
    }
  }

  // Rim collisions (bounce off the front/back/sides of the ring)
  for (const sgn of [-1, 1]) {
    const rx = sgn * HOOP_X;
    const dx = ball.pos.x - rx;
    const dz = ball.pos.z - HOOP_Z;
    const horizD = Math.sqrt(dx*dx + dz*dz);
    // If near rim height and near rim radius, bounce off the ring
    if (Math.abs(ball.pos.y - HOOP_Y) < 0.18
        && horizD > RIM_R - BALL_R * 1.2
        && horizD < RIM_R + BALL_R * 0.8) {
      // Treat each rim point as a small obstacle: push ball away from ring center
      const nx = dx / horizD;
      const nz = dz / horizD;
      const overlap = (RIM_R + BALL_R * 0.4) - horizD;
      // If ball is OUTSIDE the rim (horizD > RIM_R), push outward; otherwise push inward toward center
      if (horizD > RIM_R) {
        ball.pos.x += nx * overlap;
        ball.pos.z += nz * overlap;
      }
      // Reflect velocity around the normal
      const vDotN = ball.vel.x * nx + ball.vel.z * nz;
      ball.vel.x -= 1.5 * vDotN * nx;
      ball.vel.z -= 1.5 * vDotN * nz;
      ball.vel.y *= 0.7;
      ball.vel.x *= 0.85;
      ball.vel.z *= 0.85;
    }
  }

  // Score detection: ball crosses from above to below rim plane while inside the ring
  for (const sgn of [-1, 1]) {
    const rx = sgn * HOOP_X;
    if (prevBallY > HOOP_Y && ball.pos.y <= HOOP_Y
        && Math.abs(ball.pos.x - rx) < RIM_R * 0.85
        && Math.abs(ball.pos.z - HOOP_Z) < RIM_R * 0.85
        && ball.vel.y < 0) {
      // SCORE — sgn -1 = left hoop, scored on by right team; sgn +1 = right hoop, scored on by left
      const team = sgn > 0 ? 'L' : 'R';
      if (team === 'L') { playerL.score++; scoreLEl.textContent = playerL.score; }
      else              { playerR.score++; scoreREl.textContent = playerR.score; }
      popScore(team);
      flashTint(team === 'L' ? 'rgba(255,80,80,0.4)' : 'rgba(120,160,255,0.4)', 200);
      // Check win
      if (playerL.score >= WIN_SCORE || playerR.score >= WIN_SCORE) {
        winner = playerL.score >= WIN_SCORE ? 'L' : 'R';
        winTitleEl.textContent = winner === 'L' ? 'PISTONS WIN!' : 'BUCKS WIN!';
        winTitleEl.style.color = winner === 'L' ? '#ff5050' : '#6aaaff';
        winScoreEl.textContent = `${playerL.score} - ${playerR.score}`;
        winScreenEl.classList.add('show');
      } else {
        setTimeout(resetPositions, 700);
      }
    }
  }

  prevBallY = ball.pos.y;
  ballGroup.position.copy(ball.pos);
  // Tumbling rotation from horizontal velocity
  ballGroup.rotation.x += ball.vel.z * dt * 1.5;
  ballGroup.rotation.z -= ball.vel.x * dt * 1.5;
}

function loop() {
  const now = performance.now();
  const dt = Math.min(0.04, (now - lastT) / 1000);
  lastT = now;

  prevJumpL = updatePlayer(playerL, 'KeyA', 'KeyD', 'KeyW', prevJumpL, true,  dt);
  prevJumpR = updatePlayer(playerR, 'ArrowLeft', 'ArrowRight', 'ArrowUp', prevJumpR, false, dt);
  updateBall(dt);

  // Crowd bob
  const tSec = now * 0.001;
  for (const h of crowdHeads) {
    h.position.y = h.userData.bobY + Math.sin(tSec * 3 + h.userData.bobPhase) * h.userData.bobAmp;
  }
  // Scoreboard panel pulse (subtle)
  if (scoreboardGroup.children[1] && scoreboardGroup.children[1].material) {
    scoreboardGroup.children[1].material.emissiveIntensity = 0.35 + 0.1 * Math.sin(tSec * 2);
  }
  // Spotlights gentle sway
  sp1.target.position.x = Math.sin(tSec * 0.4) * 3;
  sp2.target.position.x = -Math.sin(tSec * 0.4) * 3;

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

} // end start()
</script>
</body>
</html>
