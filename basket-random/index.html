<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Random Clone</title>
<style>
    body {
        margin: 0;
        background: #87ceeb;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    canvas {
        display: block;
        background: #4CAF50;
    }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
// ====== GAME SETUP ======
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Ball properties
let ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 20,
    dx: (Math.random() - 0.5) * 8,
    dy: (Math.random() - 0.5) * 8,
    color: "orange"
};

// Hoop properties
let hoop = {
    x: canvas.width - 150,
    y: canvas.height / 2 - 50,
    width: 10,
    height: 100,
    color: "red"
};

// Score
let score = 0;

// ====== DRAW FUNCTIONS ======
function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.fill();
    ctx.closePath();
}

function drawHoop() {
    ctx.fillStyle = hoop.color;
    ctx.fillRect(hoop.x, hoop.y, hoop.width, hoop.height);
}

function drawScore() {
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, 20, 40);
}

// ====== GAME LOOP ======
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBall();
    drawHoop();
    drawScore();

    // Move ball
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Bounce off walls
    if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
        ball.dx *= -1;
    }
    if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.dy *= -1;
    }

    // Check if ball hits hoop
    if (
        ball.x + ball.radius > hoop.x &&
        ball.y > hoop.y &&
        ball.y < hoop.y + hoop.height
    ) {
        score++;
        resetBall();
    }

    requestAnimationFrame(update);
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.dx = (Math.random() - 0.5) * 8;
    ball.dy = (Math.random() - 0.5) * 8;
}

// Start game
update();
</script>
</body>
</html>
