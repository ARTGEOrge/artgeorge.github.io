<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subway Surfers Remake — 3D</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; user-select: none;
    text-shadow: 2px 2px 0 #000, 0 0 12px rgba(0,0,0,0.8);
  }
  #score { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
  #coins { font-size: 20px; color: #ffd34d; margin-top: 2px; }
  #best  { position: fixed; top: 14px; right: 14px; font-size: 14px; color: #fcd34d; text-shadow: 2px 2px 0 #000; }
  #hint  { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
           font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.65);
           text-transform: uppercase; pointer-events: none; user-select: none; }
  #gameover {
    position: fixed; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); text-align: center;
  }
  #gameover.show { display: flex; }
  #gameover h1 {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 96px; color: #ff5050; margin: 0;
    -webkit-text-stroke: 4px #000;
    text-shadow: 0 0 30px rgba(255,80,80,0.6);
  }
  #gameover p { font-family: monospace; font-size: 26px; margin: 6px 0; }
  #gameover .best { color: #fcd34d; }
  #gameover .hint { font-size: 16px; opacity: 0.75; margin-top: 24px; }
  #loadhint { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
              font-size: 18px; color: #aaa; }
  #flash {
    position: fixed; inset: 0;
    background: rgba(255, 0, 0, 0);
    pointer-events: none;
    transition: background 0.18s ease-out;
    box-shadow: inset 0 0 120px rgba(255,0,0,0);
  }
  #danger {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 36px; color: #ff3030; letter-spacing: 4px;
    text-shadow: 2px 2px 0 #000, 0 0 16px rgba(255,40,40,0.9);
    opacity: 0; pointer-events: none; user-select: none;
    transition: opacity 0.15s;
  }
  #danger.on { opacity: 1; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.08); } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loadhint">Loading 3D engine…</div>
<div id="hud" style="display:none">
  <div id="score">0</div>
  <div id="coins">🪙 <span id="coinCount">0</span></div>
</div>
<div id="best" style="display:none">Best: <span id="bestScore">0</span></div>
<div id="hint" style="display:none">← → / A D : hold to steer &nbsp;·&nbsp; ↑ / W / SPACE : jump &nbsp;·&nbsp; ↓ / S : slide</div>
<div id="danger">⚠  COP CLOSING IN!  ⚠</div>
<div id="flash"></div>
<div id="gameover">
  <h1>CRASHED!</h1>
  <p>Score: <span id="finalScore">0</span></p>
  <p>Coins: <span id="finalCoins">0</span></p>
  <p class="best">Best: <span id="finalBest">0</span></p>
  <p class="hint">Press SPACE / ENTER (or tap) to restart</p>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if (typeof THREE === 'undefined') {
  document.getElementById('loadhint').textContent = 'Failed to load Three.js. Check your connection.';
} else {
  document.getElementById('loadhint').remove();
  document.getElementById('hud').style.display = '';
  document.getElementById('best').style.display = '';
  document.getElementById('hint').style.display = '';
  start();
}

function start() {
// ============== RENDERER / SCENE / CAMERA ==============
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
if (THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1730);
scene.fog = new THREE.Fog(0x141a30, 38, 130);

const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 200);
camera.position.set(0, 4.2, 8.5);
camera.lookAt(0, 1.8, -4);

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// ============== LIGHTING ==============
scene.add(new THREE.HemisphereLight(0x6688cc, 0x222a44, 0.85));
const sun = new THREE.DirectionalLight(0xffeec8, 1.15);
sun.position.set(6, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 50;
sun.shadow.bias = -0.0008;
scene.add(sun);

const playerGlow = new THREE.PointLight(0xffeeaa, 0.6, 14);
playerGlow.position.set(0, 5, 7);
scene.add(playerGlow);

// ============== CONSTANTS ==============
const LANE_COUNT  = 3;
const LANE_WIDTH  = 2.4;
const FLOOR_LEN   = 240;
const FLOOR_HALFW = LANE_WIDTH * 2.2;
const TIE_GAP     = 1.6;
const LIGHT_GAP   = 4.2;

// ============== WORLD: FLOOR ==============
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x2c2c34, roughness: 0.95, metalness: 0.05,
});
const floors = [];
for (let i = 0; i < 2; i++) {
  const f = new THREE.Mesh(new THREE.PlaneGeometry(FLOOR_HALFW * 2, FLOOR_LEN), floorMat);
  f.rotation.x = -Math.PI / 2;
  f.position.z = -FLOOR_LEN / 2 - i * FLOOR_LEN;
  f.receiveShadow = true;
  scene.add(f);
  floors.push(f);
}

// ============== ANIMATED VISUAL ARRAYS ==============
const animatedNeon = [];     // emissive meshes whose color cycles per-frame
const animatedBillboards = []; // billboards that flash through colors
const NEON_PALETTE = [0xff3399, 0x33ddff, 0xffcc22, 0x9933ff, 0x22ff88, 0xff5522, 0x66ffff];

// ============== WORLD: STAR FIELD (twinkling night sky) ==============
{
  const starCount = 220;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPos[i*3]     = (Math.random() - 0.5) * 250;
    starPos[i*3 + 1] = 10 + Math.random() * 50;
    starPos[i*3 + 2] = -180 + Math.random() * 180;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.4, sizeAttenuation: true,
    transparent: true, opacity: 0.85
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
}

// ============== WORLD: SWEEPING SEARCHLIGHTS ==============
const searchLights = [];
const SEARCHLIGHT_COLORS = [0xff3399, 0x33ddff, 0xffcc22, 0x9933ff];
for (let i = 0; i < 4; i++) {
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(7, 35, 18, 1, true),
    new THREE.MeshBasicMaterial({
      color: SEARCHLIGHT_COLORS[i],
      transparent: true, opacity: 0.18,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  cone.position.set((i - 1.5) * 28, 22, -60);
  cone.rotation.x = Math.PI;
  cone.userData.phase = Math.random() * Math.PI * 2;
  cone.userData.freq  = 0.0007 + Math.random() * 0.0008;
  scene.add(cone);
  searchLights.push(cone);
}

// ============== WORLD: MOON (huge glowing orb in the distance) ==============
const moonGroup = new THREE.Group();
moonGroup.position.set(38, 48, -160);
{
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(6.5, 32, 24),
    new THREE.MeshBasicMaterial({ color: 0xfff3d0 })
  );
  moonGroup.add(moon);
  // Subtle crater shading (one offset dark sphere creates the "phase" feel without a texture)
  const craterShade = new THREE.Mesh(
    new THREE.SphereGeometry(6.55, 24, 18),
    new THREE.MeshBasicMaterial({ color: 0x6a6680, transparent: true, opacity: 0.18 })
  );
  craterShade.position.set(-1.8, 0.5, 0.3);
  moonGroup.add(craterShade);
  // Layered halo glow
  for (let i = 0; i < 4; i++) {
    const haloR = 8 + i * 3.5;
    const halo = new THREE.Mesh(
      new THREE.SphereGeometry(haloR, 24, 16),
      new THREE.MeshBasicMaterial({
        color: 0xfff0c8, transparent: true,
        opacity: 0.16 - i * 0.035,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    moonGroup.add(halo);
  }
  // Cold blue rim light from the moon (gives the buildings a moonlit edge)
  const moonLight = new THREE.PointLight(0xcfd9ff, 0.6, 80);
  moonLight.position.copy(moonGroup.position);
  scene.add(moonLight);
}
scene.add(moonGroup);

// ============== WORLD: DISTANT PARALLAX SKYLINE (silhouette layer far behind the foreground city) ==============
const distantSkyline = new THREE.Group();
{
  // Two depth tiers: a darker, taller back layer and a lighter, mid layer
  const layers = [
    { z: -175, color: 0x0a1024, height: [14, 30], opacity: 1.0, lit: 0xff7744, litChance: 0.32 },
    { z: -155, color: 0x141a2e, height: [10, 22], opacity: 1.0, lit: 0xffcc66, litChance: 0.28 }
  ];
  for (const layer of layers) {
    const mat = new THREE.MeshBasicMaterial({ color: layer.color, fog: false });
    // Rim of dim window dots (a single PointsMesh shared per layer for cheapness)
    const winPos = [];
    for (let i = 0; i < 40; i++) {
      const w = 4 + Math.random() * 7;
      const h = layer.height[0] + Math.random() * (layer.height[1] - layer.height[0]);
      const x = -120 + i * 6 + (Math.random() - 0.5) * 4;
      const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, 4), mat);
      building.position.set(x, h / 2 - 3, layer.z);
      distantSkyline.add(building);
      // Sprinkle a few warm-lit window points on this silhouette
      const rows = Math.floor(h / 1.4);
      const cols = Math.floor(w / 1.0);
      for (let r = 1; r < rows; r++) {
        for (let cc = 1; cc < cols; cc++) {
          if (Math.random() < layer.litChance) {
            winPos.push(
              x - w / 2 + cc * (w / cols),
              r * (h / rows) - 3,
              layer.z + 2.05
            );
          }
        }
      }
    }
    const wGeo = new THREE.BufferGeometry();
    wGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(winPos), 3));
    const wMat = new THREE.PointsMaterial({
      color: layer.lit, size: 0.4, sizeAttenuation: true,
      transparent: true, opacity: 0.9, depthWrite: false, fog: false
    });
    distantSkyline.add(new THREE.Points(wGeo, wMat));
  }
}
scene.add(distantSkyline);

// ============== WORLD: FLYING DRONES (blinking nav lights drifting across the sky) ==============
const drones = [];
function makeDrone() {
  const g = new THREE.Group();
  // Tiny dark body so the silhouette reads at distance
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.18, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.5, metalness: 0.4 })
  );
  g.add(body);
  // Four rotor arm tips with tiny blinking nav lights (red/green/white pattern)
  const navColors = [0xff3030, 0x30ff60, 0xffffff, 0x30aaff];
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const x = Math.cos(angle) * 0.5;
    const z = Math.sin(angle) * 0.5;
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.06, 0.45),
      new THREE.MeshStandardMaterial({ color: 0x222230, roughness: 0.5 })
    );
    arm.position.set(x * 0.5, 0, z * 0.5);
    arm.lookAt(x, 0, z);
    g.add(arm);
    const light = new THREE.Mesh(
      new THREE.SphereGeometry(0.11, 8, 8),
      new THREE.MeshBasicMaterial({ color: navColors[i] })
    );
    light.position.set(x, 0, z);
    light.userData.baseColor = navColors[i];
    light.userData.phase = Math.random() * Math.PI * 2;
    g.add(light);
    g.userData.lights = g.userData.lights || [];
    g.userData.lights.push(light);
  }
  return g;
}
for (let i = 0; i < 4; i++) {
  const d = makeDrone();
  d.position.set(
    -90 + Math.random() * 60,
    18 + Math.random() * 22,
    -90 - Math.random() * 70
  );
  d.userData.speed = 3 + Math.random() * 4;
  d.userData.bobPhase = Math.random() * Math.PI * 2;
  d.userData.baseY = d.position.y;
  scene.add(d);
  drones.push(d);
}

// ============== WORLD: HIGH-ALTITUDE AIRCRAFT WARNING LIGHTS ==============
// Tiny red blinkers floating very high — sells the "huge city, deep sky" feel
const aircraftLights = [];
for (let i = 0; i < 6; i++) {
  const al = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff3030 })
  );
  al.position.set(
    -100 + Math.random() * 200,
    42 + Math.random() * 18,
    -120 - Math.random() * 60
  );
  al.userData.phase = Math.random() * Math.PI * 2;
  al.userData.freq = 1.5 + Math.random() * 1.5;
  scene.add(al);
  aircraftLights.push(al);
}

// ============== WORLD: ATMOSPHERIC HAZE LAYERS (cinematic depth) ==============
const hazeLayers = [];
{
  const hazeColors = [0x4a3068, 0x282040, 0x1a2848];
  for (let i = 0; i < 3; i++) {
    const haze = new THREE.Mesh(
      new THREE.PlaneGeometry(280, 24 + i * 8),
      new THREE.MeshBasicMaterial({
        color: hazeColors[i],
        transparent: true,
        opacity: 0.18 - i * 0.04,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        fog: false
      })
    );
    haze.position.set(0, 10 + i * 6, -90 - i * 22);
    scene.add(haze);
    hazeLayers.push(haze);
  }
}

// ============== WORLD: GLOWING EMBER DUST (warm motes drifting through the air) ==============
const EMBER_COUNT = 90;
const emberPos = new Float32Array(EMBER_COUNT * 3);
const emberVel = new Float32Array(EMBER_COUNT * 3);
for (let i = 0; i < EMBER_COUNT; i++) {
  emberPos[i * 3]     = (Math.random() - 0.5) * 90;
  emberPos[i * 3 + 1] = Math.random() * 22 + 1;
  emberPos[i * 3 + 2] = -Math.random() * 140 + 10;
  emberVel[i * 3]     = (Math.random() - 0.5) * 0.4;
  emberVel[i * 3 + 1] = 0.4 + Math.random() * 0.5;
  emberVel[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
}
const emberGeo = new THREE.BufferGeometry();
emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
const emberMat = new THREE.PointsMaterial({
  color: 0xffaa44, size: 0.22, sizeAttenuation: true,
  transparent: true, opacity: 0.85, depthWrite: false,
  blending: THREE.AdditiveBlending, fog: false
});
const embers = new THREE.Points(emberGeo, emberMat);
scene.add(embers);

// ============== WORLD: WET-PAVEMENT REFLECTION SHEEN ==============
// Subtle glossy overlay on top of the floor — a faint blue gradient that catches the camera angle
const wetSheen = new THREE.Mesh(
  new THREE.PlaneGeometry(FLOOR_HALFW * 2, FLOOR_LEN),
  new THREE.MeshStandardMaterial({
    color: 0x141a2a, metalness: 0.85, roughness: 0.25,
    transparent: true, opacity: 0.42, depthWrite: false
  })
);
wetSheen.rotation.x = -Math.PI / 2;
wetSheen.position.y = 0.005;
// Make two copies so it scrolls with the floor segments
const wetSheens = [];
for (let i = 0; i < 2; i++) {
  const s = wetSheen.clone();
  s.position.z = -FLOOR_LEN / 2 - i * FLOOR_LEN;
  scene.add(s);
  wetSheens.push(s);
}

// Fake reflection streaks: thin emissive rectangles down the lane centers (vertical light reflections)
const reflectionStreaks = [];
const streakColors = [0xff44aa, 0x44aaff, 0xffcc44];
for (let i = 0; i < 3; i++) {
  for (let copy = 0; copy < 2; copy++) {
    const streak = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, FLOOR_LEN * 0.5),
      new THREE.MeshBasicMaterial({
        color: streakColors[i],
        transparent: true,
        opacity: 0.12,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    streak.rotation.x = -Math.PI / 2;
    streak.position.set((i - 1) * LANE_WIDTH, 0.012, -FLOOR_LEN / 2 - copy * FLOOR_LEN);
    scene.add(streak);
    reflectionStreaks.push(streak);
  }
}

// ============== WORLD: CITY BUILDINGS (replaces tunnel walls + ceiling) ==============
const BUILDING_COLORS = [0x1a2030, 0x202836, 0x18202a, 0x2a2034, 0x1c2838, 0x1c1c24, 0x252535, 0x222a3a];
const ROOF_COLOR     = 0x0c0e14;
// Sleek dark-glass curtain wall material — slightly emissive so it reads as nighttime tinted glass
const glassMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e16, metalness: 0.85, roughness: 0.22, emissive: 0x1a2236, emissiveIntensity: 0.45
});
const mullionMat = new THREE.MeshStandardMaterial({ color: 0x0a0a10, metalness: 0.75, roughness: 0.35 });
const podiumMat = new THREE.MeshStandardMaterial({ color: 0x161820, metalness: 0.35, roughness: 0.55 });
const crownMat = new THREE.MeshStandardMaterial({ color: ROOF_COLOR, metalness: 0.55, roughness: 0.55 });
const winStripLitMat  = new THREE.MeshStandardMaterial({ color: 0xffd9a0, emissive: 0xff9944, emissiveIntensity: 1.0 });
const winStripCoolMat = new THREE.MeshStandardMaterial({ color: 0xa0d4ff, emissive: 0x4488ff, emissiveIntensity: 0.9 });
const STOREFRONT_PALETTE = [
  { c: 0xffaa44, e: 0x884422 }, // amber
  { c: 0xff44aa, e: 0x882244 }, // hot pink
  { c: 0x44ffaa, e: 0x228855 }, // mint
  { c: 0x44aaff, e: 0x224488 }, // cyan
  { c: 0xff4444, e: 0x882222 }, // red
  { c: 0xffff44, e: 0x888822 }, // bright yellow
  { c: 0xaa44ff, e: 0x442288 }, // purple
];

function makeBuildingRow(side) {
  const g = new THREE.Group();
  const buildingsCount = 14;
  const sectionLen = FLOOR_LEN / buildingsCount;
  for (let i = 0; i < buildingsCount; i++) {
    const z = -FLOOR_LEN / 2 + i * sectionLen + sectionLen / 2;
    const h = 5 + Math.random() * 14;                       // taller skyline
    const w = sectionLen * (0.86 + Math.random() * 0.10);
    const depth = 3.2 + Math.random() * 2.6;                // deeper, more solid
    const c = BUILDING_COLORS[Math.floor(Math.random() * BUILDING_COLORS.length)];
    const bx = side * (FLOOR_HALFW + depth / 2 + 0.4);
    const facadeX = side * (FLOOR_HALFW + 0.4);             // x of inner (road-facing) face

    // --- Podium / street-level base (slightly wider than tower, classic skyscraper plinth)
    const podiumH = 1.6;
    const podium = new THREE.Mesh(
      new THREE.BoxGeometry(depth + 0.35, podiumH, w + 0.25),
      podiumMat
    );
    podium.position.set(bx, podiumH / 2, z);
    podium.receiveShadow = true;
    g.add(podium);

    // --- Main tower body (above podium)
    const bodyH = h - podiumH;
    const towerMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.45, metalness: 0.55 });
    const tower = new THREE.Mesh(new THREE.BoxGeometry(depth, bodyH, w), towerMat);
    tower.position.set(bx, podiumH + bodyH / 2, z);
    tower.receiveShadow = true;
    g.add(tower);

    // --- Setback tier on tall buildings (steps back from the road for a real skyline silhouette)
    const tall = h > 11;
    let topY = h;
    let topCenterX = bx;
    let topW = w, topD = depth;
    if (tall) {
      const setbackH = 2 + Math.random() * 3.5;
      const setbackD = depth * (0.60 + Math.random() * 0.15);
      const setbackW = w * (0.74 + Math.random() * 0.12);
      // align outer (away-from-road) face with tower so step is visible from the player
      const setbackX = bx + side * (depth - setbackD) / 2;
      const setback = new THREE.Mesh(
        new THREE.BoxGeometry(setbackD, setbackH, setbackW),
        towerMat
      );
      setback.position.set(setbackX, h + setbackH / 2, z);
      g.add(setback);
      topY = h + setbackH;
      topCenterX = setbackX;
      topW = setbackW; topD = setbackD;
    }

    // --- Glass curtain-wall facade panel on the inner (road-facing) face
    const facade = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, bodyH * 0.96, w * 0.92),
      glassMat
    );
    facade.position.set(facadeX - side * 0.05, podiumH + bodyH / 2, z);
    g.add(facade);

    // --- Vertical mullions: slim metal pillars dividing the curtain wall into panels
    const mullCount = Math.max(2, Math.floor(w / 1.0));
    for (let m = 0; m <= mullCount; m++) {
      const mz = z - w / 2 + (m * w) / mullCount;
      const mull = new THREE.Mesh(
        new THREE.BoxGeometry(0.22, bodyH, 0.14),
        mullionMat
      );
      mull.position.set(facadeX - side * 0.02, podiumH + bodyH / 2, mz);
      g.add(mull);
    }

    // --- Continuous horizontal window strips (sleek light bands, not dotted windows)
    const stripCount = Math.max(2, Math.floor(bodyH / 1.3));
    const stripSpacing = bodyH / (stripCount + 0.5);
    const stripMat = Math.random() < 0.7 ? winStripLitMat : winStripCoolMat;
    for (let s = 0; s < stripCount; s++) {
      if (Math.random() < 0.85) {
        const strip = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.45, w * 0.88),
          stripMat
        );
        strip.position.set(facadeX - side * 0.07, podiumH + 0.7 + s * stripSpacing, z);
        g.add(strip);
      }
    }
    // Setback-tier glass + a couple of strips
    if (tall) {
      const sbInnerX = topCenterX - side * (topD / 2);
      const sbFacade = new THREE.Mesh(
        new THREE.BoxGeometry(0.16, (topY - h) * 0.9, topW * 0.9),
        glassMat
      );
      sbFacade.position.set(sbInnerX - side * 0.04, (h + topY) / 2, z);
      g.add(sbFacade);
      const sbStrips = Math.max(1, Math.floor((topY - h) / 1.2));
      for (let s = 0; s < sbStrips; s++) {
        const strip = new THREE.Mesh(
          new THREE.BoxGeometry(0.07, 0.4, topW * 0.84),
          stripMat
        );
        strip.position.set(sbInnerX - side * 0.06, h + 0.6 + s * 1.2, z);
        g.add(strip);
      }
    }

    // --- Crown / parapet slab on top
    const crownH = 0.35;
    const crown = new THREE.Mesh(
      new THREE.BoxGeometry(topD * 1.04, crownH, topW * 1.04),
      crownMat
    );
    crown.position.set(topCenterX, topY + crownH / 2, z);
    g.add(crown);

    // --- Glowing storefront at podium level
    if (Math.random() < 0.7) {
      const sp = STOREFRONT_PALETTE[Math.floor(Math.random() * STOREFRONT_PALETTE.length)];
      const sf = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.95, w * 0.55),
        new THREE.MeshStandardMaterial({ color: sp.c, emissive: sp.e, emissiveIntensity: 1.3 })
      );
      sf.position.set(facadeX - side * 0.09, 0.75, z + (Math.random() - 0.5) * w * 0.3);
      g.add(sf);
    }

    // --- Horizontal neon trim band on the inner face (animated)
    if (Math.random() < 0.65) {
      const neonColor = NEON_PALETTE[Math.floor(Math.random() * NEON_PALETTE.length)];
      const trimY = podiumH + 0.4 + Math.random() * Math.max(0.5, bodyH - 1.0);
      const trim = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.14, w + 0.04),
        new THREE.MeshBasicMaterial({ color: neonColor })
      );
      trim.position.set(facadeX - side * 0.11, trimY, z);
      trim.userData.phase = Math.random() * Math.PI * 2;
      trim.userData.baseColor = neonColor;
      g.add(trim);
      animatedNeon.push(trim);
    }

    // --- Vertical neon edge accent on taller buildings (corner light strip)
    if (h > 8 && Math.random() < 0.55) {
      const neonColor = NEON_PALETTE[Math.floor(Math.random() * NEON_PALETTE.length)];
      const edge = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, bodyH - 0.6, 0.18),
        new THREE.MeshBasicMaterial({ color: neonColor })
      );
      const eZ = (Math.random() < 0.5 ? -1 : 1) * (w / 2 - 0.35);
      edge.position.set(facadeX - side * 0.1, podiumH + bodyH / 2, z + eZ);
      edge.userData.phase = Math.random() * Math.PI * 2;
      g.add(edge);
      animatedNeon.push(edge);
    }

    // --- Rooftop billboard with color-cycling face
    if (h > 7 && Math.random() < 0.4) {
      const bbColor = NEON_PALETTE[Math.floor(Math.random() * NEON_PALETTE.length)];
      const bb = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 1.6, 2.6),
        new THREE.MeshStandardMaterial({
          color: bbColor, emissive: bbColor, emissiveIntensity: 1.4
        })
      );
      const bbX = topCenterX - side * (topD / 2) - side * 0.1;
      bb.position.set(bbX, topY + 1.0, z);
      bb.userData.phase = Math.random() * Math.PI * 2;
      g.add(bb);
      animatedBillboards.push(bb);
      // Billboard frame
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6 });
      const frTop = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 2.7), frameMat);
      frTop.position.set(bbX, topY + 1.85, z); g.add(frTop);
      const frBot = frTop.clone(); frBot.position.y = topY + 0.15; g.add(frBot);
      // Support struts
      const strut = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.7, 0.05), frameMat);
      strut.position.set(bbX, topY + 0.4, z - 0.9);
      g.add(strut);
      const strut2 = strut.clone(); strut2.position.z = z + 0.9; g.add(strut2);
    }

    // --- Antenna/spire on tallest buildings, centered on the crown
    if (h > 12 && Math.random() < 0.4) {
      const spireMat = new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.85, roughness: 0.3 });
      const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.1, 2.8, 6), spireMat);
      spire.position.set(topCenterX, topY + 1.4, z);
      g.add(spire);
      // Tip light (red, blinks via animatedNeon)
      const tipLight = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 6, 6),
        new THREE.MeshBasicMaterial({ color: 0xff3030 })
      );
      tipLight.position.set(topCenterX, topY + 2.85, z);
      tipLight.userData.phase = Math.random() * Math.PI * 2;
      g.add(tipLight);
      animatedNeon.push(tipLight);
    }
  }
  return g;
}

// Capsule-based limb: pivot at the joint (shoulder/hip), segment extends down
function makeLimb(material, totalLen, radius, jointMat) {
  const pivot = new THREE.Group();
  const cylLen = Math.max(0.02, totalLen - 2 * radius);
  const seg = new THREE.Mesh(new THREE.CapsuleGeometry(radius, cylLen, 4, 10), material);
  seg.position.y = -totalLen / 2;
  seg.castShadow = true;
  pivot.add(seg);
  // Joint cap at top (shoulder/hip sphere — sits at the pivot)
  if (jointMat) {
    const cap = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.18, 12, 10), jointMat);
    cap.castShadow = true;
    pivot.add(cap);
  }
  return pivot;
}

function makeTrain(lane) {
  const g = new THREE.Group();
  const TRAIN_BODY_H = 2.4;
  const COACH_LEN    = 7.0;
  const COUPLING_LEN = 0.5;
  const NUM_COACHES  = 3 + Math.floor(Math.random() * 3); // 3, 4, or 5 coaches
  const TOTAL_LEN    = NUM_COACHES * COACH_LEN + (NUM_COACHES - 1) * COUPLING_LEN;
  const TRAIN_TOP_Y  = TRAIN_BODY_H + 0.15;
  const HALF_TOTAL   = TOTAL_LEN / 2;

  // Pick a flashy color theme for this train (60% chance of blue, otherwise random)
  const theme = Math.random() < 0.45
    ? TRAIN_THEMES[0]
    : TRAIN_THEMES[Math.floor(Math.random() * TRAIN_THEMES.length)];

  // Shared materials — body has a touch of emissive so the paint reads even in dim areas
  const bodyMat   = new THREE.MeshStandardMaterial({
    color: theme.body, roughness: 0.35, metalness: 0.45,
    emissive: theme.body, emissiveIntensity: 0.12
  });
  const roofMat   = new THREE.MeshStandardMaterial({ color: theme.dark, roughness: 0.5, metalness: 0.4 });
  const stripeMat = new THREE.MeshStandardMaterial({
    color: theme.trim, metalness: 0.55, roughness: 0.3,
    emissive: theme.trim, emissiveIntensity: 0.25
  });
  const neonStripMat = new THREE.MeshBasicMaterial({ color: theme.neon });   // emissive neon (always lit)
  const winLitMat = new THREE.MeshStandardMaterial({
    color: 0xfff0c0, emissive: 0xffcc66, emissiveIntensity: 1.1
  });
  const winCoolMat = new THREE.MeshStandardMaterial({
    color: 0xc8e6ff, emissive: 0x66aaff, emissiveIntensity: 0.95
  });
  const doorMat   = new THREE.MeshStandardMaterial({ color: theme.dark, roughness: 0.4, metalness: 0.35 });
  const doorWinMat = new THREE.MeshStandardMaterial({
    color: 0xbbe0ff, emissive: 0x4488cc, emissiveIntensity: 0.9
  });
  const rivetMat   = new THREE.MeshStandardMaterial({ color: theme.trim, metalness: 0.7, roughness: 0.3,
                                                       emissive: theme.trim, emissiveIntensity: 0.3 });
  const couplerMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
  const tailMat    = new THREE.MeshBasicMaterial({ color: 0xff3030 });

  // Train neon parts — tracked here so they can be removed from animatedNeon when the train despawns
  const trainNeonParts = [];
  function addNeon(m) { animatedNeon.push(m); trainNeonParts.push(m); }

  for (let ci = 0; ci < NUM_COACHES; ci++) {
    // Local z of this coach center: coach 0 is at the front (+z, closest to camera)
    const cz = HALF_TOTAL - COACH_LEN / 2 - ci * (COACH_LEN + COUPLING_LEN);
    const isFront = ci === 0;
    const isBack  = ci === NUM_COACHES - 1;

    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.9, TRAIN_BODY_H, COACH_LEN), bodyMat);
    body.position.set(0, TRAIN_BODY_H / 2, cz);
    body.castShadow = true; g.add(body);

    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.95, 0.2, COACH_LEN + 0.05), roofMat);
    roof.position.set(0, TRAIN_BODY_H + 0.1, cz); g.add(roof);

    // Gold/contrast side stripe
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.91, 0.14, COACH_LEN + 0.01), stripeMat);
    stripe.position.set(0, 1.2, cz); g.add(stripe);

    // NEON underglow strip (low on the side, color-cycling animated)
    for (const sx of [0.97, -0.97]) {
      const ug = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, COACH_LEN), neonStripMat);
      ug.position.set(sx, 0.32, cz);
      ug.userData.phase = Math.random() * Math.PI * 2;
      ug.userData.baseColor = theme.neon;
      g.add(ug);
      addNeon(ug);
    }
    // NEON roof-edge piping (top corners) — emissive, also color-cycles
    for (const sx of [0.97, -0.97]) {
      const rp = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, COACH_LEN + 0.05), neonStripMat);
      rp.position.set(sx, TRAIN_BODY_H + 0.05, cz);
      rp.userData.phase = Math.random() * Math.PI * 2;
      rp.userData.baseColor = theme.neon;
      g.add(rp);
      addNeon(rp);
    }

    // Side windows — alternating warm/cool lit panels for that "lit-up city train" look
    const winZs = [-2.5, -1.4, 1.4, 2.5];
    for (let i = 0; i < winZs.length; i++) {
      const wz = winZs[i];
      const wMat = (i % 2 === 0) ? winLitMat : winCoolMat;
      const w1 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.55, 0.85), wMat);
      w1.position.set(0.97, 1.75, cz + wz); g.add(w1);
      const w2 = w1.clone(); w2.position.x = -0.97; g.add(w2);
    }
    // Sliding door (with small upper window)
    for (const sx of [0.97, -0.97]) {
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.7, 0.95), doorMat);
      door.position.set(sx, 1.0, cz);
      g.add(door);
      const dw = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.4, 0.7), doorWinMat);
      dw.position.set(sx, 1.55, cz);
      g.add(dw);
      // Glowing door frame (thin neon outline)
      const dframe = new THREE.Mesh(new THREE.BoxGeometry(0.07, 1.75, 1.0), neonStripMat);
      dframe.position.set(sx, 1.0, cz);
      dframe.userData.phase = Math.random() * Math.PI * 2;
      dframe.userData.baseColor = theme.neon;
      // Make door frame slightly transparent so the door reads through
      // (BasicMaterial doesn't truly outline; this looks like a glow halo behind the door)
      g.add(dframe);
      addNeon(dframe);
      // Door split line on top
      const split = new THREE.Mesh(new THREE.BoxGeometry(0.075, 1.7, 0.02),
        new THREE.MeshStandardMaterial({ color: 0x000000 }));
      split.position.set(sx, 1.0, cz);
      g.add(split);
    }

    // Animated LED color-cycle bar above each window row on the side
    for (const sx of [0.98, -0.98]) {
      const led = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.06, COACH_LEN - 1.4), neonStripMat);
      led.position.set(sx, 2.12, cz);
      led.userData.phase = Math.random() * Math.PI * 2;
      led.userData.baseColor = theme.neon;
      g.add(led);
      addNeon(led);
    }

    // Coach number plate (with subtle glow)
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.2, 0.4),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.4 })
    );
    plate.position.set(0.97, 2.15, cz - COACH_LEN / 2 + 0.4);
    g.add(plate);

    // Front-only details
    if (isFront) {
      const front = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.65, 0.05), winCoolMat);
      front.position.set(0, 1.85, cz + COACH_LEN / 2 + 0.02);
      g.add(front);
      // Twin headlights (bigger and brighter)
      for (const hx of [-0.55, 0.55]) {
        const hl = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12),
          new THREE.MeshBasicMaterial({ color: 0xfff8d8 }));
        hl.position.set(hx, 0.75, cz + COACH_LEN / 2 + 0.03);
        g.add(hl);
        const halo = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10),
          new THREE.MeshBasicMaterial({ color: 0xfff4c0, transparent: true, opacity: 0.4, depthWrite: false }));
        halo.position.copy(hl.position);
        g.add(halo);
      }
      const hlGlow = new THREE.PointLight(0xfff2c0, 0.8, 9);
      hlGlow.position.set(0, 0.8, cz + COACH_LEN / 2 + 0.3);
      g.add(hlGlow);
      // Underglow point light cast on the floor from the front
      const ugLight = new THREE.PointLight(theme.glow, 0.6, 6);
      ugLight.position.set(0, 0.25, cz + COACH_LEN / 2 - 0.5);
      g.add(ugLight);
      // Driver cab indicator
      const cab = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.1, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x000000 }));
      cab.position.set(0, 1.5, cz + COACH_LEN / 2 - 0.3);
      g.add(cab);
      // Big neon route-number panel above the windshield
      const route = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.3, 0.04),
        new THREE.MeshStandardMaterial({ color: 0x222222, emissive: theme.neon, emissiveIntensity: 1.0 })
      );
      route.position.set(0, 2.3, cz + COACH_LEN / 2 + 0.03);
      g.add(route);
    }

    // Back-only details
    if (isBack) {
      // Wider red tail-light bar
      const tailBar = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 0.16, 0.05),
        new THREE.MeshBasicMaterial({ color: 0xff3030 })
      );
      tailBar.position.set(0, 1.0, cz - COACH_LEN / 2 - 0.02);
      g.add(tailBar);
      for (const tx of [-0.65, 0.65]) {
        const tl = new THREE.Mesh(new THREE.SphereGeometry(0.15, 10, 10), tailMat);
        tl.position.set(tx, 1.0, cz - COACH_LEN / 2 - 0.04);
        g.add(tl);
        const tlHalo = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 10),
          new THREE.MeshBasicMaterial({ color: 0xff3030, transparent: true, opacity: 0.35, depthWrite: false }));
        tlHalo.position.copy(tl.position);
        g.add(tlHalo);
      }
      // Back face
      const back = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.55, 0.05), winCoolMat);
      back.position.set(0, 1.85, cz - COACH_LEN / 2 - 0.02);
      g.add(back);
      // Red point light glow behind train
      const redGlow = new THREE.PointLight(0xff3030, 0.5, 6);
      redGlow.position.set(0, 1.0, cz - COACH_LEN / 2 - 0.5);
      g.add(redGlow);
    }

    // Coupling between this coach and the next one back
    if (!isBack) {
      const cup = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.5, COUPLING_LEN),
        couplerMat
      );
      cup.position.set(0, 0.6, cz - COACH_LEN / 2 - COUPLING_LEN / 2);
      g.add(cup);
      // End plates / bellows on each side of the coupling
      for (const ez of [cz - COACH_LEN / 2 - 0.02, cz - COACH_LEN / 2 - COUPLING_LEN + 0.02]) {
        const ep = new THREE.Mesh(
          new THREE.BoxGeometry(1.7, 1.6, 0.05),
          new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 })
        );
        ep.position.set(0, 1.2, ez);
        g.add(ep);
      }
    }

    // Roof rivets — now color-matched to the trim so they pop
    for (let r = -COACH_LEN / 2 + 0.6; r < COACH_LEN / 2; r += 1.2) {
      for (const rx of [-0.7, 0.7]) {
        const rivet = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), rivetMat);
        rivet.position.set(rx, TRAIN_TOP_Y + 0.05, cz + r);
        g.add(rivet);
      }
    }
  }

  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'train', rideable: true, lane, length: TOTAL_LEN, topY: TRAIN_TOP_Y, coaches: NUM_COACHES, neonParts: trainNeonParts };
}

// Climbable skyscraper — a stepped pyramid of three platforms the player can hop up.
// Returns the tall main tower as the primary obstacle and the two lower steps as `_extras`
// (the spawner places extras at their zOffset relative to the main obstacle).
function makeClimbTower(lane) {
  const themeColor = TRAIN_THEMES[Math.floor(Math.random() * TRAIN_THEMES.length)];
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x1a2236, roughness: 0.45, metalness: 0.5,
    emissive: themeColor.body, emissiveIntensity: 0.08
  });
  const glassFaceMat = new THREE.MeshStandardMaterial({
    color: 0x0a0e16, metalness: 0.85, roughness: 0.22,
    emissive: themeColor.body, emissiveIntensity: 0.35
  });
  const stripMat = new THREE.MeshStandardMaterial({
    color: themeColor.glow, emissive: themeColor.glow, emissiveIntensity: 1.1
  });
  const neonStripMat = new THREE.MeshBasicMaterial({ color: themeColor.neon });
  const trimMat = new THREE.MeshStandardMaterial({
    color: themeColor.trim, metalness: 0.7, roughness: 0.3,
    emissive: themeColor.trim, emissiveIntensity: 0.4
  });

  // Helper that builds a single rectangular tier (visible building + roof + a few details)
  // Returns a group so it can be added to the scene as its own obstacle.
  function makeTier(h, w, d, opts) {
    const g = new THREE.Group();
    // Main body
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
    body.position.y = h / 2;
    body.castShadow = true;
    body.receiveShadow = true;
    g.add(body);
    // Front glass face (the side the player approaches)
    const face = new THREE.Mesh(
      new THREE.BoxGeometry(w * 0.86, h * 0.9, 0.12),
      glassFaceMat
    );
    face.position.set(0, h / 2, d / 2 + 0.05);
    g.add(face);
    // Horizontal glowing window strips along the front
    const stripRows = Math.max(2, Math.floor(h / 1.0));
    for (let r = 0; r < stripRows; r++) {
      const sy = (r + 0.5) * (h / stripRows);
      const strip = new THREE.Mesh(
        new THREE.BoxGeometry(w * 0.82, 0.18, 0.06),
        stripMat
      );
      strip.position.set(0, sy, d / 2 + 0.13);
      g.add(strip);
    }
    // Roof slab + parapet (gives a defined walking surface on top)
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 0.1, 0.16, d + 0.1), trimMat);
    roof.position.y = h + 0.08;
    g.add(roof);
    // Neon roof piping (animated, color-cycles via animatedNeon)
    const pipe = new THREE.Mesh(new THREE.BoxGeometry(w + 0.15, 0.06, d + 0.15), neonStripMat);
    pipe.position.y = h + 0.18;
    pipe.userData.phase = Math.random() * Math.PI * 2;
    pipe.userData.baseColor = themeColor.neon;
    g.add(pipe);
    animatedNeon.push(pipe);
    // Optional spire / antenna on the tallest tier
    if (opts && opts.spire) {
      const spireMat = new THREE.MeshStandardMaterial({
        color: 0x444454, metalness: 0.8, roughness: 0.3
      });
      const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 1.4, 6), spireMat);
      spire.position.y = h + 0.85;
      g.add(spire);
      // Blinking warning light on the spire (red, pulses via animatedNeon)
      const warn = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xff3030 })
      );
      warn.position.y = h + 1.6;
      warn.userData.phase = Math.random() * Math.PI * 2;
      warn.userData.baseColor = 0xff3030;
      g.add(warn);
      animatedNeon.push(warn);
    }
    // Add tier to scene
    scene.add(g);
    return { mesh: g, neonExtras: [pipe] };
  }

  // Build three tiers stacked into a stepped pyramid.
  // Visual depth is intentionally smaller than the collision footprint (`length`)
  // so the first jump onto step 1 has a generous timing window and the auto-climb
  // chains through each tier without the player needing precise jumps.
  const STEP1_H = 1.5, STEP1_VIS_D = 2.6, STEP1_LEN = 4.0;
  const STEP2_H = 2.9, STEP2_VIS_D = 2.6, STEP2_LEN = 4.0;
  const TOWER_H = 5.2, TOWER_VIS_D = 3.6, TOWER_LEN = 5.0;
  // Step 1 (front-most, lowest)
  const step1 = makeTier(STEP1_H, 1.6, STEP1_VIS_D, {});
  step1.mesh.position.x = (lane - 1) * LANE_WIDTH;
  // Step 2 (mid, taller)
  const step2 = makeTier(STEP2_H, 1.75, STEP2_VIS_D, {});
  step2.mesh.position.x = (lane - 1) * LANE_WIDTH;
  // Main skyscraper tower (highest, big roof + spire)
  const tower = makeTier(TOWER_H, 1.9, TOWER_VIS_D, { spire: true });
  tower.mesh.position.x = (lane - 1) * LANE_WIDTH;

  const towerObs = {
    mesh: tower.mesh, type: 'tower', rideable: true, lane,
    topY: TOWER_H, length: TOWER_LEN,
    neonParts: tower.neonExtras
  };
  const step2Obs = {
    mesh: step2.mesh, type: 'tower', rideable: true, lane,
    topY: STEP2_H, length: STEP2_LEN,
    neonParts: step2.neonExtras,
    _dz: 1.8  // in front of the main tower
  };
  const step1Obs = {
    mesh: step1.mesh, type: 'tower', rideable: true, lane,
    topY: STEP1_H, length: STEP1_LEN,
    neonParts: step1.neonExtras,
    _dz: 3.8  // in front of step 2
  };
  // Return main + two extras the spawner will position relative to lastSpawnZ
  return Object.assign(towerObs, { _extras: [step2Obs, step1Obs] });
}

// Remove a train's neon parts from the global animatedNeon array so the loop doesn't keep ticking on despawned trains
function cleanupTrainNeon(o) {
  if (!o || !o.neonParts) return;
  for (const np of o.neonParts) {
    const idx = animatedNeon.indexOf(np);
    if (idx !== -1) animatedNeon.splice(idx, 1);
  }
  o.neonParts.length = 0;
}

// Random station name picker
const STATION_NAMES = ['MAIN ST', 'CITY HALL', 'UNION SQ', 'CENTRAL', 'TIMES SQ', 'PARK AVE', 'BROADWAY', 'GRAND ST'];
function pickStationName() { return STATION_NAMES[Math.floor(Math.random() * STATION_NAMES.length)]; }

function makeStation() {
  const g = new THREE.Group();
  const STATION_LEN = 32;
  const HALF = STATION_LEN / 2;
  const PLAT_INNER_X = 3.4;             // platforms hug the outside of the lanes
  const PLAT_OUTER_X = FLOOR_HALFW;     // out to the wall
  const PLAT_HEIGHT  = 1.0;

  // === Tile floor for the station section ===
  const stFloor = new THREE.Mesh(
    new THREE.PlaneGeometry(FLOOR_HALFW * 2, STATION_LEN),
    new THREE.MeshStandardMaterial({ color: 0xc8c5b4, roughness: 0.55, metalness: 0.05 })
  );
  stFloor.rotation.x = -Math.PI / 2;
  stFloor.position.y = 0.02;
  stFloor.receiveShadow = true;
  g.add(stFloor);

  const platMat = new THREE.MeshStandardMaterial({ color: 0xb0aa9a, roughness: 0.85 });
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x554400 });
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.45 });
  const basMat   = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x6b3a1a, roughness: 0.7 });
  const benchLegMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
  const signBgMat   = new THREE.MeshStandardMaterial({ color: 0x163059, emissive: 0x081830 });
  const letterMat   = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const stationName = pickStationName();

  for (const side of [-1, 1]) {
    const platCx = side * (PLAT_INNER_X + (PLAT_OUTER_X - PLAT_INNER_X) / 2);
    const platW  = PLAT_OUTER_X - PLAT_INNER_X;

    // Platform slab
    const plat = new THREE.Mesh(
      new THREE.BoxGeometry(platW, PLAT_HEIGHT, STATION_LEN),
      platMat
    );
    plat.position.set(platCx, PLAT_HEIGHT / 2, 0);
    plat.castShadow = true;
    plat.receiveShadow = true;
    g.add(plat);

    // Yellow safety stripe along the inner edge
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.06, STATION_LEN),
      stripeMat
    );
    stripe.position.set(side * (PLAT_INNER_X + 0.09), PLAT_HEIGHT + 0.03, 0);
    g.add(stripe);

    // Pillars along the platform
    for (let pz = -HALF + 4; pz <= HALF - 4; pz += 8) {
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.32, 4.8, 14),
        pillarMat
      );
      pillar.position.set(platCx, PLAT_HEIGHT + 2.4, pz);
      pillar.castShadow = true;
      g.add(pillar);
      // Cap and base
      const capGeom = new THREE.BoxGeometry(0.85, 0.18, 0.85);
      const cap = new THREE.Mesh(capGeom, basMat);
      cap.position.set(platCx, PLAT_HEIGHT + 4.9, pz);
      g.add(cap);
      const base = new THREE.Mesh(capGeom, basMat);
      base.position.set(platCx, PLAT_HEIGHT + 0.05, pz);
      g.add(base);
    }

    // Bench
    const benchSeat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 0.45), benchMat);
    benchSeat.position.set(platCx, PLAT_HEIGHT + 0.55, 0);
    benchSeat.castShadow = true;
    g.add(benchSeat);
    const benchBack = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 0.08), benchMat);
    benchBack.position.set(platCx + side * 0.18, PLAT_HEIGHT + 0.85, 0);
    g.add(benchBack);
    for (const bx of [-0.55, 0.55]) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.55, 0.45), benchLegMat);
      leg.position.set(platCx + bx, PLAT_HEIGHT + 0.27, 0);
      g.add(leg);
    }

    // Station-name sign on the wall (rectangular blue plaque)
    const sign = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.95, 5), signBgMat);
    sign.position.set(side * (FLOOR_HALFW - 0.06), 4, 0);
    g.add(sign);
    // White border
    const top = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.05, 5), letterMat);
    top.position.set(side * (FLOOR_HALFW - 0.06), 4.45, 0); g.add(top);
    const bot = top.clone(); bot.position.y = 3.55; g.add(bot);
    // Letters approximated as small white blocks (one per character)
    const charW = 0.32;
    const totalW = stationName.length * charW;
    for (let i = 0; i < stationName.length; i++) {
      if (stationName[i] === ' ') continue;
      const ch = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.5, 0.22), letterMat);
      ch.position.set(side * (FLOOR_HALFW - 0.07), 4, -totalW / 2 + i * charW + charW / 2);
      g.add(ch);
    }

    // Backlight glow on the sign
    const signGlow = new THREE.PointLight(0x88aaff, 0.4, 6);
    signGlow.position.set(side * (FLOOR_HALFW - 0.5), 4, 0);
    g.add(signGlow);

    // Trash can on the platform (decorative)
    const tc = new THREE.Mesh(
      new THREE.CylinderGeometry(0.32, 0.36, 0.7, 12),
      new THREE.MeshStandardMaterial({ color: 0x4a5a6a, metalness: 0.5, roughness: 0.6 })
    );
    tc.position.set(platCx, PLAT_HEIGHT + 0.35, side * 8);
    g.add(tc);
  }

  // Brighter, denser ceiling fluorescents inside the station
  for (let pz = -HALF + 2; pz <= HALF - 2; pz += 3.5) {
    const light = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 0.15, 0.7),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    light.position.set(0, 6.35, pz);
    g.add(light);
  }
  // A station-wide ambient point light for that "indoors" feel
  const stationLight = new THREE.PointLight(0xfff5d8, 0.9, 28);
  stationLight.position.set(0, 5.5, 0);
  g.add(stationLight);

  // Hanging "WAY OUT" arrow sign at the entrance
  const arrowSign = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.6, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x16a34a, emissive: 0x062414 })
  );
  arrowSign.position.set(0, 5.6, -HALF + 1);
  g.add(arrowSign);
  // Arrow chains
  const chainMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7 });
  for (const cx of [-0.9, 0.9]) {
    const chain = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.7, 0.06), chainMat);
    chain.position.set(cx, 6.25, -HALF + 1);
    g.add(chain);
  }
  // White text blocks on the green sign
  for (let i = -0.7; i <= 0.7; i += 0.25) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.28, 0.11), letterMat);
    t.position.set(i, 5.6, -HALF + 1.05);
    g.add(t);
  }

  scene.add(g);
  return { mesh: g, length: STATION_LEN };
}

function makeCoin(lane, yOff) {
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(0.28, 0.09, 10, 18),
    new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x665500, metalness: 0.8, roughness: 0.25 })
  );
  m.castShadow = true;
  m.rotation.y = Math.PI / 2;
  m.position.set((lane - 1) * LANE_WIDTH, 1 + yOff, 0);
  scene.add(m);
  return { mesh: m, lane, yOff };
}

// ============== SPAWN ==============
function pickWeighted(items, weights) {
  let total = 0;
  for (const w of weights) total += w;
  let pick = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    pick -= weights[i];
    if (pick <= 0) return items[i];
  }
  return items[items.length - 1];
}
function preSpawn(rows) {
  for (let i = 0; i < rows; i++) spawnRow();
}
function spawnRow() {
  const r = Math.random();
  let extraGap = 0;  // extra spacing for long trains
  if (r < 0.55) {
    const factories = [makeBarrier, makeHighBar, makeCan, makeCrate, makeSign, makeTrain, makeClimbTower];
    const weights   = [3,           3,           3,        3,          3,        2,         4];
    const lane = Math.floor(Math.random() * 3);
    const factory = pickWeighted(factories, weights);
    const obs = factory(lane);
    obs.mesh.position.z = lastSpawnZ;
    obstacles.push(obs);
    if (obs._extras) {
      for (const ex of obs._extras) {
        ex.mesh.position.z = lastSpawnZ + (ex._dz || 0);
        obstacles.push(ex);
      }
      // Reserve extra spacing past the tower footprint (steps extend in front + tower depth behind)
      extraGap = Math.max(extraGap, (obs.length || 0) + 6);
      delete obs._extras;
    }
    if (factory === makeTrain) extraGap = Math.max(extraGap, obs.length || 0);
    // Don't double-up climb towers — they're large structures that need their own space
    if (factory !== makeClimbTower && Math.random() < 0.4) {
      const otherLane = (lane + 1 + Math.floor(Math.random() * 2)) % 3;
      const factory2 = pickWeighted(factories, weights.map((w, i) => factories[i] === makeClimbTower ? 0 : w));
      const obs2 = factory2(otherLane);
      obs2.mesh.position.z = lastSpawnZ;
      obstacles.push(obs2);
      if (factory2 === makeTrain) extraGap = Math.max(extraGap, obs2.length || 0);
    }
  } else if (r < 0.85) {
    const lane = Math.floor(Math.random() * 3);
    const arc = Math.random() < 0.4;
    for (let i = 0; i < 7; i++) {
      const c = makeCoin(lane, arc ? Math.sin((i / 6) * Math.PI) * 1.4 : 0);
      c.mesh.position.z = lastSpawnZ - i * 0.9;
      coins.push(c);
    }
  }
  // Advance the spawn cursor; for a train, push past the back of the train + a normal gap
  lastSpawnZ -= 7 + Math.random() * 5 + extraGap;
}

// ============== INPUT ==============
function tryJump() {
  if (player.state === 'run') {
    player.state = 'jump';
    player.vy = PLAYER_JUMP_V;
  }
}
function trySlide() {
  if (player.state === 'run' || player.state === 'jump') {
    player.state = 'slide';
    player.slideTimer = 0.7;
    player.yOff = 0; player.vy = 0;
  }
}
// Hold-to-steer for free-roam: left/right keys set held flags, the update loop moves targetX
function trySwitch(dir) {
  // Soft lane-shift used by touch swipes; nudges target X by one lane width
  player.targetX = Math.max(-FREE_X_LIMIT, Math.min(FREE_X_LIMIT, player.targetX + dir * LANE_WIDTH));
}

window.addEventListener('keydown', e => {
  if (gameOver) {
    if (e.code === 'Space' || e.code === 'Enter') restart();
    return;
  }
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA':  keysHeld.left = true; break;
    case 'ArrowRight': case 'KeyD': keysHeld.right = true; break;
    case 'ArrowUp': case 'KeyW': case 'Space': tryJump(); break;
    case 'ArrowDown': case 'KeyS': case 'ShiftLeft': trySlide(); break;
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA':  keysHeld.left = false; break;
    case 'ArrowRight': case 'KeyD': keysHeld.right = false; break;
  }
});

let touchStart = null;
window.addEventListener('touchstart', e => {
  if (gameOver) { restart(); return; }
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
window.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 28) { tryJump(); return; }
  if (ax > ay) {
    if (dx < 0) trySwitch(-1); else trySwitch(1);
  } else {
    if (dy < 0) tryJump(); else trySlide();
  }
}, { passive: true });

// ============== GAME LOOP ==============
function restart() {
  for (const o of obstacles) { if (o.neonParts) cleanupTrainNeon(o); scene.remove(o.mesh); }
  for (const c of coins) scene.remove(c.mesh);
  for (const s of sparks) scene.remove(s.mesh);
  for (const s of stations) scene.remove(s.mesh);
  obstacles.length = 0; coins.length = 0; sparks.length = 0; stations.length = 0;
  lastStationZ = -90;
  player.lane = 1; player.displayX = 0; player.targetX = 0;
  keysHeld.left = false; keysHeld.right = false;
  player.yOff = 0; player.vy = 0;
  player.state = 'run'; player.slideTimer = 0;
  player.invuln = 0;
  player.platformY = 0; player.onTrain = null;
  player.tumbling = 0; player.tumbleDir = 1;
  playerGroup.rotation.x = 0; playerGroup.rotation.z = 0;
  speed = 14;
  distance = 0;
  score = 0;
  coinCount = 0;
  gameOver = false;
  lastSpawnZ = -10;
  preSpawn(20);
  copZ = 6.5;
  cop.group.position.x = 0;
  flashEl.style.background = 'rgba(255,0,0,0)';
  dangerEl.classList.remove('on');
  document.getElementById('gameover').classList.remove('show');
  lastTime = performance.now();
}

function spawnSparks(x, y, z) {
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 1 })
    );
    m.position.set(x, y, z);
    scene.add(m);
    sparks.push({
      mesh: m,
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 5,
        Math.random() * 5 + 1.5,
        (Math.random() - 0.5) * 5
      ),
      life: 0.6,
      maxLife: 0.6,
    });
  }
}

function stumble(severity) {
  if (player.invuln > 0) return;
  player.invuln = 0.9;
  copZ -= severity;
  // BOUNCE: launch the player off the obstacle and tumble in mid-air before landing
  player.state = 'jump';
  player.vy = 11;                                  // upward bounce
  player.tumbling = 0.55;                          // tumble for a beat
  player.tumbleDir = Math.random() < 0.5 ? 1 : -1;
  // If they were riding a train, knock them off
  if (player.onTrain) {
    player.onTrain = null;
    player.yOff = player.platformY + player.yOff;
    player.platformY = 0;
  }
  // Brief red flash
  flashEl.style.transition = 'background 0s';
  flashEl.style.background = 'rgba(255,0,0,0.45)';
  setTimeout(() => {
    flashEl.style.transition = 'background 0.4s ease-out';
    flashEl.style.background = 'rgba(255,0,0,0)';
  }, 50);
  // Spark burst at player + dust on impact
  spawnSparks(player.displayX, 1.5, 0);
}

function caught() {
  if (gameOver) return;
  gameOver = true;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('subway3d-best', String(score));
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalCoins').textContent = coinCount;
  document.getElementById('finalBest').textContent = bestScore;
  bestEl.textContent = bestScore;
  document.getElementById('gameover').classList.add('show');
  dangerEl.classList.remove('on');
  // Big spark burst
  spawnSparks(player.displayX, 1.5, 0);
  spawnSparks(player.displayX, 1.5, 0);
}

const tmpVec3 = new THREE.Vector3();

function update(dt) {
  if (gameOver) {
    // Still update sparks during game over for visual finish
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= dt;
      s.mesh.position.add(s.vel.clone().multiplyScalar(dt));
      s.vel.y -= 18 * dt;
      s.mesh.material.opacity = Math.max(0, s.life / s.maxLife);
      if (s.life <= 0) { scene.remove(s.mesh); sparks.splice(i, 1); }
    }
    return;
  }

  speed = 14 + Math.min(22, distance * 0.10);
  distance += speed * dt;
  score = Math.floor(distance * 5);

  // Free-roam steering: hold-to-move + smooth follow on displayX
  if (keysHeld.left)  player.targetX -= STEER_SPEED * dt;
  if (keysHeld.right) player.targetX += STEER_SPEED * dt;
  player.targetX = Math.max(-FREE_X_LIMIT, Math.min(FREE_X_LIMIT, player.targetX));
  player.displayX += (player.targetX - player.displayX) * Math.min(1, dt * 12);
  playerGroup.position.x = player.displayX;
  // Derived lane index for any legacy reads (collision now uses X-distance directly)
  player.lane = Math.max(0, Math.min(LANE_COUNT - 1,
    Math.round(player.displayX / LANE_WIDTH) + 1));
  // Tilt sideways while steering
  if (player.tumbling <= 0) {
    const steerTilt = (player.targetX - player.displayX) * 0.35;
    playerGroup.rotation.z = steerTilt;
  }

  // Jump (gravity applies relative to platformY-anchored ground)
  if (player.state === 'jump') {
    player.yOff += player.vy * dt;
    player.vy -= PLAYER_GRAVITY * dt;
    if (player.yOff <= 0) {
      player.yOff = 0; player.vy = 0;
      player.state = 'run';
    }
  }
  if (player.state === 'slide') {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) player.state = 'run';
  }
  playerGroup.position.y = player.platformY + player.yOff;

  // Crouch and tilt forward when sliding
  const targetScaleY = player.state === 'slide' ? 0.42 : 1;
  playerGroup.scale.y += (targetScaleY - playerGroup.scale.y) * Math.min(1, dt * 16);
  if (player.tumbling > 0) {
    // Bounce-and-tumble — keep spinning until it elapses
    player.tumbling -= dt;
    playerGroup.rotation.x += dt * 14 * player.tumbleDir;
    playerGroup.rotation.z += dt * 6  * player.tumbleDir;
    if (player.tumbling <= 0) {
      player.tumbling = 0;
      // Snap back to upright
      playerGroup.rotation.x = 0;
      playerGroup.rotation.z = 0;
    }
  } else {
    const targetTilt = player.state === 'slide' ? -0.55 : 0;
    playerGroup.rotation.x += (targetTilt - playerGroup.rotation.x) * Math.min(1, dt * 16);
  }

  // Limb animation
  const tt = performance.now() * 0.014;
  if (player.state === 'run') {
    const sw = Math.sin(tt) * 0.8;
    legL.rotation.x =  sw;
    legR.rotation.x = -sw;
    armL.rotation.x = -sw * 0.9;
    armR.rotation.x =  sw * 0.9;
  } else if (player.state === 'jump') {
    legL.rotation.x = -0.4;
    legR.rotation.x = -0.7;
    armL.rotation.x = -0.6;
    armR.rotation.x = -0.6;
  } else { // slide — limbs aligned
    legL.rotation.x = 0.1;
    legR.rotation.x = 0.1;
    armL.rotation.x = -0.3;
    armR.rotation.x = -0.3;
  }

  // Camera bob — also rises when player is on a train roof
  const bob = (player.state === 'run') ? Math.sin(tt * 2) * 0.04 : 0;
  camera.position.y = 4.2 + bob + (player.platformY + player.yOff) * 0.18;

  // ===== COP CHASER =====
  // Cop closes the gap during stumble, falls back when player runs clean
  if (player.invuln > 0) {
    player.invuln -= dt;
    copZ -= 0.4 * dt; // slight extra approach during the stumble
  } else {
    copZ = Math.min(COP_MAX, copZ + COP_RECOVER * dt);
  }
  // Cop position
  cop.group.position.z = copZ;
  cop.group.position.x += (player.displayX - cop.group.position.x) * Math.min(1, dt * 8);
  // Cop run animation (faster cadence than player so it looks intense)
  const ct = performance.now() * 0.018;
  const csw = Math.sin(ct) * 0.95;
  cop.legL.rotation.x =  csw;
  cop.legR.rotation.x = -csw;
  cop.armL.rotation.x = -csw * 0.95;
  cop.armR.rotation.x =  csw * 0.95;
  // Slight forward lean for intensity
  cop.group.rotation.x = -0.12 + Math.sin(ct * 2) * 0.02;

  // Danger UI when cop is close
  if (copZ < 3.0) {
    const danger = (3.0 - copZ) / 3.0;
    flashEl.style.transition = 'background 0.25s ease-out';
    flashEl.style.background = `rgba(255,30,30,${danger * 0.30})`;
    if (copZ < 2.4) dangerEl.classList.add('on');
    else            dangerEl.classList.remove('on');
  } else {
    flashEl.style.background = 'rgba(255,30,30,0)';
    dangerEl.classList.remove('on');
  }
  // Caught!
  if (copZ <= COP_DANGER) {
    caught();
  }

  // ===== FLASHY VISUAL ANIMATIONS =====
  const tNow = performance.now();
  const tSec = tNow * 0.001;

  // Sweeping searchlights — orbit around their hub
  for (const sl of searchLights) {
    const a = Math.sin(tNow * sl.userData.freq + sl.userData.phase) * 0.6;
    sl.rotation.x = Math.PI + Math.sin(tSec * 0.5 + sl.userData.phase) * 0.15;
    sl.rotation.z = a;
    sl.rotation.y = Math.cos(tNow * sl.userData.freq * 0.7 + sl.userData.phase) * 0.5;
    sl.material.opacity = 0.15 + Math.abs(Math.sin(tSec + sl.userData.phase)) * 0.10;
  }

  // Drift drones across the sky + blink nav lights
  for (const d of drones) {
    d.position.x += d.userData.speed * dt;
    d.position.y = d.userData.baseY + Math.sin(tSec * 1.2 + d.userData.bobPhase) * 0.5;
    if (d.position.x > 90) {
      d.position.x = -90;
      d.position.y = 18 + Math.random() * 22;
      d.position.z = -90 - Math.random() * 70;
      d.userData.baseY = d.position.y;
    }
    // Slight yaw so they don't all face the same way
    d.rotation.y = tSec * 0.4 + d.userData.bobPhase;
    if (d.userData.lights) {
      for (const l of d.userData.lights) {
        const blink = 0.5 + 0.5 * Math.sin(tSec * 5 + l.userData.phase);
        l.material.color.setHex(l.userData.baseColor);
        l.material.color.multiplyScalar(0.3 + blink * 0.9);
      }
    }
  }

  // Aircraft warning lights — slow blink
  for (const al of aircraftLights) {
    const b = (Math.sin(tSec * al.userData.freq + al.userData.phase) + 1) * 0.5;
    al.material.color.setRGB(1, 0.15 + b * 0.25, 0.15 + b * 0.15);
  }

  // Embers — rise and recycle when they leave the play area
  {
    const a = emberGeo.attributes.position;
    for (let i = 0; i < EMBER_COUNT; i++) {
      a.array[i * 3]     += emberVel[i * 3]     * dt;
      a.array[i * 3 + 1] += emberVel[i * 3 + 1] * dt;
      a.array[i * 3 + 2] += emberVel[i * 3 + 2] * dt + 8 * dt; // slight forward drift with the world
      if (a.array[i * 3 + 1] > 24 || a.array[i * 3 + 2] > 12) {
        a.array[i * 3]     = (Math.random() - 0.5) * 90;
        a.array[i * 3 + 1] = Math.random() * 4;
        a.array[i * 3 + 2] = -140 - Math.random() * 40;
      }
    }
    a.needsUpdate = true;
  }

  // Scroll wet-pavement sheen + reflection streaks with the floor
  for (const ws of wetSheens) {
    ws.position.z = floors[wetSheens.indexOf(ws)].position.z;
  }
  // Reflection streaks ride the floor too; their pairing matches the floor copies
  for (let i = 0; i < reflectionStreaks.length; i++) {
    const copy = i % 2;
    reflectionStreaks[i].position.z = floors[copy].position.z;
  }
  // Gentle slow drift on haze layers for cinematic feel
  for (let i = 0; i < hazeLayers.length; i++) {
    hazeLayers[i].position.x = Math.sin(tSec * 0.05 + i) * 6;
  }

  // Animated neon trim/edge stripes — pulse intensity in groups
  for (let i = 0; i < animatedNeon.length; i++) {
    const m = animatedNeon[i];
    const pulse = 0.55 + 0.45 * Math.sin(tSec * 2.4 + m.userData.phase);
    m.material.color.setScalar(1);
    // Use color tint by setting material color via HSL cycle
    const hue = ((tSec * 30 + i * 7) % 360) / 360;
    m.material.color.setHSL(hue, 1.0, 0.4 + pulse * 0.25);
  }

  // Color-cycling billboards
  for (let i = 0; i < animatedBillboards.length; i++) {
    const bb = animatedBillboards[i];
    const hue = ((tSec * 40 + i * 25 + bb.userData.phase * 60) % 360) / 360;
    const lum = 0.45 + 0.2 * Math.sin(tSec * 3 + bb.userData.phase);
    bb.material.color.setHSL(hue, 1.0, lum);
    bb.material.emissive.setHSL(hue, 1.0, lum * 0.6);
  }

  // Color-cycling coins (rainbow shimmer)
  for (let i = 0; i < coins.length; i++) {
    const c = coins[i];
    const hue = ((tSec * 60 + i * 17) % 360) / 360;
    c.mesh.material.emissive.setHSL(hue, 1.0, 0.45);
  }

  // Cop danger aura — pulses size and opacity, brightens as he closes
  {
    const closeness = Math.max(0, 1 - copZ / 5);
    const scale = 1 + 0.25 * Math.sin(tSec * 6) + closeness * 0.35;
    copAura.scale.set(scale, scale, scale);
    copAura.material.opacity = 0.18 + closeness * 0.35;
  }

  // Player ghost trail — fade based on speed
  const trailIntensity = Math.min(1, (speed - 14) / 22) * 0.45 + 0.15;
  for (let i = 0; i < playerTrails.length; i++) {
    const t = playerTrails[i];
    t.material.opacity = trailIntensity * (0.6 - i * 0.18) * (0.6 + 0.4 * Math.sin(tSec * 4 + i));
  }

  // Pulsing cyan road centerline
  const cl = 0.55 + 0.45 * Math.sin(tSec * 5);
  centerLineMat.color.setRGB(0.2 * cl, 0.85 * cl, 1.0 * cl);

  // Cycle street-lamp bulb hues every now and then for a disco effect
  for (let i = 0; i < streetLamps.length; i++) {
    const lamp = streetLamps[i];
    const bulb = lamp.children[3]; // bulb mesh added 4th in makeStreetLamp loop
    if (!bulb) continue;
    const hue = ((tSec * 8 + i * 14) % 360) / 360;
    bulb.material.color.setHSL(hue, 0.6, 0.75);
  }

  // Move world toward camera
  const dz = speed * dt;
  lastSpawnZ += dz;  // keep the spawn cursor anchored to the world so new rows keep coming
  for (const o of obstacles) o.mesh.position.z += dz;
  for (const c of coins) {
    c.mesh.position.z += dz;
    c.mesh.rotation.x += dt * 6;
  }
  for (const f of floors) {
    f.position.z += dz;
    if (f.position.z > FLOOR_LEN / 2 + 5) f.position.z -= FLOOR_LEN * 2;
  }
  for (const b of buildings) {
    b.position.z += dz;
    if (b.position.z > FLOOR_LEN / 2 + 5) b.position.z -= FLOOR_LEN * 2;
  }
  for (const c of curbs) {
    c.position.z += dz;
    if (c.position.z > FLOOR_LEN / 2 + 5) c.position.z -= FLOOR_LEN * 2;
  }
  for (const cl of centerLines) {
    cl.position.z += dz;
    if (cl.position.z > FLOOR_LEN / 2 + 5) cl.position.z -= FLOOR_LEN * 2;
  }
  for (const r of rails) {
    r.position.z += dz;
    if (r.position.z > FLOOR_LEN / 2 + 5) r.position.z -= FLOOR_LEN * 2;
  }
  for (const l of streetLamps) {
    l.position.z += dz;
    // Each pair takes 2 lamps so wrap distance accounts for that
    if (l.position.z > 8) l.position.z -= LIGHT_COUNT * LIGHT_GAP;
  }
  // Scroll instanced ties
  for (let i = 0; i < TIE_COUNT; i++) {
    tiePositions[i] += dz;
    if (tiePositions[i] > 8) tiePositions[i] -= TIE_COUNT * TIE_GAP;
    tmpMat.makeTranslation(0, 0.06, tiePositions[i]);
    tieInstanced.setMatrixAt(i, tmpMat);
  }
  tieInstanced.instanceMatrix.needsUpdate = true;

  // Spawn ahead — keep a deep buffer that scales with current speed (always at least ~5 sec ahead)
  const spawnBuffer = -Math.max(120, speed * 6);
  while (lastSpawnZ > spawnBuffer) spawnRow();
  // Safety net: if the spawn cursor somehow drifts past the player, snap it forward
  if (lastSpawnZ > -20) {
    lastSpawnZ = -40;
    spawnRow();
  }

  // Stations — scroll, despawn, and spawn periodically
  lastStationZ += dz;
  for (let i = stations.length - 1; i >= 0; i--) {
    const s = stations[i];
    s.mesh.position.z += dz;
    if (s.mesh.position.z > s.length / 2 + 8) {
      scene.remove(s.mesh);
      stations.splice(i, 1);
    }
  }
  while (lastStationZ > -180) {
    const st = makeStation();
    st.mesh.position.z = lastStationZ;
    stations.push(st);
    lastStationZ -= 180 + Math.random() * 120;
  }

  // ===== ON-PLATFORM DETECTION (trains AND climbable towers) =====
  // First, figure out if the player is currently above (and on) any rideable structure.
  // Prefer the HIGHEST eligible platform so step→step→roof climbing works.
  //
  // Climbing the skyscrapers requires NO jumping:
  //  1) Short first step (≤ 1.7m) auto-mounts when the player runs into its footprint.
  //  2) Once on a tower step, auto-climb snaps the player up to any reachable
  //     higher tower step within CLIMB_REACH meters.
  let nowOnTrain = null;
  const pY_now = player.platformY + player.yOff;
  const onTowerNow = player.onTrain && player.onTrain.type === 'tower';
  const CLIMB_REACH = 2.7;
  const STEP_AUTOMOUNT_H = 1.7;
  for (const o of obstacles) {
    if (!o.rideable) continue;
    // X-overlap check (free roam: player can be between lanes)
    if (Math.abs(o.mesh.position.x - player.displayX) > COLLISION_HALF_W) continue;
    const oz = o.mesh.position.z;
    const halfLen = (o.length || 7) / 2;
    if (oz < -halfLen || oz > halfLen) continue;
    let canMount = pY_now >= o.topY - 0.2;
    // Auto-mount the first low tower step from ground (no jump needed) so climbing
    // a skyscraper is just "be in the right lane".
    if (!canMount
        && o.type === 'tower'
        && !player.onTrain
        && o.topY <= STEP_AUTOMOUNT_H
        && player.state !== 'slide') {
      canMount = true;
    }
    // Auto-climb assist: once on a tower, chain up to the next tier.
    if (!canMount
        && onTowerNow
        && o.type === 'tower'
        && o.topY > player.platformY
        && (o.topY - player.platformY) <= CLIMB_REACH) {
      canMount = true;
    }
    if (canMount) {
      if (!nowOnTrain || o.topY > nowOnTrain.topY) nowOnTrain = o;
    }
  }
  if (nowOnTrain) {
    if (player.onTrain !== nowOnTrain) {
      // Just landed (or stepped onto a different train)
      player.platformY = nowOnTrain.topY;
      player.yOff = 0;
      player.vy = 0;
      player.state = 'run';
      nowOnTrain.passed = true; // don't double-trigger as a hit
    }
    player.onTrain = nowOnTrain;
  } else if (player.onTrain) {
    // Fell off the train (lane change, end of train, or slide-dismount)
    player.onTrain = null;
    player.yOff = player.platformY + player.yOff;
    player.platformY = 0;
    player.state = 'jump';
    player.vy = 0;  // start falling from current height
  }

  // ===== OBSTACLE COLLISIONS =====
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    const oz = o.mesh.position.z;
    if (oz > 5) {
      if (o.neonParts) cleanupTrainNeon(o);
      scene.remove(o.mesh);
      obstacles.splice(i, 1);
      continue;
    }
    if (oz > -1.2 && oz < 1.6 && Math.abs(o.mesh.position.x - player.displayX) < COLLISION_HALF_W && !o.passed) {
      // While riding a train, the player is elevated above ground obstacles
      if (player.onTrain) continue;
      const pY = player.platformY + player.yOff;
      let hit = true;
      const jumpClears = player.state === 'jump' && pY > 0.55;
      if (o.type === 'barrier'  && jumpClears) hit = false;
      if (o.type === 'can'      && jumpClears) hit = false;
      if (o.type === 'crate'    && player.state === 'jump' && pY > 0.95) hit = false;
      if (o.type === 'high-bar' && player.state === 'slide') hit = false;
      if (o.type === 'sign'     && player.state === 'slide') hit = false;
      // Trains/towers: a high-enough jump clears them (and the on-platform check above snaps us onto the roof)
      if (o.rideable && pY >= o.topY - 0.2) hit = false;
      if (hit) {
        o.passed = true;
        stumble(o.rideable ? COP_PUSH_TRAIN : COP_PUSH_HIT);
      }
    }
  }

  // Coin pickup
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    if (c.mesh.position.z > 5) {
      scene.remove(c.mesh);
      coins.splice(i, 1);
      continue;
    }
    if (c.mesh.position.z > -1 && c.mesh.position.z < 1.5 && Math.abs(c.mesh.position.x - player.displayX) < 1.0) {
      const pY = player.platformY + player.yOff;
      const playerYTop = pY + (player.state === 'slide' ? 0.5 : 1.8);
      const playerYBot = pY;
      const coinY = 1 + c.yOff;
      if (coinY >= playerYBot - 0.3 && coinY <= playerYTop + 0.3) {
        scene.remove(c.mesh);
        coins.splice(i, 1);
        coinCount++;
        score += 10;
        spawnSparks(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z);
      }
    }
  }

  // Sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.life -= dt;
    s.mesh.position.add(s.vel.clone().multiplyScalar(dt));
    s.vel.y -= 18 * dt;
    s.mesh.material.opacity = Math.max(0, s.life / s.maxLife);
    if (s.life <= 0) { scene.remove(s.mesh); sparks.splice(i, 1); }
  }

  scoreEl.textContent = score;
  coinsEl.textContent = coinCount;
}

function frame(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

// Pre-spawn so the world is already populated when the game starts
preSpawn(20);

requestAnimationFrame(frame);
}
</script>
</body>
