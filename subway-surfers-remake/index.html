<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subway Surfers Remake</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none; user-select: none;
    text-shadow: 2px 2px 0 #000, 0 0 12px rgba(0,0,0,0.8);
  }
  #score { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
  #coins { font-size: 20px; color: #ffd34d; margin-top: 2px; }
  #best  { position: fixed; top: 14px; right: 14px; font-size: 14px; color: #fcd34d; text-shadow: 2px 2px 0 #000; }
  #hint  { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
           font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.65);
           text-transform: uppercase; pointer-events: none; user-select: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="score">0</div>
  <div id="coins">🪙 <span id="coinCount">0</span></div>
</div>
<div id="best">Best: <span id="bestScore">0</span></div>
<div id="hint">← → / A D : switch lane &nbsp;·&nbsp; ↑ / W / SPACE : jump &nbsp;·&nbsp; ↓ / S : slide</div>

<script>
const cv  = document.getElementById('game');
const ctx = cv.getContext('2d');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coinCount');
const bestEl  = document.getElementById('bestScore');

let W, H;
function resize() {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  W = cv.width; H = cv.height;
}
window.addEventListener('resize', resize);
resize();

// ============== STATE ==============
const LANE_COUNT = 3;
const PLAYER_Z = 1.0;
const SPAWN_AHEAD = 1.7;

let player, obstacles, coins, particles, dust;
let speed, distance, score, coinCount, gameOver, lastTime, lastSpawnDist;
let bestScore = parseInt(localStorage.getItem('subway-best') || '0', 10);
bestEl.textContent = bestScore;

function reset() {
  player = {
    lane: 1,
    displayLane: 1,
    yOff: 0, vy: 0,
    state: 'run',
    slideTimer: 0,
    invuln: 0,
  };
  obstacles = [];
  coins = [];
  particles = [];
  dust = [];
  speed = 1.4;
  distance = 0;
  score = 0;
  coinCount = 0;
  gameOver = false;
  lastTime = performance.now();
  lastSpawnDist = 1.5;
}

// ============== PROJECTION ==============
function vpY()   { return H * 0.30; }
function baseY() { return H * 0.96; }
function baseHalf() { return Math.min(W * 0.42, 700); }

function project(lane, z) {
  const vy  = vpY(), by = baseY();
  const t = Math.max(0, Math.min(1.05, z));
  const persT = Math.pow(t, 0.85);
  const y = vy + (by - vy) * persT;
  const halfW = 4 + (baseHalf() - 4) * persT;
  const x = W / 2 + (lane - 1) * (halfW * 2 / 3);
  const scale = 0.05 + persT;
  return { x, y, scale };
}

// ============== INPUT ==============
function tryJump() {
  if (player.state === 'run') {
    player.state = 'jump';
    player.vy = -780;
  }
}
function trySlide() {
  if (player.state === 'run' || player.state === 'jump') {
    player.state = 'slide';
    player.slideTimer = 0.65;
    player.yOff = 0; player.vy = 0;
  }
}
function trySwitch(dir) {
  const newLane = player.lane + dir;
  if (newLane >= 0 && newLane < LANE_COUNT) {
    player.lane = newLane;
  }
}

window.addEventListener('keydown', e => {
  if (gameOver) {
    if (e.code === 'Space' || e.code === 'Enter') reset();
    return;
  }
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA':  trySwitch(-1); break;
    case 'ArrowRight': case 'KeyD': trySwitch(1);  break;
    case 'ArrowUp': case 'KeyW': case 'Space': tryJump(); break;
    case 'ArrowDown': case 'KeyS': case 'ShiftLeft': trySlide(); break;
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault();
});

// Touch swipe gesture
let touchStart = null;
window.addEventListener('touchstart', e => {
  if (gameOver) { reset(); return; }
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
window.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 28) { tryJump(); return; }
  if (ax > ay) {
    if (dx < 0) trySwitch(-1); else trySwitch(1);
  } else {
    if (dy < 0) tryJump(); else trySlide();
  }
}, { passive: true });

// ============== SPAWN ==============
function spawnRow() {
  const r = Math.random();
  if (r < 0.45) {
    // Single obstacle, leaving 2 lanes safe
    const lane = Math.floor(Math.random() * 3);
    const types = ['barrier', 'high-bar', 'train'];
    const type = types[Math.floor(Math.random() * types.length)];
    obstacles.push({ lane, dist: lastSpawnDist, type });
    if (Math.random() < 0.3) {
      // A second obstacle in another lane
      const otherLane = (lane + 1 + Math.floor(Math.random() * 2)) % 3;
      const otherType = types[Math.floor(Math.random() * types.length)];
      obstacles.push({ lane: otherLane, dist: lastSpawnDist, type: otherType });
    }
  } else if (r < 0.85) {
    // Coin row
    const lane = Math.floor(Math.random() * 3);
    const arc = Math.random() < 0.4;
    for (let i = 0; i < 6; i++) {
      coins.push({
        lane,
        dist: lastSpawnDist + i * 0.06,
        yOff: arc ? -Math.sin((i / 5) * Math.PI) * 90 : 0,
        taken: false,
      });
    }
  }
  // else: empty row
  lastSpawnDist += 0.55 + Math.random() * 0.4;
}

function spawn() {
  while (lastSpawnDist < distance + SPAWN_AHEAD) spawnRow();
}

// ============== PARTICLES ==============
function spawnPickupBurst(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 5 - 2,
      g: 0.35,
      life: 28,
      color: `hsl(${40 + Math.random() * 30}, 95%, 60%)`,
      size: 3,
    });
  }
}
function spawnCrashBurst(x, y) {
  for (let i = 0; i < 30; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 12,
      vy: -Math.random() * 10 - 2,
      g: 0.45,
      life: 60,
      color: `hsl(${Math.random() * 60}, 90%, ${50 + Math.random() * 20}%)`,
      size: 3 + Math.random() * 3,
    });
  }
}

// ============== UPDATE ==============
function update(dt) {
  if (gameOver) return;

  speed = 1.4 + Math.min(2.6, distance * 0.018);
  distance += speed * dt;
  score = Math.floor(distance * 100);

  // Smooth display lane
  player.displayLane += (player.lane - player.displayLane) * Math.min(1, dt * 14);

  // Jump
  if (player.state === 'jump') {
    player.yOff += player.vy * dt;
    player.vy   += 1800 * dt;
    if (player.yOff >= 0) {
      player.yOff = 0; player.vy = 0;
      player.state = 'run';
    }
  }
  // Slide
  if (player.state === 'slide') {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) player.state = 'run';
  }
  if (player.invuln > 0) player.invuln -= dt;

  spawn();

  // Move and check obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.z = 1 - (o.dist - distance);
    if (o.z >= 1.15) { obstacles.splice(i, 1); continue; }
    if (player.invuln <= 0 && o.z >= 0.93 && o.z <= 1.02 && o.lane === player.lane && !o.passed) {
      const safe = isObstacleSafe(o);
      o.passed = true;
      if (!safe) {
        crash(o);
      }
    }
  }
  // Coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.z = 1 - (c.dist - distance);
    if (c.z >= 1.10) { coins.splice(i, 1); continue; }
    if (!c.taken && c.z >= 0.93 && c.z <= 1.02 && c.lane === player.lane) {
      // Match player's vertical position to coin (jump-arc coins reachable when jumping)
      const playerYLevel = player.yOff;
      const dyCheck = Math.abs(playerYLevel - c.yOff);
      if (dyCheck < 60) {
        c.taken = true;
        coinCount++;
        score += 10;
        const p = project(c.lane, c.z);
        spawnPickupBurst(p.x, p.y + c.yOff);
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // Dust trail
  if (player.state === 'run' && Math.random() < 0.5) {
    const pp = project(player.displayLane, PLAYER_Z);
    dust.push({
      x: pp.x + (Math.random() - 0.5) * 30,
      y: pp.y + 10,
      life: 18,
      size: 5,
    });
  }
  for (let i = dust.length - 1; i >= 0; i--) {
    dust[i].life--; dust[i].size += 0.7;
    if (dust[i].life <= 0) dust.splice(i, 1);
  }

  scoreEl.textContent = score;
  coinsEl.textContent = coinCount;
}

function isObstacleSafe(o) {
  if (o.type === 'barrier')   return player.state === 'jump';
  if (o.type === 'high-bar')  return player.state === 'slide';
  if (o.type === 'train')     return false;
  return false;
}

function crash(o) {
  gameOver = true;
  const p = project(o.lane, 1);
  spawnCrashBurst(p.x, p.y - 60);
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('subway-best', String(score));
    bestEl.textContent = bestScore;
  }
}

// ============== DRAWING ==============
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, vpY());
  g.addColorStop(0,   '#0c1832');
  g.addColorStop(0.6, '#1d3a6e');
  g.addColorStop(1,   '#3d6eaf');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, vpY());

  // Stars
  for (let i = 0; i < 70; i++) {
    const sx = (i * 173) % W;
    const sy = (i * 71)  % (vpY() - 30);
    const tw = (Math.sin(performance.now() * 0.002 + i) + 1) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.4 + tw * 0.6})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Distant skyline
  ctx.fillStyle = '#0c1830';
  for (let i = 0; i < 14; i++) {
    const bx = (i / 14) * W;
    const bw = W / 14 * 0.92;
    const bh = 30 + ((Math.sin(i * 1.7) + 1) * 35);
    ctx.fillRect(bx, vpY() - bh, bw, bh);
  }
  // Lit windows
  ctx.fillStyle = 'rgba(255,220,140,0.85)';
  for (let i = 0; i < 14; i++) {
    const bx = (i / 14) * W;
    const bw = W / 14 * 0.92;
    const bh = 30 + ((Math.sin(i * 1.7) + 1) * 35);
    for (let wi = 1; wi < bw / 6; wi++) {
      for (let hi = 1; hi < bh / 8; hi++) {
        if (Math.sin(i * 5 + wi * 7 + hi * 11) > 0.45) {
          ctx.fillRect(bx + wi * 5, vpY() - bh + hi * 6, 2, 3);
        }
      }
    }
  }
}

function drawGround() {
  const g = ctx.createLinearGradient(0, vpY(), 0, H);
  g.addColorStop(0, '#3a3a4a');
  g.addColorStop(1, '#16161f');
  ctx.fillStyle = g; ctx.fillRect(0, vpY(), W, H - vpY());
}

function drawTracks() {
  // 4 rails (boundaries of 3 lanes)
  ctx.strokeStyle = '#aab';
  ctx.lineWidth = 2;
  for (let l = 0; l <= LANE_COUNT; l++) {
    const offset = (l - LANE_COUNT / 2) * (2 / 3);
    const baseX = W / 2 + offset * baseHalf();
    const vpXX  = W / 2 + offset * 4;
    ctx.beginPath();
    ctx.moveTo(vpXX, vpY());
    ctx.lineTo(baseX, baseY());
    ctx.stroke();
  }
  // Outer boundary (subway tunnel walls hint)
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  for (const sgn of [-1, 1]) {
    const baseX = W / 2 + sgn * baseHalf() * 1.15;
    const vpXX  = W / 2 + sgn * 6;
    ctx.beginPath();
    ctx.moveTo(vpXX, vpY());
    ctx.lineTo(baseX, baseY());
    ctx.stroke();
  }

  // Animated wood ties scrolling toward camera
  ctx.fillStyle = '#3a2010';
  const tieCount = 28;
  const tieFrac = (distance * 1.6) % 1;
  for (let i = 0; i < tieCount; i++) {
    const z = (i / tieCount) + tieFrac / tieCount;
    if (z >= 0.02 && z <= 1.05) {
      const persT = Math.pow(z, 0.85);
      const y = vpY() + (baseY() - vpY()) * persT;
      const halfW = 4 + (baseHalf() - 4) * persT;
      const tieW = halfW * 2.05;
      const tieH = 3 + persT * 14;
      ctx.fillRect(W / 2 - tieW / 2, y - tieH / 2, tieW, tieH);
    }
  }
  // Center line marker
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let l = 1; l < LANE_COUNT; l++) {
    const offset = (l - LANE_COUNT / 2) * (2 / 3);
    const baseX = W / 2 + offset * baseHalf();
    const vpXX  = W / 2 + offset * 4;
    ctx.beginPath();
    ctx.setLineDash([6, 10]);
    ctx.moveTo(vpXX, vpY());
    ctx.lineTo(baseX, baseY());
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawObstacle(o) {
  if (o.z <= 0) return;
  const p = project(o.lane, o.z);
  ctx.save();
  ctx.translate(p.x, p.y);
  const s = p.scale;

  if (o.type === 'barrier') {
    // Wood barrier (low)
    ctx.fillStyle = '#a85a22';
    ctx.fillRect(-32 * s, -24 * s, 64 * s, 28 * s);
    // Reflective stripes
    ctx.fillStyle = '#ffffff';
    for (let i = -28; i < 30; i += 12) {
      ctx.fillRect(i * s, -24 * s, 4 * s, 28 * s);
    }
    // Legs
    ctx.fillStyle = '#502000';
    ctx.fillRect(-34 * s, -24 * s, 4 * s, 38 * s);
    ctx.fillRect(30 * s,  -24 * s, 4 * s, 38 * s);
    // Top sign band
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-32 * s, -28 * s, 64 * s, 4 * s);
  } else if (o.type === 'high-bar') {
    // High obstacle bar (slide under)
    ctx.fillStyle = '#888';
    ctx.fillRect(-44 * s, -100 * s, 88 * s, 10 * s);
    // Posts
    ctx.fillStyle = '#444';
    ctx.fillRect(-46 * s, -100 * s, 5 * s, 110 * s);
    ctx.fillRect( 41 * s, -100 * s, 5 * s, 110 * s);
    // Yellow caution sign
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(0,           -110 * s);
    ctx.lineTo( 14 * s,     -85 * s);
    ctx.lineTo(-14 * s,     -85 * s);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = `bold ${14 * s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('!', 0, -90 * s);
  } else if (o.type === 'train') {
    // Subway train (full lane block)
    const trainH = 170;
    const trainW = 70;
    // Body
    const bodyGrad = ctx.createLinearGradient(-trainW/2 * s, 0, trainW/2 * s, 0);
    bodyGrad.addColorStop(0, '#7a1a14');
    bodyGrad.addColorStop(0.5, '#dc3322');
    bodyGrad.addColorStop(1, '#7a1a14');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-trainW/2 * s, -trainH * s, trainW * s, trainH * s);
    // Roof
    ctx.fillStyle = '#5a1010';
    ctx.fillRect(-trainW/2 * s - 2, -trainH * s - 4, trainW * s + 4, 8 * s);
    // Front face (slight bevel)
    ctx.fillStyle = '#ffeeaa';
    ctx.beginPath();
    ctx.arc(0, -10 * s, 7 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.4)';
    ctx.beginPath();
    ctx.arc(0, -10 * s, 16 * s, 0, Math.PI * 2);
    ctx.fill();
    // Windows
    ctx.fillStyle = '#aaccee';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-26 * s, (-trainH + 18 + i * 42) * s, 52 * s, 24 * s);
    }
    // Window frame highlights
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2 * s;
    for (let i = 0; i < 3; i++) {
      ctx.strokeRect(-26 * s, (-trainH + 18 + i * 42) * s, 52 * s, 24 * s);
    }
    // Side stripe
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-trainW/2 * s, -90 * s, trainW * s, 4 * s);
  }
  ctx.restore();
}

function drawCoin(c) {
  if (c.z <= 0 || c.taken) return;
  const p = project(c.lane, c.z);
  const cx = p.x;
  const cy = p.y + c.yOff * Math.max(0.2, p.scale);
  const r  = Math.max(2, 13 * p.scale);
  const spin = performance.now() * 0.005 + c.dist * 7;
  const xs = Math.abs(Math.cos(spin));
  // Coin face
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(cx, cy, Math.max(1.5, r * xs), r, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#aa7700';
  ctx.lineWidth = Math.max(0.6, 1.2 * p.scale);
  ctx.stroke();
  // $ sign visible when face is forward
  if (xs > 0.55 && r > 6) {
    ctx.fillStyle = '#aa7700';
    ctx.font = `bold ${r * 1.3}px "Arial Black", Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', cx, cy);
  }
  // Glow
  ctx.fillStyle = `rgba(255,215,0,${0.18 * xs})`;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.6, 0, Math.PI * 2);
  ctx.fill();
}

function drawDust() {
  for (const d of dust) {
    const a = d.life / 18;
    ctx.fillStyle = `rgba(160,140,100,${a * 0.5})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size * 1.4);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const lane = player.displayLane;
  const p = project(lane, PLAYER_Z);
  const x = p.x;
  const yGround = p.y - 6;
  const y = yGround + player.yOff;
  const s = 1.2;

  // Shadow
  const shadowAlpha = Math.max(0.15, 0.5 - Math.abs(player.yOff) / 220);
  ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(x, yGround + 6, 32, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  if (player.state === 'slide') drawJakeSliding(x, y, s);
  else                          drawJakeStanding(x, y, s, player.state === 'jump');
}

function drawJakeStanding(x, y, s, jumping) {
  const t = performance.now();
  const armSwing = jumping ? 1.0 : Math.sin(t * 0.022) * 1.1;
  const legSwing = jumping ? 0.6 : Math.sin(t * 0.022) * 1.1;

  // Legs
  ctx.strokeStyle = '#1e3a8a';
  ctx.lineWidth = 9 * s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 6 * s, y - 38 * s);
  ctx.lineTo(x - 8 * s + legSwing * 14 * s, y);
  ctx.moveTo(x + 6 * s, y - 38 * s);
  ctx.lineTo(x + 8 * s - legSwing * 14 * s, y);
  ctx.stroke();
  // Sneakers
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x - 8 * s + legSwing * 14 * s, y, 10 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 8 * s - legSwing * 14 * s, y, 10 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hoodie body
  const bodyGrad = ctx.createLinearGradient(x - 22 * s, 0, x + 22 * s, 0);
  bodyGrad.addColorStop(0, '#16803a');
  bodyGrad.addColorStop(0.5, '#22c55e');
  bodyGrad.addColorStop(1, '#16803a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(x - 22 * s, y - 76 * s);
  ctx.lineTo(x + 22 * s, y - 76 * s);
  ctx.lineTo(x + 18 * s, y - 38 * s);
  ctx.lineTo(x - 18 * s, y - 38 * s);
  ctx.closePath();
  ctx.fill();
  // Drawstrings
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x - 4 * s, y - 70 * s); ctx.lineTo(x - 4 * s, y - 56 * s);
  ctx.moveTo(x + 4 * s, y - 70 * s); ctx.lineTo(x + 4 * s, y - 56 * s);
  ctx.stroke();
  // Pocket
  ctx.fillStyle = '#0f6e2c';
  ctx.fillRect(x - 14 * s, y - 52 * s, 28 * s, 8 * s);

  // Arms
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 7 * s;
  ctx.beginPath();
  ctx.moveTo(x - 20 * s, y - 70 * s);
  ctx.lineTo(x - 28 * s + armSwing * 12 * s, y - 42 * s + armSwing * 8 * s);
  ctx.moveTo(x + 20 * s, y - 70 * s);
  ctx.lineTo(x + 28 * s - armSwing * 12 * s, y - 42 * s - armSwing * 8 * s);
  ctx.stroke();
  // Hands (skin)
  ctx.fillStyle = '#fdc97a';
  ctx.beginPath(); ctx.arc(x - 28 * s + armSwing * 12 * s, y - 42 * s + armSwing * 8 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 28 * s - armSwing * 12 * s, y - 42 * s - armSwing * 8 * s, 4 * s, 0, Math.PI * 2); ctx.fill();

  // Neck
  ctx.fillStyle = '#fdc97a';
  ctx.fillRect(x - 4 * s, y - 80 * s, 8 * s, 6 * s);

  // Head
  ctx.fillStyle = '#fdc97a';
  ctx.beginPath();
  ctx.arc(x, y - 92 * s, 14 * s, 0, Math.PI * 2);
  ctx.fill();
  // Cheek shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(x + 5 * s, y - 88 * s, 4 * s, 6 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  // Beanie
  ctx.fillStyle = '#facc15';
  ctx.beginPath();
  ctx.arc(x, y - 96 * s, 14 * s, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(x - 14 * s, y - 96 * s, 28 * s, 4 * s);
  // Beanie stripe
  ctx.fillStyle = '#dc2626';
  ctx.fillRect(x - 14 * s, y - 100 * s, 28 * s, 2 * s);
  // Pom-pom
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y - 110 * s, 4 * s, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 5 * s, y - 91 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5 * s, y - 91 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x - 5 * s, y - 91 * s, 1.3 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5 * s, y - 91 * s, 1.3 * s, 0, Math.PI * 2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#3a2010';
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(x, y - 86 * s, 4 * s, 0.2, Math.PI - 0.2); ctx.stroke();
  // Headphones
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x - 14 * s, y - 91 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 14 * s, y - 91 * s, 4 * s, 0, Math.PI * 2); ctx.fill();

  // Backpack strap
  ctx.strokeStyle = '#a52e0e';
  ctx.lineWidth = 4 * s;
  ctx.beginPath();
  ctx.moveTo(x - 18 * s, y - 76 * s);
  ctx.lineTo(x - 14 * s, y - 50 * s);
  ctx.moveTo(x + 18 * s, y - 76 * s);
  ctx.lineTo(x + 14 * s, y - 50 * s);
  ctx.stroke();
}

function drawJakeSliding(x, y, s) {
  // Body laid forward
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.ellipse(x, y - 12 * s, 34 * s, 14 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  // Backpack on back
  ctx.fillStyle = '#a52e0e';
  ctx.fillRect(x - 18 * s, y - 22 * s, 16 * s, 12 * s);
  // Head forward
  ctx.fillStyle = '#fdc97a';
  ctx.beginPath();
  ctx.arc(x + 28 * s, y - 14 * s, 13 * s, 0, Math.PI * 2);
  ctx.fill();
  // Beanie
  ctx.fillStyle = '#facc15';
  ctx.beginPath();
  ctx.arc(x + 28 * s, y - 20 * s, 13 * s, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#dc2626';
  ctx.fillRect(x + 15 * s, y - 22 * s, 26 * s, 2 * s);
  // Eye
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x + 32 * s, y - 14 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  // Outstretched arm
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 7 * s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x + 18 * s, y - 16 * s);
  ctx.lineTo(x + 38 * s, y - 8 * s);
  ctx.stroke();
  ctx.fillStyle = '#fdc97a';
  ctx.beginPath();
  ctx.arc(x + 38 * s, y - 8 * s, 4 * s, 0, Math.PI * 2);
  ctx.fill();
  // Legs trailing back
  ctx.strokeStyle = '#1e3a8a';
  ctx.lineWidth = 8 * s;
  ctx.beginPath();
  ctx.moveTo(x - 26 * s, y - 8 * s);
  ctx.lineTo(x - 40 * s, y - 4 * s);
  ctx.moveTo(x - 26 * s, y - 16 * s);
  ctx.lineTo(x - 40 * s, y - 12 * s);
  ctx.stroke();
  // Shoes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 40 * s, y - 4 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - 40 * s, y - 12 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
}

function drawTunnelLights() {
  // Hanging lights along tunnel sides at fixed z positions, scrolling
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 8; i++) {
    const z = ((i / 8) + ((distance * 0.6) % 1)) % 1;
    const persT = Math.pow(z, 0.85);
    const halfW = 4 + (baseHalf() - 4) * persT;
    const y = vpY() + (baseY() - vpY()) * persT - 80 * persT;
    const lx = W / 2 - halfW * 1.05;
    const rx = W / 2 + halfW * 1.05;
    const r = 2 + persT * 5;
    ctx.fillStyle = `rgba(255,235,170,${0.5 + persT * 0.5})`;
    ctx.beginPath(); ctx.arc(lx, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx, y, r, 0, Math.PI * 2); ctx.fill();
    // Glow
    ctx.fillStyle = `rgba(255,235,170,${0.18 * persT})`;
    ctx.beginPath(); ctx.arc(lx, y, r * 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx, y, r * 3, 0, Math.PI * 2); ctx.fill();
  }
}

function drawHUDExtras() {
  // Speed bar
  const sw = 200, sh = 8;
  const sx = W / 2 - sw / 2, sy = H - 36;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(sx - 2, sy - 2, sw + 4, sh + 4);
  const t = (speed - 1.4) / 2.6;
  const grad = ctx.createLinearGradient(sx, 0, sx + sw, 0);
  grad.addColorStop(0, '#22c55e');
  grad.addColorStop(0.5, '#fcd34d');
  grad.addColorStop(1, '#dc2626');
  ctx.fillStyle = grad;
  ctx.fillRect(sx, sy, sw * t, sh);
}

function drawGameOver() {
  if (!gameOver) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff5050';
  ctx.font = 'bold 90px Impact, "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 6; ctx.strokeStyle = '#000';
  ctx.strokeText('CRASHED!', W / 2, H / 2 - 80);
  ctx.fillText('CRASHED!',  W / 2, H / 2 - 80);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`Score:  ${score}`, W / 2, H / 2);
  ctx.fillText(`Coins:  ${coinCount}`, W / 2, H / 2 + 36);
  ctx.fillStyle = '#fcd34d';
  ctx.fillText(`Best:   ${bestScore}`, W / 2, H / 2 + 72);
  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  ctx.fillText('Press SPACE / ENTER (or tap) to restart', W / 2, H / 2 + 124);
}

// ============== MAIN LOOP ==============
function frame(t) {
  const dt = lastTime ? Math.min(0.05, (t - lastTime) / 1000) : 0;
  lastTime = t;

  update(dt);

  drawSky();
  drawGround();
  drawTracks();
  drawTunnelLights();

  // Sort drawables by z so the back items render first
  const drawables = [
    ...obstacles.map(o => ({ z: o.z, draw: () => drawObstacle(o) })),
    ...coins.map(c => ({ z: c.z, draw: () => drawCoin(c) })),
  ];
  drawables.sort((a, b) => a.z - b.z);
  for (const d of drawables) d.draw();

  drawDust();
  drawPlayer();
  drawParticles();
  drawHUDExtras();
  drawGameOver();

  requestAnimationFrame(frame);
}

reset();
requestAnimationFrame(frame);
</script>
</body>
