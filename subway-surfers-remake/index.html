<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subway Surfers Remake — 3D</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; user-select: none;
    text-shadow: 2px 2px 0 #000, 0 0 12px rgba(0,0,0,0.8);
  }
  #score { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
  #coins { font-size: 20px; color: #ffd34d; margin-top: 2px; }
  #best  { position: fixed; top: 14px; right: 14px; font-size: 14px; color: #fcd34d; text-shadow: 2px 2px 0 #000; }
  #hint  { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
           font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.65);
           text-transform: uppercase; pointer-events: none; user-select: none; }
  #gameover {
    position: fixed; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); text-align: center;
  }
  #gameover.show { display: flex; }
  #gameover h1 {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 96px; color: #ff5050; margin: 0;
    -webkit-text-stroke: 4px #000;
    text-shadow: 0 0 30px rgba(255,80,80,0.6);
  }
  #gameover p { font-family: monospace; font-size: 26px; margin: 6px 0; }
  #gameover .best { color: #fcd34d; }
  #gameover .hint { font-size: 16px; opacity: 0.75; margin-top: 24px; }
  #loadhint { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
              font-size: 18px; color: #aaa; }
  #flash {
    position: fixed; inset: 0;
    background: rgba(255, 0, 0, 0);
    pointer-events: none;
    transition: background 0.18s ease-out;
    box-shadow: inset 0 0 120px rgba(255,0,0,0);
  }
  #danger {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 36px; color: #ff3030; letter-spacing: 4px;
    text-shadow: 2px 2px 0 #000, 0 0 16px rgba(255,40,40,0.9);
    opacity: 0; pointer-events: none; user-select: none;
    transition: opacity 0.15s;
  }
  #danger.on { opacity: 1; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.08); } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loadhint">Loading 3D engine…</div>
<div id="hud" style="display:none">
  <div id="score">0</div>
  <div id="coins">🪙 <span id="coinCount">0</span></div>
</div>
<div id="best" style="display:none">Best: <span id="bestScore">0</span></div>
<div id="hint" style="display:none">← → / A D : switch lane &nbsp;·&nbsp; ↑ / W / SPACE : jump &nbsp;·&nbsp; ↓ / S : slide</div>
<div id="danger">⚠  COP CLOSING IN!  ⚠</div>
<div id="flash"></div>
<div id="gameover">
  <h1>CRASHED!</h1>
  <p>Score: <span id="finalScore">0</span></p>
  <p>Coins: <span id="finalCoins">0</span></p>
  <p class="best">Best: <span id="finalBest">0</span></p>
  <p class="hint">Press SPACE / ENTER (or tap) to restart</p>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if (typeof THREE === 'undefined') {
  document.getElementById('loadhint').textContent = 'Failed to load Three.js. Check your connection.';
} else {
  document.getElementById('loadhint').remove();
  document.getElementById('hud').style.display = '';
  document.getElementById('best').style.display = '';
  document.getElementById('hint').style.display = '';
  start();
}

function start() {
// ============== RENDERER / SCENE / CAMERA ==============
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
if (THREE.SRGBColorSpace) renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1428);
scene.fog = new THREE.Fog(0x0a1428, 28, 95);

const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 200);
camera.position.set(0, 4.2, 8.5);
camera.lookAt(0, 1.8, -4);

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// ============== LIGHTING ==============
scene.add(new THREE.HemisphereLight(0x6688cc, 0x221122, 0.55));
const sun = new THREE.DirectionalLight(0xffeec8, 1.15);
sun.position.set(6, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -10;
sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 50;
sun.shadow.bias = -0.0008;
scene.add(sun);

const playerGlow = new THREE.PointLight(0xffeeaa, 0.6, 14);
playerGlow.position.set(0, 5, 7);
scene.add(playerGlow);

// ============== CONSTANTS ==============
const LANE_COUNT  = 3;
const LANE_WIDTH  = 2.4;
const FLOOR_LEN   = 240;
const FLOOR_HALFW = LANE_WIDTH * 2.2;
const TIE_GAP     = 1.6;
const LIGHT_GAP   = 4.2;

// ============== WORLD: FLOOR ==============
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x2c2c34, roughness: 0.95, metalness: 0.05,
});
const floors = [];
for (let i = 0; i < 2; i++) {
  const f = new THREE.Mesh(new THREE.PlaneGeometry(FLOOR_HALFW * 2, FLOOR_LEN), floorMat);
  f.rotation.x = -Math.PI / 2;
  f.position.z = -FLOOR_LEN / 2 - i * FLOOR_LEN;
  f.receiveShadow = true;
  scene.add(f);
  floors.push(f);
}

// Ceiling (subway tunnel feel)
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x16161e, roughness: 1, metalness: 0 });
const ceilings = [];
for (let i = 0; i < 2; i++) {
  const c = new THREE.Mesh(new THREE.PlaneGeometry(FLOOR_HALFW * 2, FLOOR_LEN), ceilingMat);
  c.rotation.x = Math.PI / 2;
  c.position.set(0, 6.5, -FLOOR_LEN / 2 - i * FLOOR_LEN);
  scene.add(c);
  ceilings.push(c);
}

// ============== WORLD: TUNNEL WALLS ==============
const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c1c28, roughness: 0.9 });
const walls = [];
for (let side of [-1, 1]) {
  for (let i = 0; i < 2; i++) {
    const w = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6.5, FLOOR_LEN), wallMat);
    w.position.set(side * (FLOOR_HALFW + 0.2), 3.25, -FLOOR_LEN / 2 - i * FLOOR_LEN);
    w.receiveShadow = true;
    scene.add(w);
    walls.push(w);
  }
}

// Wall stripe (subway tile pattern look — long thin emissive boxes)
const stripeMat = new THREE.MeshStandardMaterial({ color: 0xaaccff, emissive: 0x223344, roughness: 0.4 });
const wallStripes = [];
for (let side of [-1, 1]) {
  for (let i = 0; i < 2; i++) {
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.4, FLOOR_LEN), stripeMat);
    s.position.set(side * FLOOR_HALFW, 4.5, -FLOOR_LEN / 2 - i * FLOOR_LEN);
    scene.add(s);
    wallStripes.push(s);
  }
}

// ============== WORLD: RAILS ==============
const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaabb, roughness: 0.3, metalness: 0.7 });
const rails = [];
const railOffsets = [-2.4, -0.8, 0.8, 2.4];
for (const xo of railOffsets) {
  for (let i = 0; i < 2; i++) {
    const r = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, FLOOR_LEN), railMat);
    r.position.set(xo, 0.08, -FLOOR_LEN / 2 - i * FLOOR_LEN);
    scene.add(r);
    rails.push(r);
  }
}

// ============== WORLD: TIES (instanced for perf) ==============
const tieGeo = new THREE.BoxGeometry(LANE_WIDTH * 3.4, 0.12, 0.45);
const tieMat = new THREE.MeshStandardMaterial({ color: 0x6a3a18, roughness: 1 });
const TIE_COUNT = 100;
const tieInstanced = new THREE.InstancedMesh(tieGeo, tieMat, TIE_COUNT);
const tmpMat = new THREE.Matrix4();
const tiePositions = new Float32Array(TIE_COUNT);
for (let i = 0; i < TIE_COUNT; i++) {
  tiePositions[i] = -i * TIE_GAP;
  tmpMat.makeTranslation(0, 0.06, tiePositions[i]);
  tieInstanced.setMatrixAt(i, tmpMat);
}
tieInstanced.instanceMatrix.needsUpdate = true;
tieInstanced.receiveShadow = true;
scene.add(tieInstanced);

// ============== WORLD: CEILING LIGHTS ==============
const lightFixtureMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa });
const ceilingLights = [];
const LIGHT_COUNT = 36;
for (let i = 0; i < LIGHT_COUNT; i++) {
  const l = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.8), lightFixtureMat);
  l.position.set(0, 6.4, -i * LIGHT_GAP);
  scene.add(l);
  ceilingLights.push(l);
}

// ============== PLAYER ==============
const playerGroup = new THREE.Group();
playerGroup.position.set(0, 0, 0);
scene.add(playerGroup);

const skinMat   = new THREE.MeshStandardMaterial({ color: 0xfdc97a, roughness: 0.6 });
const hoodieMat = new THREE.MeshStandardMaterial({ color: 0x22c55e, roughness: 0.7 });
const pantsMat  = new THREE.MeshStandardMaterial({ color: 0x1e3a8a, roughness: 0.85 });
const beanieMat = new THREE.MeshStandardMaterial({ color: 0xfacc15, roughness: 0.6 });
const stripeRedMat = new THREE.MeshStandardMaterial({ color: 0xdc2626 });
const shoeMat   = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });

// Head
const head = new THREE.Mesh(new THREE.SphereGeometry(0.36, 18, 18), skinMat);
head.position.y = 2.45;
head.castShadow = true;
playerGroup.add(head);
// Beanie (half-sphere)
const beanieGeom = new THREE.SphereGeometry(0.38, 18, 12, 0, Math.PI * 2, 0, Math.PI / 2);
const beanieMesh = new THREE.Mesh(beanieGeom, beanieMat);
beanieMesh.position.y = 2.5;
beanieMesh.castShadow = true;
playerGroup.add(beanieMesh);
// Beanie red stripe
const beanieStripe = new THREE.Mesh(new THREE.CylinderGeometry(0.385, 0.385, 0.1, 18), stripeRedMat);
beanieStripe.position.y = 2.55;
playerGroup.add(beanieStripe);
// Pom-pom
const pom = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 }));
pom.position.y = 2.92;
playerGroup.add(pom);
// Eyes (small black spheres)
const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), eyeMat);
eyeL.position.set(-0.12, 2.48, 0.32);
playerGroup.add(eyeL);
const eyeR = eyeL.clone(); eyeR.position.x = 0.12; playerGroup.add(eyeR);

// Hoodie body
const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.0, 0.45), hoodieMat);
body.position.y = 1.55;
body.castShadow = true;
playerGroup.add(body);
// Pocket
const pocket = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.46),
  new THREE.MeshStandardMaterial({ color: 0x0f6e2c }));
pocket.position.y = 1.35;
playerGroup.add(pocket);

// Backpack
const backpack = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.7, 0.25),
  new THREE.MeshStandardMaterial({ color: 0xa52e0e, roughness: 0.7 }));
backpack.position.set(0, 1.65, -0.32);
backpack.castShadow = true;
playerGroup.add(backpack);

// Arms (pivoted from shoulder)
function makeLimb(material, len, w) {
  const pivot = new THREE.Group();
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, len, w), material);
  m.position.y = -len / 2;
  m.castShadow = true;
  pivot.add(m);
  return pivot;
}
const armL = makeLimb(hoodieMat, 0.85, 0.22);
armL.position.set(-0.55, 2.0, 0);
playerGroup.add(armL);
const armR = makeLimb(hoodieMat, 0.85, 0.22);
armR.position.set(0.55, 2.0, 0);
playerGroup.add(armR);
// Hands
const handMatBall = new THREE.MeshStandardMaterial({ color: 0xfdc97a });
const handL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), handMatBall);
handL.position.y = -0.85; armL.add(handL);
const handR = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), handMatBall);
handR.position.y = -0.85; armR.add(handR);

// Legs
const legL = makeLimb(pantsMat, 0.95, 0.26);
legL.position.set(-0.22, 1.05, 0);
playerGroup.add(legL);
const legR = makeLimb(pantsMat, 0.95, 0.26);
legR.position.set(0.22, 1.05, 0);
playerGroup.add(legR);
// Sneakers (attached to bottom of leg)
const shoeL = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.18, 0.5), shoeMat);
shoeL.position.set(0, -0.95, 0.08); legL.add(shoeL);
const shoeR = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.18, 0.5), shoeMat);
shoeR.position.set(0, -0.95, 0.08); legR.add(shoeR);
// Sneaker red soles
const soleL = new THREE.Mesh(new THREE.BoxGeometry(0.33, 0.06, 0.51),
  new THREE.MeshStandardMaterial({ color: 0xdc2626 }));
soleL.position.set(0, -1.05, 0.08); legL.add(soleL);
const soleR = soleL.clone(); soleR.position.set(0, -1.05, 0.08); legR.add(soleR);

// ============== COP CHASER ==============
function makeCop() {
  const g = new THREE.Group();
  const uniformMat = new THREE.MeshStandardMaterial({ color: 0x162a4a, roughness: 0.85 });
  const copSkinMat = new THREE.MeshStandardMaterial({ color: 0xe8b48a, roughness: 0.6 });
  // Head
  const ch = new THREE.Mesh(new THREE.SphereGeometry(0.36, 16, 16), copSkinMat);
  ch.position.y = 2.45; ch.castShadow = true; g.add(ch);
  // Police cap
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.28, 18),
    new THREE.MeshStandardMaterial({ color: 0x0a1830, roughness: 0.5 })
  );
  cap.position.y = 2.78; g.add(cap);
  // Cap brim
  const brim = new THREE.Mesh(
    new THREE.CylinderGeometry(0.46, 0.46, 0.05, 18, 1, false, -Math.PI / 2, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0x000000 })
  );
  brim.position.set(0, 2.62, 0.04);
  g.add(brim);
  // Cap badge
  const badge = new THREE.Mesh(
    new THREE.BoxGeometry(0.22, 0.13, 0.04),
    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7, emissive: 0x332200 })
  );
  badge.position.set(0, 2.78, 0.4);
  g.add(badge);
  // Sunglasses
  const glasses = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 0.12, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.2, metalness: 0.7 })
  );
  glasses.position.set(0, 2.5, 0.34); g.add(glasses);
  // Mustache
  const stash = new THREE.Mesh(
    new THREE.BoxGeometry(0.36, 0.07, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x111111 })
  );
  stash.position.set(0, 2.36, 0.34); g.add(stash);
  // Body (uniform with shirt)
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.95, 1.0, 0.5), uniformMat);
  body.position.y = 1.55; body.castShadow = true; g.add(body);
  // Tie
  const tie = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.7, 0.04),
    new THREE.MeshStandardMaterial({ color: 0x222222 }));
  tie.position.set(0, 1.7, 0.27); g.add(tie);
  // Sheriff star on chest
  const star = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.04, 5),
    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7, emissive: 0x332200 }));
  star.rotation.x = Math.PI / 2;
  star.position.set(-0.25, 1.85, 0.27);
  g.add(star);
  // Belt
  const belt = new THREE.Mesh(new THREE.BoxGeometry(0.96, 0.18, 0.51),
    new THREE.MeshStandardMaterial({ color: 0x111111 }));
  belt.position.y = 1.07; g.add(belt);
  const buckle = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.15, 0.05),
    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7 }));
  buckle.position.set(0, 1.07, 0.27); g.add(buckle);
  // Arms
  const cArmL = makeLimb(uniformMat, 0.85, 0.24);
  cArmL.position.set(-0.6, 2.0, 0); g.add(cArmL);
  const cArmR = makeLimb(uniformMat, 0.85, 0.24);
  cArmR.position.set( 0.6, 2.0, 0); g.add(cArmR);
  const cHandL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), copSkinMat);
  cHandL.position.y = -0.85; cArmL.add(cHandL);
  const cHandR = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), copSkinMat);
  cHandR.position.y = -0.85; cArmR.add(cHandR);
  // Legs
  const cLegL = makeLimb(new THREE.MeshStandardMaterial({ color: 0x0a1830, roughness: 0.85 }), 0.95, 0.28);
  cLegL.position.set(-0.24, 1.05, 0); g.add(cLegL);
  const cLegR = makeLimb(new THREE.MeshStandardMaterial({ color: 0x0a1830, roughness: 0.85 }), 0.95, 0.28);
  cLegR.position.set( 0.24, 1.05, 0); g.add(cLegR);
  // Black boots
  const bootMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
  const cBootL = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.2, 0.5), bootMat);
  cBootL.position.set(0, -0.95, 0.08); cLegL.add(cBootL);
  const cBootR = cBootL.clone(); cBootR.position.set(0, -0.95, 0.08); cLegR.add(cBootR);
  scene.add(g);
  return { group: g, armL: cArmL, armR: cArmR, legL: cLegL, legR: cLegR };
}
const cop = makeCop();
let copZ = 6.5;
const COP_DANGER = 1.0;     // game over when cop within this distance
const COP_MAX = 7.5;        // max trailing distance (cop falls behind)
const COP_PUSH_HIT = 1.8;   // distance closed per stumble (small obstacle)
const COP_PUSH_TRAIN = 3.0; // distance closed per stumble (train)
const COP_RECOVER = 1.0;    // distance / sec the cop falls behind while running clean

// Quick reference to flash/danger UI
const flashEl = document.getElementById('flash');
const dangerEl = document.getElementById('danger');

// ============== GAME STATE ==============
const player = {
  lane: 1,
  displayX: 0,
  yOff: 0, vy: 0,
  state: 'run',
  slideTimer: 0,
  invuln: 0,
};
let speed = 14;
let distance = 0;
let score = 0;
let coinCount = 0;
let gameOver = false;
let lastTime = performance.now();
let lastSpawnZ = -16;        // most recent spawn z (in world coords; more negative = farther ahead)

let bestScore = parseInt(localStorage.getItem('subway3d-best') || '0', 10);
const bestEl = document.getElementById('bestScore');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coinCount');
bestEl.textContent = bestScore;

const obstacles = [];
const coins = [];
const sparks = [];

// ============== OBSTACLE FACTORIES ==============
function makeBarrier(lane) {
  const g = new THREE.Group();
  const bar = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.7, 0.35),
    new THREE.MeshStandardMaterial({ color: 0xa85a22, roughness: 0.7 }));
  bar.position.y = 0.55; bar.castShadow = true;
  g.add(bar);
  const stripeMatW = new THREE.MeshStandardMaterial({ color: 0xffffff });
  for (let i = -0.8; i <= 0.8; i += 0.4) {
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.7, 0.36), stripeMatW);
    s.position.set(i, 0.55, 0);
    g.add(s);
  }
  const sign = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.36),
    new THREE.MeshStandardMaterial({ color: 0xffd700 }));
  sign.position.y = 0.95;
  g.add(sign);
  // Legs
  const legM = new THREE.MeshStandardMaterial({ color: 0x502000 });
  const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1, 0.12), legM);
  leg1.position.set(-1, 0.5, 0); g.add(leg1);
  const leg2 = leg1.clone(); leg2.position.x = 1; g.add(leg2);
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'barrier', lane };
}

function makeHighBar(lane) {
  const g = new THREE.Group();
  const bar = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.28, 0.35),
    new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.5, roughness: 0.4 }));
  bar.position.y = 2.3; bar.castShadow = true; g.add(bar);
  const postM = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const postL = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.4, 0.18), postM);
  postL.position.set(-1.15, 1.2, 0); postL.castShadow = true; g.add(postL);
  const postR = postL.clone(); postR.position.x = 1.15; g.add(postR);
  // Caution triangle
  const sign = new THREE.Mesh(new THREE.ConeGeometry(0.42, 0.5, 3),
    new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x554400 }));
  sign.position.y = 2.78;
  g.add(sign);
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'high-bar', lane };
}

function makeTrain(lane) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.9, 3.0, 6.5),
    new THREE.MeshStandardMaterial({ color: 0xdc3322, roughness: 0.5, metalness: 0.2 }));
  body.position.y = 1.6; body.castShadow = true; g.add(body);
  // Roof
  const roof = new THREE.Mesh(new THREE.BoxGeometry(1.95, 0.2, 6.55),
    new THREE.MeshStandardMaterial({ color: 0x5a1010 }));
  roof.position.y = 3.2; g.add(roof);
  // Side stripe (gold)
  const stripeBox = new THREE.Mesh(new THREE.BoxGeometry(1.91, 0.14, 6.51),
    new THREE.MeshStandardMaterial({ color: 0xffd700 }));
  stripeBox.position.y = 1.6; g.add(stripeBox);
  // Windows on each long side
  const winMat = new THREE.MeshStandardMaterial({
    color: 0xaaccee, emissive: 0x334466, transparent: true, opacity: 0.9
  });
  for (let i = -2; i <= 2; i += 1.4) {
    const w1 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.55, 0.55), winMat);
    w1.position.set(0.97, 2.15, i); g.add(w1);
    const w2 = w1.clone(); w2.position.x = -0.97; g.add(w2);
  }
  // Front windshield
  const front = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.7, 0.05), winMat);
  front.position.set(0, 2.3, 3.27); g.add(front);
  // Headlight glow
  const hl = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0xffeeaa }));
  hl.position.set(0, 0.7, 3.28); g.add(hl);
  const hlGlow = new THREE.PointLight(0xffeeaa, 0.6, 8);
  hlGlow.position.set(0, 0.7, 3.5);
  g.add(hlGlow);
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'train', lane, length: 6.5 };
}

function makeCan(lane) {
  const g = new THREE.Group();
  const can = new THREE.Mesh(
    new THREE.CylinderGeometry(0.42, 0.46, 1.0, 14),
    new THREE.MeshStandardMaterial({ color: 0x4a5a6a, roughness: 0.55, metalness: 0.55 })
  );
  can.position.y = 0.5; can.castShadow = true; g.add(can);
  // Lid
  const lid = new THREE.Mesh(
    new THREE.CylinderGeometry(0.44, 0.44, 0.1, 14),
    new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.6, metalness: 0.6 })
  );
  lid.position.y = 1.05; g.add(lid);
  // Trash bag bulging
  const bag = new THREE.Mesh(
    new THREE.SphereGeometry(0.36, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 })
  );
  bag.position.y = 1.22; bag.scale.y = 0.7; g.add(bag);
  // Vertical seam (rim)
  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(0.43, 0.03, 6, 14),
    new THREE.MeshStandardMaterial({ color: 0x1a2a3a })
  );
  rim.rotation.x = Math.PI / 2;
  rim.position.y = 0.3;
  g.add(rim);
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'can', lane };
}

function makeCrate(lane) {
  const g = new THREE.Group();
  const crate = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 1.3, 1.3),
    new THREE.MeshStandardMaterial({ color: 0x8a5a2a, roughness: 0.85 })
  );
  crate.position.y = 0.65; crate.castShadow = true; g.add(crate);
  // Dark slats around the box
  const slatMat = new THREE.MeshStandardMaterial({ color: 0x4a2a10 });
  for (const y of [1.1, 0.65, 0.2]) {
    const s = new THREE.Mesh(new THREE.BoxGeometry(1.32, 0.06, 1.32), slatMat);
    s.position.y = y; g.add(s);
  }
  // Edge brackets
  for (const sx of [-0.65, 0.65]) for (const sz of [-0.65, 0.65]) {
    const e = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.32, 0.06), slatMat);
    e.position.set(sx, 0.65, sz); g.add(e);
  }
  // Stamp
  const stamp = new THREE.Mesh(
    new THREE.PlaneGeometry(0.7, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.9 })
  );
  stamp.position.set(0, 0.7, 0.66); g.add(stamp);
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'crate', lane };
}

function makeSign(lane) {
  // Hanging street sign — slide under
  const g = new THREE.Group();
  const board = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.8, 0.18),
    new THREE.MeshStandardMaterial({ color: 0x16a34a, roughness: 0.6 })
  );
  board.position.y = 2.3; board.castShadow = true; g.add(board);
  // Border
  const borderMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const top = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.06, 0.19), borderMat);
  top.position.y = 2.66; g.add(top);
  const bot = top.clone(); bot.position.y = 1.94; g.add(bot);
  // Chains
  const chainMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.4 });
  for (const x of [-0.95, 0.95]) {
    const chain = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.6, 0.06), chainMat);
    chain.position.set(x, 3.5, 0); g.add(chain);
  }
  // Top rail (where chains attach)
  const rail = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.1), chainMat);
  rail.position.y = 4.3; g.add(rail);
  // White text approximation (boxes)
  const textMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  for (let i = -0.7; i <= 0.7; i += 0.34) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.34, 0.19), textMat);
    t.position.set(i, 2.3, 0); g.add(t);
  }
  g.position.x = (lane - 1) * LANE_WIDTH;
  scene.add(g);
  return { mesh: g, type: 'sign', lane };
}

function makeCoin(lane, yOff) {
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(0.28, 0.09, 10, 18),
    new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x665500, metalness: 0.8, roughness: 0.25 })
  );
  m.castShadow = true;
  m.rotation.y = Math.PI / 2;
  m.position.set((lane - 1) * LANE_WIDTH, 1 + yOff, 0);
  scene.add(m);
  return { mesh: m, lane, yOff };
}

// ============== SPAWN ==============
function pickWeighted(items, weights) {
  let total = 0;
  for (const w of weights) total += w;
  let pick = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    pick -= weights[i];
    if (pick <= 0) return items[i];
  }
  return items[items.length - 1];
}
function preSpawn(rows) {
  for (let i = 0; i < rows; i++) spawnRow();
}
function spawnRow() {
  const r = Math.random();
  // lastSpawnZ in world coords; player at z=0
  if (r < 0.55) {
    // Train less frequent (full lane block) — others equally common
    const factories = [makeBarrier, makeHighBar, makeCan, makeCrate, makeSign, makeTrain];
    const weights   = [3,           3,           3,        3,          3,        2];
    const lane = Math.floor(Math.random() * 3);
    const factory = pickWeighted(factories, weights);
    const obs = factory(lane);
    obs.mesh.position.z = lastSpawnZ;
    obstacles.push(obs);
    if (Math.random() < 0.4) {
      const otherLane = (lane + 1 + Math.floor(Math.random() * 2)) % 3;
      const factory2 = pickWeighted(factories, weights);
      const obs2 = factory2(otherLane);
      obs2.mesh.position.z = lastSpawnZ;
      obstacles.push(obs2);
    }
  } else if (r < 0.85) {
    const lane = Math.floor(Math.random() * 3);
    const arc = Math.random() < 0.4;
    for (let i = 0; i < 7; i++) {
      const c = makeCoin(lane, arc ? Math.sin((i / 6) * Math.PI) * 1.4 : 0);
      c.mesh.position.z = lastSpawnZ - i * 0.9;
      coins.push(c);
    }
  }
  lastSpawnZ -= 7 + Math.random() * 5;
}

// ============== INPUT ==============
function tryJump() {
  if (player.state === 'run') {
    player.state = 'jump';
    player.vy = 9.5;
  }
}
function trySlide() {
  if (player.state === 'run' || player.state === 'jump') {
    player.state = 'slide';
    player.slideTimer = 0.7;
    player.yOff = 0; player.vy = 0;
  }
}
function trySwitch(dir) {
  const newLane = player.lane + dir;
  if (newLane >= 0 && newLane < LANE_COUNT) player.lane = newLane;
}

window.addEventListener('keydown', e => {
  if (gameOver) {
    if (e.code === 'Space' || e.code === 'Enter') restart();
    return;
  }
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA':  trySwitch(-1); break;
    case 'ArrowRight': case 'KeyD': trySwitch(1);  break;
    case 'ArrowUp': case 'KeyW': case 'Space': tryJump(); break;
    case 'ArrowDown': case 'KeyS': case 'ShiftLeft': trySlide(); break;
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault();
});

let touchStart = null;
window.addEventListener('touchstart', e => {
  if (gameOver) { restart(); return; }
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
window.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  touchStart = null;
  if (Math.max(ax, ay) < 28) { tryJump(); return; }
  if (ax > ay) {
    if (dx < 0) trySwitch(-1); else trySwitch(1);
  } else {
    if (dy < 0) tryJump(); else trySlide();
  }
}, { passive: true });

// ============== GAME LOOP ==============
function restart() {
  for (const o of obstacles) scene.remove(o.mesh);
  for (const c of coins) scene.remove(c.mesh);
  for (const s of sparks) scene.remove(s.mesh);
  obstacles.length = 0; coins.length = 0; sparks.length = 0;
  player.lane = 1; player.displayX = 0;
  player.yOff = 0; player.vy = 0;
  player.state = 'run'; player.slideTimer = 0;
  player.invuln = 0;
  speed = 14;
  distance = 0;
  score = 0;
  coinCount = 0;
  gameOver = false;
  lastSpawnZ = -10;
  preSpawn(20);
  copZ = 6.5;
  cop.group.position.x = 0;
  flashEl.style.background = 'rgba(255,0,0,0)';
  dangerEl.classList.remove('on');
  document.getElementById('gameover').classList.remove('show');
  lastTime = performance.now();
}

function spawnSparks(x, y, z) {
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 1 })
    );
    m.position.set(x, y, z);
    scene.add(m);
    sparks.push({
      mesh: m,
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 5,
        Math.random() * 5 + 1.5,
        (Math.random() - 0.5) * 5
      ),
      life: 0.6,
      maxLife: 0.6,
    });
  }
}

function stumble(severity) {
  if (player.invuln > 0) return;
  player.invuln = 0.9;
  copZ -= severity;
  // Brief red flash
  flashEl.style.transition = 'background 0s';
  flashEl.style.background = 'rgba(255,0,0,0.45)';
  setTimeout(() => {
    flashEl.style.transition = 'background 0.4s ease-out';
    flashEl.style.background = 'rgba(255,0,0,0)';
  }, 50);
  // Spark burst at player
  spawnSparks(player.displayX, 1.5, 0);
}

function caught() {
  if (gameOver) return;
  gameOver = true;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('subway3d-best', String(score));
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalCoins').textContent = coinCount;
  document.getElementById('finalBest').textContent = bestScore;
  bestEl.textContent = bestScore;
  document.getElementById('gameover').classList.add('show');
  dangerEl.classList.remove('on');
  // Big spark burst
  spawnSparks(player.displayX, 1.5, 0);
  spawnSparks(player.displayX, 1.5, 0);
}

const tmpVec3 = new THREE.Vector3();

function update(dt) {
  if (gameOver) {
    // Still update sparks during game over for visual finish
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life -= dt;
      s.mesh.position.add(s.vel.clone().multiplyScalar(dt));
      s.vel.y -= 18 * dt;
      s.mesh.material.opacity = Math.max(0, s.life / s.maxLife);
      if (s.life <= 0) { scene.remove(s.mesh); sparks.splice(i, 1); }
    }
    return;
  }

  speed = 14 + Math.min(22, distance * 0.10);
  distance += speed * dt;
  score = Math.floor(distance * 5);

  // Lane interpolation
  const targetX = (player.lane - 1) * LANE_WIDTH;
  player.displayX += (targetX - player.displayX) * Math.min(1, dt * 14);
  playerGroup.position.x = player.displayX;
  // Tilt sideways during lane change
  const laneTilt = (targetX - player.displayX) * 0.3;
  playerGroup.rotation.z = laneTilt;

  // Jump
  if (player.state === 'jump') {
    player.yOff += player.vy * dt;
    player.vy -= 26 * dt;
    if (player.yOff <= 0) {
      player.yOff = 0; player.vy = 0;
      player.state = 'run';
    }
  }
  if (player.state === 'slide') {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0) player.state = 'run';
  }
  playerGroup.position.y = player.yOff;

  // Crouch and tilt forward when sliding
  const targetScaleY = player.state === 'slide' ? 0.42 : 1;
  playerGroup.scale.y += (targetScaleY - playerGroup.scale.y) * Math.min(1, dt * 16);
  const targetTilt = player.state === 'slide' ? -0.55 : 0;
  playerGroup.rotation.x += (targetTilt - playerGroup.rotation.x) * Math.min(1, dt * 16);

  // Limb animation
  const tt = performance.now() * 0.014;
  if (player.state === 'run') {
    const sw = Math.sin(tt) * 0.8;
    legL.rotation.x =  sw;
    legR.rotation.x = -sw;
    armL.rotation.x = -sw * 0.9;
    armR.rotation.x =  sw * 0.9;
  } else if (player.state === 'jump') {
    legL.rotation.x = -0.4;
    legR.rotation.x = -0.7;
    armL.rotation.x = -0.6;
    armR.rotation.x = -0.6;
  } else { // slide — limbs aligned
    legL.rotation.x = 0.1;
    legR.rotation.x = 0.1;
    armL.rotation.x = -0.3;
    armR.rotation.x = -0.3;
  }

  // Camera bob
  const bob = (player.state === 'run') ? Math.sin(tt * 2) * 0.04 : 0;
  camera.position.y = 4.2 + bob + player.yOff * 0.15;

  // ===== COP CHASER =====
  // Cop closes the gap during stumble, falls back when player runs clean
  if (player.invuln > 0) {
    player.invuln -= dt;
    copZ -= 0.4 * dt; // slight extra approach during the stumble
  } else {
    copZ = Math.min(COP_MAX, copZ + COP_RECOVER * dt);
  }
  // Cop position
  cop.group.position.z = copZ;
  cop.group.position.x += (player.displayX - cop.group.position.x) * Math.min(1, dt * 8);
  // Cop run animation (faster cadence than player so it looks intense)
  const ct = performance.now() * 0.018;
  const csw = Math.sin(ct) * 0.95;
  cop.legL.rotation.x =  csw;
  cop.legR.rotation.x = -csw;
  cop.armL.rotation.x = -csw * 0.95;
  cop.armR.rotation.x =  csw * 0.95;
  // Slight forward lean for intensity
  cop.group.rotation.x = -0.12 + Math.sin(ct * 2) * 0.02;

  // Danger UI when cop is close
  if (copZ < 3.0) {
    const danger = (3.0 - copZ) / 3.0;
    flashEl.style.transition = 'background 0.25s ease-out';
    flashEl.style.background = `rgba(255,30,30,${danger * 0.30})`;
    if (copZ < 2.4) dangerEl.classList.add('on');
    else            dangerEl.classList.remove('on');
  } else {
    flashEl.style.background = 'rgba(255,30,30,0)';
    dangerEl.classList.remove('on');
  }
  // Caught!
  if (copZ <= COP_DANGER) {
    caught();
  }

  // Move world toward camera
  const dz = speed * dt;
  lastSpawnZ += dz;  // keep the spawn cursor anchored to the world so new rows keep coming
  for (const o of obstacles) o.mesh.position.z += dz;
  for (const c of coins) {
    c.mesh.position.z += dz;
    c.mesh.rotation.x += dt * 6;
  }
  for (const f of floors) {
    f.position.z += dz;
    if (f.position.z > FLOOR_LEN / 2 + 5) f.position.z -= FLOOR_LEN * 2;
  }
  for (const c of ceilings) {
    c.position.z += dz;
    if (c.position.z > FLOOR_LEN / 2 + 5) c.position.z -= FLOOR_LEN * 2;
  }
  for (const w of walls) {
    w.position.z += dz;
    if (w.position.z > FLOOR_LEN / 2 + 5) w.position.z -= FLOOR_LEN * 2;
  }
  for (const s of wallStripes) {
    s.position.z += dz;
    if (s.position.z > FLOOR_LEN / 2 + 5) s.position.z -= FLOOR_LEN * 2;
  }
  for (const r of rails) {
    r.position.z += dz;
    if (r.position.z > FLOOR_LEN / 2 + 5) r.position.z -= FLOOR_LEN * 2;
  }
  for (const l of ceilingLights) {
    l.position.z += dz;
    if (l.position.z > 8) l.position.z -= LIGHT_COUNT * LIGHT_GAP;
  }
  // Scroll instanced ties
  for (let i = 0; i < TIE_COUNT; i++) {
    tiePositions[i] += dz;
    if (tiePositions[i] > 8) tiePositions[i] -= TIE_COUNT * TIE_GAP;
    tmpMat.makeTranslation(0, 0.06, tiePositions[i]);
    tieInstanced.setMatrixAt(i, tmpMat);
  }
  tieInstanced.instanceMatrix.needsUpdate = true;

  // Spawn ahead — keep a deep buffer that scales with current speed (always at least ~5 sec ahead)
  const spawnBuffer = -Math.max(120, speed * 6);
  while (lastSpawnZ > spawnBuffer) spawnRow();
  // Safety net: if the spawn cursor somehow drifts past the player, snap it forward
  if (lastSpawnZ > -20) {
    lastSpawnZ = -40;
    spawnRow();
  }

  // Collisions
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    const oz = o.mesh.position.z;
    if (oz > 5) {
      scene.remove(o.mesh);
      obstacles.splice(i, 1);
      continue;
    }
    if (oz > -1.2 && oz < 1.6 && o.lane === player.lane && !o.passed) {
      let hit = true;
      const jumpClears = player.state === 'jump' && player.yOff > 0.55;
      if (o.type === 'barrier'  && jumpClears) hit = false;
      if (o.type === 'can'      && jumpClears) hit = false;
      if (o.type === 'crate'    && player.state === 'jump' && player.yOff > 0.95) hit = false;
      if (o.type === 'high-bar' && player.state === 'slide') hit = false;
      if (o.type === 'sign'     && player.state === 'slide') hit = false;
      // train always hits
      if (hit) {
        o.passed = true;
        stumble(o.type === 'train' ? COP_PUSH_TRAIN : COP_PUSH_HIT);
      }
    }
  }

  // Coin pickup
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    if (c.mesh.position.z > 5) {
      scene.remove(c.mesh);
      coins.splice(i, 1);
      continue;
    }
    if (c.mesh.position.z > -1 && c.mesh.position.z < 1.5 && c.lane === player.lane) {
      const playerYTop = player.yOff + (player.state === 'slide' ? 0.5 : 1.8);
      const playerYBot = player.yOff + (player.state === 'slide' ? 0 : 0);
      const coinY = 1 + c.yOff;
      if (coinY >= playerYBot - 0.3 && coinY <= playerYTop + 0.3) {
        scene.remove(c.mesh);
        coins.splice(i, 1);
        coinCount++;
        score += 10;
        spawnSparks(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z);
      }
    }
  }

  // Sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.life -= dt;
    s.mesh.position.add(s.vel.clone().multiplyScalar(dt));
    s.vel.y -= 18 * dt;
    s.mesh.material.opacity = Math.max(0, s.life / s.maxLife);
    if (s.life <= 0) { scene.remove(s.mesh); sparks.splice(i, 1); }
  }

  scoreEl.textContent = score;
  coinsEl.textContent = coinCount;
}

function frame(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

// Pre-spawn so the world is already populated when the game starts
preSpawn(20);

requestAnimationFrame(frame);
}
</script>
